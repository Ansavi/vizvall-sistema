<script>
var fzVistaActual='pend', fzObligaciones=[], fzModos=[];

function fzAbrir() { fzVista('resumen'); }

function fzVista(v) {
  fzVistaActual=v;
  ['resumen','reporte','liquidez','indicadores','gastos','pend','venc','pagos'].forEach(function(t){
    var el=document.getElementById('fz-tab-'+t); if(el) el.classList.toggle('activo', t===v);
  });
  if(v==='resumen') fzCargarResumen();
  else if(v==='reporte') fzCargarReporte();
  else if(v==='liquidez') fzCargarLiquidez();
  else if(v==='indicadores') fzCargarIndicadores();
  else if(v==='gastos') fzCargarGastos();
  else if(v==='pagos') fzCargarPagos();
  else fzCargarObligaciones();
}

// ════ RESUMEN FINANCIERO (Pieza 1) ════
function fzHoyISO(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fzPrimerDiaMes(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-01'; }

function fzCargarResumen() {
  var body=document.getElementById('fz-body');
  // Si es la primera vez, fijar mes actual por defecto
  if(!window.fzDesde){ window.fzDesde=fzPrimerDiaMes(); window.fzHasta=fzHoyISO(); }
  body.innerHTML=
    '<div style="display:flex;gap:10px;align-items:end;flex-wrap:wrap;margin-bottom:16px;background:#fff;border:1px solid #EEF0F3;border-radius:10px;padding:12px 14px">'+
      '<div><label style="font-size:11.5px;color:#666;display:block;margin-bottom:3px">Desde</label>'+
        '<input type="date" id="fz-r-desde" value="'+window.fzDesde+'" style="padding:7px 10px;border:1px solid #E2E4E9;border-radius:8px;font-size:13px"/></div>'+
      '<div><label style="font-size:11.5px;color:#666;display:block;margin-bottom:3px">Hasta</label>'+
        '<input type="date" id="fz-r-hasta" value="'+window.fzHasta+'" style="padding:7px 10px;border:1px solid #E2E4E9;border-radius:8px;font-size:13px"/></div>'+
      '<button class="fz-btn primary" onclick="fzAplicarRango()" style="padding:8px 16px;background:#C8241A;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px">Aplicar</button>'+
      '<div style="display:flex;gap:5px;margin-left:auto">'+
        '<button onclick="fzMesRapido(0)" style="padding:7px 12px;border:1px solid #E2E4E9;border-radius:8px;background:#fff;cursor:pointer;font-size:12.5px">Este mes</button>'+
        '<button onclick="fzMesRapido(1)" style="padding:7px 12px;border:1px solid #E2E4E9;border-radius:8px;background:#fff;cursor:pointer;font-size:12.5px">Mes pasado</button>'+
        '<button onclick="fzMesRapido(-1)" style="padding:7px 12px;border:1px solid #E2E4E9;border-radius:8px;background:#fff;cursor:pointer;font-size:12.5px">Hoy</button>'+
      '</div>'+
    '</div>'+
    '<div id="fz-resumen-cont"><div class="fz-empty">⏳ Calculando…</div></div>';
  fzPedirResumen();
}

function fzAplicarRango() {
  window.fzDesde=document.getElementById('fz-r-desde').value;
  window.fzHasta=document.getElementById('fz-r-hasta').value;
  if(!window.fzDesde||!window.fzHasta){ alert('⚠ Indique ambas fechas'); return; }
  if(window.fzDesde>window.fzHasta){ alert('⚠ "Desde" no puede ser mayor que "Hasta"'); return; }
  fzPedirResumen();
}

function fzMesRapido(cual) {
  var hoy=new Date();
  if(cual===-1){ // Hoy
    window.fzDesde=fzHoyISO(); window.fzHasta=fzHoyISO();
  } else if(cual===0){ // Este mes
    window.fzDesde=hoy.getFullYear()+'-'+String(hoy.getMonth()+1).padStart(2,'0')+'-01';
    window.fzHasta=fzHoyISO();
  } else { // Mes pasado
    var m=hoy.getMonth(), y=hoy.getFullYear();
    var mp=m===0?12:m, yp=m===0?y-1:y;
    var ultimoDia=new Date(yp, mp, 0).getDate();
    window.fzDesde=yp+'-'+String(mp).padStart(2,'0')+'-01';
    window.fzHasta=yp+'-'+String(mp).padStart(2,'0')+'-'+String(ultimoDia).padStart(2,'0');
  }
  document.getElementById('fz-r-desde').value=window.fzDesde;
  document.getElementById('fz-r-hasta').value=window.fzHasta;
  fzPedirResumen();
}

function fzPedirResumen() {
  var cont=document.getElementById('fz-resumen-cont');
  cont.innerHTML='<div class="fz-empty">⏳ Calculando…</div>';
  google.script.run
    .withSuccessHandler(function(resp){
      if(!resp||!resp.ok){ cont.innerHTML='<div class="fz-empty" style="color:#C8241A">⚠ '+(resp?resp.mensaje:'Error')+'</div>'; return; }
      fzRenderResumen(resp.datos);
    })
    .withFailureHandler(function(e){ cont.innerHTML='<div class="fz-empty" style="color:#C8241A">⚠ '+e.message+'</div>'; })
    .ejecutar('resumenFinanciero', { desde:window.fzDesde, hasta:window.fzHasta, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

function fzSoles(n){ return 'S/ '+(parseFloat(n)||0).toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2}); }

function fzRenderResumen(d) {
  var cont=document.getElementById('fz-resumen-cont');
  var utilColor = d.utilidad>=0 ? '#0A7A3F' : '#C8241A';
  // Tarjetas
  var html='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px">'+
    '<div style="background:#fff;border:1px solid #C5E8D8;border-radius:12px;padding:16px;border-left:4px solid #0A7A3F">'+
      '<div style="font-size:12px;color:#8A8A8A;margin-bottom:5px">💰 Ingresos</div>'+
      '<div style="font-size:23px;font-weight:700;color:#0A7A3F">'+fzSoles(d.ingresos)+'</div>'+
      '<div style="font-size:11.5px;color:#8A8A8A;margin-top:3px">'+d.numVentas+' venta(s)</div>'+
    '</div>'+
    '<div style="background:#fff;border:1px solid #F5C2C0;border-radius:12px;padding:16px;border-left:4px solid #C8241A">'+
      '<div style="font-size:12px;color:#8A8A8A;margin-bottom:5px">💸 Egresos</div>'+
      '<div style="font-size:23px;font-weight:700;color:#C8241A">'+fzSoles(d.egresos)+'</div>'+
      '<div style="font-size:11.5px;color:#8A8A8A;margin-top:3px">'+d.numEgresos+' movimiento(s)</div>'+
    '</div>'+
    '<div style="background:#fff;border:1px solid #EEF0F3;border-radius:12px;padding:16px;border-left:4px solid '+utilColor+'">'+
      '<div style="font-size:12px;color:#8A8A8A;margin-bottom:5px">'+(d.utilidad>=0?'📈':'📉')+' Utilidad</div>'+
      '<div style="font-size:23px;font-weight:700;color:'+utilColor+'">'+fzSoles(d.utilidad)+'</div>'+
      '<div style="font-size:11.5px;color:#8A8A8A;margin-top:3px">Ingresos − Egresos</div>'+
    '</div>'+
    '<div style="background:#fff;border:1px solid #FBE3C0;border-radius:12px;padding:16px;border-left:4px solid #B5651A">'+
      '<div style="font-size:12px;color:#8A8A8A;margin-bottom:5px">📋 Por pagar</div>'+
      '<div style="font-size:23px;font-weight:700;color:#B5651A">'+fzSoles(d.porPagar)+'</div>'+
      '<div style="font-size:11.5px;color:#8A8A8A;margin-top:3px">'+d.numPorPagar+' obligación(es) pendiente(s)</div>'+
    '</div>'+
  '</div>';

  // Gráfico de barras simple (ingresos vs egresos por día)
  if(d.serie && d.serie.length){
    var maxV=0;
    d.serie.forEach(function(s){ maxV=Math.max(maxV, s.ingresos, s.egresos); });
    if(maxV===0) maxV=1;
    html+='<div style="background:#fff;border:1px solid #EEF0F3;border-radius:12px;padding:16px;margin-bottom:16px">'+
      '<div style="font-size:13px;font-weight:600;margin-bottom:12px">Ingresos vs Egresos por día</div>'+
      '<div style="display:flex;align-items:end;gap:6px;height:160px;overflow-x:auto;padding-bottom:4px">';
    d.serie.forEach(function(s){
      var hi=Math.round((s.ingresos/maxV)*140);
      var he=Math.round((s.egresos/maxV)*140);
      var diaCorto=s.fecha.substring(8,10)+'/'+s.fecha.substring(5,7);
      html+='<div style="display:flex;flex-direction:column;align-items:center;gap:2px;min-width:36px">'+
        '<div style="display:flex;gap:2px;align-items:end;height:140px">'+
          '<div title="Ingresos: '+fzSoles(s.ingresos)+'" style="width:13px;height:'+hi+'px;background:#0A7A3F;border-radius:3px 3px 0 0"></div>'+
          '<div title="Egresos: '+fzSoles(s.egresos)+'" style="width:13px;height:'+he+'px;background:#C8241A;border-radius:3px 3px 0 0"></div>'+
        '</div>'+
        '<div style="font-size:9.5px;color:#8A8A8A;white-space:nowrap">'+diaCorto+'</div>'+
      '</div>';
    });
    html+='</div>'+
      '<div style="display:flex;gap:16px;margin-top:10px;font-size:12px">'+
        '<span style="display:flex;align-items:center;gap:5px"><span style="width:11px;height:11px;background:#0A7A3F;border-radius:2px;display:inline-block"></span> Ingresos</span>'+
        '<span style="display:flex;align-items:center;gap:5px"><span style="width:11px;height:11px;background:#C8241A;border-radius:2px;display:inline-block"></span> Egresos</span>'+
      '</div>'+
    '</div>';
  }

  // Desglose de egresos por concepto
  if(d.desgloseEgresos && d.desgloseEgresos.length){
    html+='<div style="background:#fff;border:1px solid #EEF0F3;border-radius:12px;padding:16px">'+
      '<div style="font-size:13px;font-weight:600;margin-bottom:10px">Egresos por concepto</div>';
    d.desgloseEgresos.forEach(function(e){
      var pct = d.egresos>0 ? Math.round((e.monto/d.egresos)*100) : 0;
      html+='<div style="margin-bottom:8px">'+
        '<div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:3px"><span>'+e.concepto+'</span><span style="font-weight:600">'+fzSoles(e.monto)+' ('+pct+'%)</span></div>'+
        '<div style="height:6px;background:#F2F3F5;border-radius:4px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:#C8241A"></div></div>'+
      '</div>';
    });
    html+='</div>';
  } else {
    html+='<div style="background:#fff;border:1px solid #EEF0F3;border-radius:12px;padding:16px;font-size:13px;color:#8A8A8A;text-align:center">Sin egresos registrados en este periodo.</div>';
  }

  cont.innerHTML=html;
}

// ════ GASTOS VARIOS (Pieza 2) ════
var fzConceptos=[], fzModosPago=[];

function fzCargarGastos() {
  var body=document.getElementById('fz-body');
  body.innerHTML='<div class="fz-empty">⏳ Verificando caja…</div>';
  // 1. Verificar que haya caja abierta (los gastos pasan por caja)
  google.script.run.withSuccessHandler(function(resp){
    var cajaAbierta = resp && resp.ok && resp.datos && resp.datos.ABIERTA;
    if(!cajaAbierta){
      body.innerHTML='<div style="background:#FFF8E6;border:1px solid #F5D88A;border-radius:10px;padding:18px;text-align:center;font-size:13.5px;color:#8A6A1A">'+
        '<div style="font-size:28px;margin-bottom:8px">🔒</div>'+
        '<div style="font-weight:600;margin-bottom:4px">No hay caja abierta</div>'+
        'Para registrar un gasto primero debe abrir la caja en el menú <b>Caja</b>.</div>';
      return;
    }
    fzRenderGastos();
  }).withFailureHandler(function(e){
    body.innerHTML='<div class="fz-empty" style="color:#C8241A">⚠ '+e.message+'</div>';
  }).ejecutar('estadoCaja', { usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

function fzRenderGastos() {
  var body=document.getElementById('fz-body');
  body.innerHTML=
    '<div style="display:grid;grid-template-columns:1fr 1.3fr;gap:16px">'+
      // Formulario
      '<div style="background:#fff;border:1px solid #EEF0F3;border-radius:12px;padding:16px">'+
        '<div style="font-size:14px;font-weight:600;margin-bottom:14px">💸 Registrar gasto</div>'+
        '<div style="margin-bottom:12px"><label style="font-size:12px;color:#555;display:block;margin-bottom:4px">Concepto <span style="color:#C8241A">*</span></label>'+

function fzCargarConceptos() {
  google.script.run.withSuccessHandler(function(resp){
    var todos = resp&&resp.ok&&Array.isArray(resp.datos)?resp.datos:[];
    // Solo conceptos de EGRESO activos
    fzConceptos = todos.filter(function(x){ return String(x.TIPO).toUpperCase()==='EGRESO' && x.ESTADO==='ACTIVO'; });
    var sel=document.getElementById('fz-g-concepto');
    if(!sel) return;
    if(!fzConceptos.length){ sel.innerHTML='<option value="">⚠ Sin conceptos de gasto (créelos en Configuración)</option>'; return; }
    sel.innerHTML='<option value="">— Seleccione —</option>'+fzConceptos.map(function(x){
      return '<option value="'+x.ID_TCONCEPTO_CAJA+'">'+x.NOMBRE+'</option>';
    }).join('');
  }).withFailureHandler(function(){}).ejecutar('listarMaestras',{tabla:'TCONCEPTO_CAJA',usuario:sesion.USUARIO||'',rol:sesion.ROL||'',token:sesion.TOKEN||''});
}

function fzCargarModos() {
  google.script.run.withSuccessHandler(function(resp){
    fzModosPago = resp&&resp.ok&&Array.isArray(resp.datos)?resp.datos.filter(function(x){return x.ESTADO==='ACTIVO';}):[];
    var sel=document.getElementById('fz-g-modo');
    if(!sel||!fzModosPago.length) return;
    sel.innerHTML=fzModosPago.map(function(x){ return '<option value="'+x.NOMBRE+'">'+x.NOMBRE+'</option>'; }).join('');
  }).withFailureHandler(function(){}).ejecutar('listarMaestras',{tabla:'TMODO_PAGO',usuario:sesion.USUARIO||'',rol:sesion.ROL||'',token:sesion.TOKEN||''});
}

function fzRegistrarGasto() {
  var concepto=document.getElementById('fz-g-concepto').value;
  var monto=document.getElementById('fz-g-monto').value;
  var modo=document.getElementById('fz-g-modo').value;
  var obs=document.getElementById('fz-g-obs').value.trim();
  if(!concepto){ alert('⚠ Seleccione el concepto del gasto'); return; }
  if(!monto||parseFloat(monto)<=0){ alert('⚠ Indique un monto mayor a 0'); return; }
  google.script.run.withSuccessHandler(function(resp){
    if(!resp||!resp.ok){ alert('⚠ '+(resp?resp.mensaje:'Error')); return; }
    // Limpiar y refrescar sin F5
    document.getElementById('fz-g-monto').value='';
    document.getElementById('fz-g-obs').value='';
    document.getElementById('fz-g-concepto').value='';
    fzCargarGastosHoy();
    if(typeof pnNotif==='function') pnNotif('✓ Gasto registrado','ok');
    else alert('✓ Gasto registrado correctamente');
  }).withFailureHandler(function(e){ alert('⚠ '+e.message); })
    .ejecutar('registrarMovimiento', {
      TIPO:'EGRESO', ID_TCONCEPTO_CAJA:concepto, MONTO:monto, MODO_PAGO:modo,
      OBSERVACIONES:obs||'-', usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||''
    });
}

function fzCargarGastosHoy() {
  var cont=document.getElementById('fz-g-lista');
  if(cont) cont.innerHTML='<div class="fz-empty">Cargando…</div>';
  google.script.run.withSuccessHandler(function(resp){
    var movs = resp&&resp.ok&&Array.isArray(resp.datos)?resp.datos:[];
    // Solo egresos
    var gastos = movs.filter(function(m){ return String(m.TIPO).toUpperCase()==='EGRESO' && m.ESTADO!=='ANULADO'; });
    fzRenderGastosHoy(gastos);
  }).withFailureHandler(function(){ if(cont) cont.innerHTML='<div class="fz-empty" style="color:#C8241A">Error al cargar</div>'; })
    .ejecutar('listarCaja', { usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

function fzRenderGastosHoy(gastos) {
  var cont=document.getElementById('fz-g-lista');
  if(!cont) return;
  var total=0; gastos.forEach(function(g){ total+=parseFloat(g.MONTO)||0; });
  document.getElementById('fz-g-total').textContent='Total: '+fzSoles(total)+' ('+gastos.length+')';
  if(!gastos.length){ cont.innerHTML='<div class="fz-empty" style="padding:30px">Sin gastos registrados hoy.</div>'; return; }
  var esAdmin = (sesion && sesion.ROL==='ADMINISTRADOR');
  cont.innerHTML=gastos.map(function(g){
    var btnAnular = esAdmin
      ? '<button onclick="fzAnularGasto(\''+g.ID_CAJA+'\')" title="Anular gasto" style="border:1px solid #F5C2C0;background:#fff;color:#C8241A;border-radius:7px;padding:4px 9px;font-size:11.5px;cursor:pointer;white-space:nowrap">✕ Anular</button>'
      : '';
    return '<div style="display:flex;align-items:center;gap:10px;padding:10px 11px;border-bottom:1px solid #F2F3F5">'+
      '<div style="width:34px;height:34px;border-radius:8px;background:#FDECEA;display:flex;align-items:center;justify-content:center;font-size:15px">💸</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div style="font-size:13px;font-weight:500">'+(g.CONCEPTO_NOMBRE||g.ID_TCONCEPTO_CAJA||'Gasto')+'</div>'+
        '<div style="font-size:11.5px;color:#8A8A8A">'+(g.HORA||'')+' · '+(g.MODO_PAGO||'')+(g.OBSERVACIONES&&g.OBSERVACIONES!=='-'?' · '+g.OBSERVACIONES:'')+'</div>'+
      '</div>'+
      '<div style="font-weight:600;color:#C8241A;font-size:13.5px">'+fzSoles(g.MONTO)+'</div>'+
      btnAnular+
    '</div>';
  }).join('');
}

function fzAnularGasto(idCaja) {
  var motivo = prompt('¿Por qué anula este gasto?\n(ej: monto equivocado, concepto incorrecto)');
  if(motivo===null) return; // canceló
  if(!motivo.trim()){ alert('⚠ Debe indicar un motivo para anular.'); return; }
  google.script.run
    .withSuccessHandler(function(resp){
      if(!resp||!resp.ok){ alert('⚠ '+(resp?resp.mensaje:'Error')); return; }
      if(typeof pnNotif==='function') pnNotif('✓ Gasto anulado','ok');
      else alert('✓ Gasto anulado correctamente');
      fzCargarGastosHoy(); // refresca sin F5
    })
    .withFailureHandler(function(e){ alert('⚠ '+e.message); })
    .ejecutar('anularMovimientoCaja', { ID_CAJA:idCaja, MOTIVO:motivo.trim(), usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

function fzTabla(titulo, filas, colNombre, colMonto) {

  return '<div style="background:#fff;border:1px solid #EEF0F3;border-radius:10px;padding:14px;margin-bottom:14px">'+
    '<div style="font-size:13px;font-weight:600;margin-bottom:8px">'+titulo+'</div>'+

function fzImprimirReporte() {

  window.print();
}

function fzDescargarReporteCSV() {
  if(!fzReporteData){ alert('⚠ Genere el reporte primero'); return; }
  var d=fzReporteData;
  var NL=String.fromCharCode(10);
  var lineas=[];
  lineas.push('REPORTE FINANCIERO');
  lineas.push('Periodo,'+d.desde+' al '+d.hasta);
  lineas.push('');
  lineas.push('RESUMEN');
  lineas.push('Total Ingresos,'+d.totalIngresos.toFixed(2));
  lineas.push('Total Egresos,'+d.totalEgresos.toFixed(2));
  lineas.push('Utilidad,'+d.utilidad.toFixed(2));
  lineas.push('N de ventas,'+d.numVentas);
  lineas.push('Ticket promedio,'+d.ticketPromedio.toFixed(2));
  function bloque(titulo, filas, key){
    lineas.push('');
    lineas.push(titulo.toUpperCase());
    (filas||[]).forEach(function(f){ lineas.push((f[key]||'').replace(/,/g,' ')+','+f.monto.toFixed(2)+(f.pct!==undefined?','+f.pct+'%':'')); });
  }
  bloque('Ingresos por especialidad', d.porEspecialidad, 'especialidad');
  bloque('Ingresos por servicio', d.porServicio, 'servicio');
  if(d.porPaquete&&d.porPaquete.length) bloque('Ingresos por paquete', d.porPaquete, 'paquete');
  bloque('Ingresos por metodo de pago', d.porMetodo, 'metodo');
  bloque('Egresos por concepto', d.porConcepto, 'concepto');
  var csv=lineas.join(NL);
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url; a.download='reporte_financiero_'+d.desde+'_'+d.hasta+'.csv'; a.click();
  URL.revokeObjectURL(url);
}

function fzDescargarLiquidezCSV() {
  if(!fzLiqData){ alert('⚠ Genere el reporte primero'); return; }
  var d=fzLiqData, NL=String.fromCharCode(10), L=[];
  L.push('REPORTE DE LIQUIDEZ');
  L.push('Periodo,'+window.fzLDesde+' al '+window.fzLHasta);
  L.push(''); L.push('CUENTAS POR COBRAR');
  L.push('Fecha,Cliente,Venta,Total,Pagado,Saldo');
  d.porCobrar.forEach(function(r){ L.push(r.FECHA+','+(r.CLIENTE||'').replace(/,/g,' ')+','+r.ID_VENTA+','+r.TOTAL+','+r.PAGADO+','+r.SALDO); });
  L.push('Total por cobrar,,,,,'+d.totalCobrar);
  L.push(''); L.push('CUENTAS POR PAGAR');
  L.push('Proveedor,Comprobante,Vencimiento,Pendiente');
  d.porPagar.forEach(function(r){ L.push((r.PROVEEDOR||'').replace(/,/g,' ')+','+r.COMPROBANTE+','+r.VENCIMIENTO+(r.VENCIDA?' (VENCIDA)':'')+','+r.PENDIENTE); });
  L.push('Total por pagar,,,'+d.totalPagar);
  L.push(''); L.push('FLUJO DE CAJA');
  L.push('Fecha,Entradas,Salidas,Neto,Acumulado');
  d.flujo.forEach(function(r){ L.push(r.FECHA+','+r.ENTRADAS+','+r.SALIDAS+','+r.NETO+','+r.ACUMULADO); });
  L.push('Total,'+d.totalEntradas+','+d.totalSalidas+','+d.flujoNeto+',');
  var blob=new Blob(['\uFEFF'+L.join(NL)],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url; a.download='liquidez_'+window.fzLDesde+'_'+window.fzLHasta+'.csv'; a.click();
  URL.revokeObjectURL(url);
}

// Tarjeta comparativa con flecha de tendencia
function fzCompCard(titulo, valActual, valPrev, varPct, esMoneda) {
  var v=parseFloat(varPct)||0;
  var sube=v>=0;
  var flecha=sube?'▲':'▼';
  var color=sube?'#0A7A3F':'#C8241A';
  // Para egresos, subir es "malo" — invertir color
  if(titulo.toLowerCase().indexOf('egreso')>=0){ color=sube?'#C8241A':'#0A7A3F'; }
  var fmt=function(x){ return esMoneda?fzSoles(x):(parseFloat(x)||0).toLocaleString('es-PE'); };
  return '<div style="background:#fff;border:1px solid #EEF0F3;border-radius:10px;padding:14px">'+
    '<div style="font-size:11.5px;color:#8A8A8A;margin-bottom:4px">'+titulo+'</div>'+
    '<div style="font-size:21px;font-weight:700;color:#2C2C2C">'+fmt(valActual)+'</div>'+
    '<div style="display:flex;align-items:center;gap:6px;margin-top:5px">'+
      '<span style="font-size:12.5px;font-weight:600;color:'+color+'">'+flecha+' '+Math.abs(v).toFixed(1)+'%</span>'+
      '<span style="font-size:11px;color:#A0A0A0">vs mes anterior ('+fmt(valPrev)+')</span>'+
    '</div>'+
  '</div>';
}

// KPI simple (sin comparativo)
function fzKpiCard(titulo, valor, sub, color) {
  return '<div style="background:#fff;border:1px solid #EEF0F3;border-radius:10px;padding:14px">'+
    '<div style="font-size:11.5px;color:#8A8A8A;margin-bottom:4px">'+titulo+'</div>'+
    '<div style="font-size:20px;font-weight:700;color:'+(color||'#2C2C2C')+'">'+valor+'</div>'+
    (sub?'<div style="font-size:11px;color:#A0A0A0;margin-top:4px">'+sub+'</div>':'')+
  '</div>';
}

  var cont=document.getElementById('fz-ind-cont');

  var comparativo=
    '<div style="font-size:13px;font-weight:600;margin-bottom:10px">📊 Comparativo: '+d.mes+' vs '+d.mesPrev+'</div>'+
    '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px">'+
      fzCompCard('Ingresos', a.ingresos, p.ingresos, d.var_ingresos, true)+
      fzCompCard('Egresos', a.egresos, p.egresos, d.var_egresos, true)+
      fzCompCard('Utilidad', a.utilidad, p.utilidad, d.var_utilidad, true)+
      fzCompCard('N° de ventas', a.numVentas, p.numVentas, d.var_ventas, false)+
      fzCompCard('Citas atendidas', a.citasAtend, p.citasAtend, d.var_citas, false)+
    '</div>';

  var margenColor = a.margen>=0 ? '#0A7A3F' : '#C8241A';
  var ocupColor = a.ocupacion>=70 ? '#0A7A3F' : (a.ocupacion>=40 ? '#B5651A' : '#C8241A');
  var kpis=
    '<div style="font-size:13px;font-weight:600;margin-bottom:10px">🎯 KPIs del mes</div>'+
    '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px">'+
      fzKpiCard('Ticket promedio', fzSoles(a.ticketProm), 'por venta')+
      fzKpiCard('Margen de utilidad', a.margen.toFixed(1)+'%', 'utilidad ÷ ingresos', margenColor)+
      fzKpiCard('Ocupación de citas', a.ocupacion.toFixed(0)+'%', a.citasAtend+' de '+a.citasProg+' citas', ocupColor)+
      fzKpiCard('Especialidad top', a.espTop, fzSoles(a.espTopMonto)+' este mes', '#6B3FA0')+
      fzKpiCard('Pacientes nuevos', a.pacNuevos, 'registrados este mes', '#1A6FC4')+
    '</div>';

  cont.innerHTML=comparativo+kpis;
}

      fzObligaciones = resp&&resp.ok&&Array.isArray(resp.datos)?resp.datos:[];

    .ejecutar('listarObligaciones', params);

function fzRenderObligaciones() {
  var body=document.getElementById('fz-body');
  var lista = fzObligaciones.slice();
  if(fzVistaActual==='pend'){
    // pendientes = no pagadas ni anuladas
    lista = lista.filter(function(o){ return o.ESTADO!=='PAGADO' && o.ESTADO!=='ANULADO'; });
  }
  // Totales
  var totalPend=0, countVenc=0;
  lista.forEach(function(o){ totalPend += parseFloat(o.MONTO_PENDIENTE)||0; if(o.VENCIDA) countVenc++; });

  var html='<div class="fz-stats">'+
    '<div class="fz-stat rojo"><div class="lbl">Total pendiente</div><div class="val">S/ '+totalPend.toFixed(2)+'</div></div>'+
    '<div class="fz-stat"><div class="lbl">Obligaciones</div><div class="val">'+lista.length+'</div></div>'+
    '<div class="fz-stat naranja"><div class="lbl">Vencidas</div><div class="val">'+countVenc+'</div></div>'+
  '</div>';

  if(!lista.length){
    html+='<div class="fz-card"><div class="fz-empty">'+(fzVistaActual==='venc'?'No hay obligaciones vencidas. 👍':'No hay obligaciones pendientes. 👍')+'</div></div>';
    body.innerHTML=html; return;
  }
  html+='<div class="fz-card"><table class="fz-table"><thead><tr><th>Proveedor</th><th>Tipo</th><th>Comprobante</th><th>Vencimiento</th><th style="text-align:right">Total</th><th style="text-align:right">Pendiente</th><th>Estado</th><th style="text-align:right">Acciones</th></tr></thead><tbody>';
  lista.forEach(function(o){
    var est=String(o.ESTADO||'').toLowerCase();
    var estBadge='<span class="fz-badge '+est+'">'+o.ESTADO+'</span>';
    if(o.VENCIDA) estBadge+=' <span class="fz-badge vencida">VENCIDA</span>';
    html+='<tr>'+
      '<td><b>'+(o.PROVEEDOR_NOMBRE||'—')+'</b></td>'+
      '<td>'+(o.TIPO_NOMBRE||'—')+'</td>'+
      '<td class="fz-id">'+(o.NUMERO_COMPROBANTE&&o.NUMERO_COMPROBANTE!=='-'?o.NUMERO_COMPROBANTE:'—')+'</td>'+
      '<td class="fz-id">'+(o.FECHA_VENCIMIENTO||'—')+'</td>'+
      '<td style="text-align:right" class="fz-monto">S/ '+(o.MONTO_TOTAL||'0.00')+'</td>'+
      '<td style="text-align:right" class="fz-monto" style="color:#C8241A">S/ '+(o.MONTO_PENDIENTE||'0.00')+'</td>'+
      '<td>'+estBadge+'</td>'+

        '<button class="fz-accion" onclick=\'fzVerPagos("'+o.ID_OBLIGACION+'")\' title="Ver pagos">👁️</button>'+
        (o.ESTADO==='PENDIENTE'&&sesion.ROL==='ADMINISTRADOR'?'<button class="fz-accion" style="color:#C8241A" onclick=\'fzAnular("'+o.ID_OBLIGACION+'")\' title="Anular">🚫</button>':'')+

  });

function fzAbrirPago(idObl) {
  var o=fzObligaciones.find(function(x){ return x.ID_OBLIGACION===idObl; });
  if(!o) return;
  document.getElementById('fz-pago-obl').value=idObl;
  document.getElementById('fz-pago-info').innerHTML='<b>'+o.PROVEEDOR_NOMBRE+'</b><br>Saldo pendiente: <b style="color:#C8241A">S/ '+o.MONTO_PENDIENTE+'</b> de S/ '+o.MONTO_TOTAL;
  document.getElementById('fz-pago-monto').value=o.MONTO_PENDIENTE;
  document.getElementById('fz-pago-monto').max=o.MONTO_PENDIENTE;
  document.getElementById('fz-pago-obs').value='';
  // Cargar modos de pago si no están
  var sel=document.getElementById('fz-pago-modo');
  if(!fzModos.length){
    google.script.run.withSuccessHandler(function(r){
      fzModos = r&&r.ok&&Array.isArray(r.datos)?r.datos.filter(function(m){return m.ESTADO==='ACTIVO';}):[];
      fzLlenarModos();
    }).withFailureHandler(function(){}).ejecutar('listarMaestras',{tabla:'TMODO_PAGO',usuario:sesion.USUARIO||'',rol:sesion.ROL||'',token:sesion.TOKEN||''});
  } else { fzLlenarModos(); }
  fzToggleDetalle();
  document.getElementById('fz-modal-bg').classList.add('activo');
}
function fzLlenarModos() {
  var sel=document.getElementById('fz-pago-modo');
  sel.innerHTML='<option value="">— Seleccione —</option>';
  fzModos.forEach(function(m){ var o=document.createElement('option'); o.value=m.ID_TMODO_PAGO; o.textContent=m.NOMBRE; o.setAttribute('data-nombre',m.NOMBRE); sel.appendChild(o); });
}
function fzToggleDetalle() {
  var sel=document.getElementById('fz-pago-modo');
  var nombre = sel.options[sel.selectedIndex] ? String(sel.options[sel.selectedIndex].textContent||'').toUpperCase() : '';
  document.getElementById('fz-det-transferencia').style.display = nombre.indexOf('TRANSFER')>=0?'block':'none';
  document.getElementById('fz-det-yape').style.display = (nombre.indexOf('YAPE')>=0||nombre.indexOf('PLIN')>=0)?'block':'none';
  document.getElementById('fz-det-tarjeta').style.display = nombre.indexOf('TARJETA')>=0?'block':'none';
}

function fzPagar() {
  var monto=document.getElementById('fz-pago-monto').value;
  if(monto===''||parseFloat(monto)<=0){ alert('⚠ Ingrese un monto válido'); return; }
  var modo=document.getElementById('fz-pago-modo').value;
  if(!modo){ alert('⚠ Seleccione el modo de pago'); return; }
  var sel=document.getElementById('fz-pago-modo');
  var nombre = String(sel.options[sel.selectedIndex].textContent||'').toUpperCase();
  var btn=document.getElementById('fz-btn-pagar'); btn.disabled=true; btn.textContent='⏳…';
  var params={
    ID_OBLIGACION:document.getElementById('fz-pago-obl').value,
    MONTO:monto,
    ID_TMODO_PAGO:modo,
    OBSERVACION:document.getElementById('fz-pago-obs').value.trim(),
    usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||''
  };
  // Detalle según medio
  if(nombre.indexOf('TRANSFER')>=0){ params.NUMERO_OPERACION=document.getElementById('fz-op').value.trim(); params.BANCO=document.getElementById('fz-banco').value.trim(); }
  else if(nombre.indexOf('YAPE')>=0||nombre.indexOf('PLIN')>=0){ params.NUMERO_OPERACION=document.getElementById('fz-op-yape').value.trim(); params.CELULAR=document.getElementById('fz-celular').value.trim(); }
  else if(nombre.indexOf('TARJETA')>=0){ params.VOUCHER=document.getElementById('fz-voucher').value.trim(); params.ENTIDAD=document.getElementById('fz-entidad').value.trim(); }
  google.script.run
    .withSuccessHandler(function(resp){
      btn.disabled=false; btn.textContent='💵 Registrar pago';
      if(!resp||!resp.ok){
        if(resp&&resp.codigo==='ERR_CAJA_CERRADA'){
          if(confirm('⚠ '+resp.mensaje+'\n\n¿Desea ir a abrir la caja ahora?')){ fzCerrarModal(); if(typeof goTo==='function') goTo('caja','Caja','Apertura de caja'); }
          return;
        }
        alert('⚠ '+(resp?resp.mensaje:'Error')); return;
      }
      if(typeof pnNotif==='function') pnNotif('✓ '+resp.mensaje,'ok');
      fzCerrarModal(); fzCargarObligaciones();
    })
    .withFailureHandler(function(e){ btn.disabled=false; btn.textContent='💵 Registrar pago'; alert('⚠ '+e.message); })
    .ejecutar('registrarPagoObligacion', params);
}

function fzAnular(idObl) {
  var motivo=prompt('Motivo de anulación de la obligación:');
  if(motivo===null) return;
  google.script.run
    .withSuccessHandler(function(resp){
      if(!resp||!resp.ok){ alert('⚠ '+(resp?resp.mensaje:'Error')); return; }
      if(typeof pnNotif==='function') pnNotif('✓ Obligación anulada','ok');
      fzCargarObligaciones();
    })
    .withFailureHandler(function(e){ alert('⚠ '+e.message); })
    .ejecutar('anularObligacion', { ID_OBLIGACION:idObl, MOTIVO:motivo, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

// Ver pagos de una obligación específica
function fzVerPagos(idObl) {
  var cont=document.getElementById('fz-detalle-pagos');
  cont.innerHTML='<div class="fz-card"><div class="fz-empty">Cargando pagos…</div></div>';
  google.script.run
    .withSuccessHandler(function(resp){
      var pagos = resp&&resp.ok&&Array.isArray(resp.datos)?resp.datos:[];
      if(!pagos.length){ cont.innerHTML='<div class="fz-card"><div class="fz-empty">Esta obligación aún no tiene pagos.</div></div>'; cont.scrollIntoView({behavior:'smooth',block:'nearest'}); return; }
      var html='<div class="fz-card"><h3 style="margin:0 0 12px;padding:14px 14px 0;font-size:14px">Pagos de '+idObl+'</h3><table class="fz-table"><thead><tr><th>Fecha</th><th>Modo</th><th style="text-align:right">Monto</th><th>Observación</th></tr></thead><tbody>';
      pagos.forEach(function(p){
        html+='<tr><td class="fz-id">'+(p.FECHA_PAGO||'')+'</td><td>'+(p.MODO_PAGO||'—')+'</td><td style="text-align:right" class="fz-monto">S/ '+(p.MONTO||'0.00')+'</td><td style="font-size:12px;color:#666">'+(p.OBSERVACION!=='-'?p.OBSERVACION:'')+'</td></tr>';
      });
      html+='</tbody></table></div>';
      cont.innerHTML=html;
      cont.scrollIntoView({behavior:'smooth',block:'nearest'});
    })
    .withFailureHandler(function(e){ cont.innerHTML='<div class="fz-card" style="color:#C8241A;padding:14px">⚠ '+e.message+'</div>'; })
    .ejecutar('listarPagosObligacion', { ID_OBLIGACION:idObl, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

// ════ HISTORIAL DE PAGOS (todos) ════
function fzCargarPagos() {
  var body=document.getElementById('fz-body');
  body.innerHTML='<div class="fz-empty">Cargando…</div>';
  google.script.run
    .withSuccessHandler(function(resp){
      var pagos = resp&&resp.ok&&Array.isArray(resp.datos)?resp.datos:[];
      if(!pagos.length){ body.innerHTML='<div class="fz-card"><div class="fz-empty">Sin pagos registrados.</div></div>'; return; }
      var total=0; pagos.forEach(function(p){ total+=parseFloat(p.MONTO)||0; });
      var html='<div class="fz-stats"><div class="fz-stat"><div class="lbl">Total pagado</div><div class="val">S/ '+total.toFixed(2)+'</div></div><div class="fz-stat"><div class="lbl">Pagos</div><div class="val">'+pagos.length+'</div></div></div>';
      html+='<div class="fz-card"><table class="fz-table"><thead><tr><th>Fecha</th><th>Obligación</th><th>Modo</th><th style="text-align:right">Monto</th><th>Observación</th></tr></thead><tbody>';
      pagos.forEach(function(p){
        html+='<tr><td class="fz-id">'+(p.FECHA_PAGO||'')+'</td><td class="fz-id">'+(p.OBLIGACION_DESC||p.ID_OBLIGACION||'—')+'</td><td>'+(p.MODO_PAGO||'—')+'</td><td style="text-align:right" class="fz-monto">S/ '+(p.MONTO||'0.00')+'</td><td style="font-size:12px;color:#666">'+(p.OBSERVACION!=='-'?p.OBSERVACION:'')+'</td></tr>';
      });
      html+='</tbody></table></div>';
      body.innerHTML=html;
    })
    .withFailureHandler(function(e){ body.innerHTML='<div class="fz-empty" style="color:#C8241A">⚠ '+e.message+'</div>'; })
    .ejecutar('listarPagosObligacion', { usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}
</script>
