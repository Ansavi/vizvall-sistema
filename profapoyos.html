<style>
#sec-profapoyo { display:none;overflow:hidden;position:absolute;top:56px;left:0;right:0;bottom:0;background:var(--bg,#F2F3F5);flex-direction:column; }
#sec-profapoyo.activo { display:flex; }
.pap-toolbar { display:flex;align-items:center;gap:10px;padding:12px 18px;background:#fff;border-bottom:1px solid #E2E4E9;flex-wrap:wrap;flex-shrink:0; }
.pap-search-wrap { position:relative;flex:1;min-width:200px;max-width:360px; }
.pap-search-wrap svg { position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#8A8A8A; }
.pap-search { width:100%;padding:7px 12px 7px 34px;border:1.5px solid #E2E4E9;border-radius:8px;font-size:13px;font-family:DM Sans,sans-serif;background:#F2F3F5;outline:none;box-sizing:border-box; }
.pap-search:focus { border-color:#C8241A;background:#fff; }
.pap-select { padding:7px 10px;border:1.5px solid #E2E4E9;border-radius:8px;font-size:12.5px;font-family:DM Sans,sans-serif;background:#F2F3F5;outline:none;cursor:pointer; }
.pap-btn { padding:7px 14px;border-radius:8px;font-size:12.5px;font-weight:500;cursor:pointer;border:1.5px solid #E2E4E9;background:#fff;color:#1A1A1A;font-family:DM Sans,sans-serif;display:inline-flex;align-items:center;gap:5px;transition:background .12s;white-space:nowrap; }
.pap-btn:hover { background:#F2F3F5; }
.pap-btn.primary { background:#C8241A;color:#fff;border-color:#C8241A; }
.pap-btn.primary:hover { background:#E8352A; }
.pap-count { font-size:12px;color:#8A8A8A;margin-left:auto;white-space:nowrap; }
.pap-body { flex:1;overflow:auto;padding:16px 18px; }
.pap-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px; }
.pap-card { background:#fff;border:1px solid #E2E4E9;border-radius:10px;padding:16px;transition:all .15s; }
.pap-card:hover { border-color:#C8241A;box-shadow:0 2px 12px rgba(200,36,26,.1);transform:translateY(-1px); }
.pap-card-head { display:flex;align-items:center;gap:10px;margin-bottom:10px; }
.pap-av { width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;background:#EDE4FA;color:#6B3FA0; }
.pap-nombre { font-weight:600;font-size:13.5px;margin-bottom:2px; }
.pap-id { font-size:11.5px;color:#8A8A8A;font-family:monospace; }
.pap-area { display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:#F3E8FF;color:#7C3AED;margin-bottom:8px; }
.pap-info { font-size:12px;color:#4A4A4A;display:flex;flex-direction:column;gap:3px; }
.pap-info-row { display:flex;align-items:center;gap:5px; }
.pap-badge { font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:20px; }
.pap-badge.activo { background:#E6F6EC;color:#0A7A3F; }
.pap-badge.inactivo { background:#F2F3F5;color:#8A8A8A; }
.pap-footer { display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px solid #EEF0F3; }
.pap-edit { padding:5px 12px;border-radius:7px;border:1.5px solid #E2E4E9;background:#fff;color:#1A1A1A;cursor:pointer;font-size:12px;font-family:DM Sans,sans-serif;display:inline-flex;align-items:center;gap:4px; }
.pap-edit:hover { background:#F2F3F5;border-color:#C8241A; }
.pap-empty { padding:60px 20px;text-align:center;color:#8A8A8A; }
.pa-mod-chip{display:inline-block;font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:20px;border:1px solid;margin-left:5px;letter-spacing:.2px}
</style>

<div id="sec-profapoyo">
  <!-- TOOLBAR -->
  <div class="pap-toolbar">
    <div class="pap-search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input class="pap-search" id="pap-search" type="text" placeholder="Buscar profesional, profesión…" oninput="paFiltrar()"/>
    </div>
    <select class="pap-select" id="pap-fil-estado" onchange="paFiltrar()">
      <option value="">Todos los estados</option>
      <option value="ACTIVO">Activos</option>
      <option value="INACTIVO">Inactivos</option>
    </select>
    <select class="pap-select" id="pap-fil-area" onchange="paFiltrar()">
      <option value="">Todas las áreas</option>
    </select>
    <button class="pap-btn" onclick="paCargar()">↺ Actualizar</button>
    <button class="pap-btn primary" onclick="goTo('prof-nuevo','Personal','Nuevo profesional')">+ Nuevo profesional</button>
    <span class="pap-count" id="pap-count">—</span>
  </div>

  <!-- GRID -->
  <div class="pap-body" id="pap-body">
    <div class="pap-empty">⏳ Cargando profesionales…</div>
  </div>
</div>

<script>
var paLista=[], paAreas=[];

function paAbrir(modo) {
  paCargarAreas();
  paCargar();
}

function paCargarAreas() {
  vzvRun().withSuccessHandler(function(resp){
    paAreas = resp&&resp.ok&&Array.isArray(resp.datos)?resp.datos.filter(function(a){return a.ESTADO==='ACTIVO';}):[];
    var sel=document.getElementById('pap-fil-area');
    while(sel.options.length>1) sel.remove(1);
    paAreas.forEach(function(a){ var o=document.createElement('option'); o.value=a.ID_AREA_APOYO; o.textContent=a.NOMBRE; sel.appendChild(o); });
  }).withFailureHandler(function(){}).ejecutar('listarMaestras',{tabla:'AREA_APOYO',usuario:sesion.USUARIO||'',rol:sesion.ROL||'',token:sesion.TOKEN||''});
}

function paCargar() {
  var body=document.getElementById('pap-body');
  body.innerHTML='<div class="pap-empty">⏳ Cargando profesionales…</div>';
  // DIAGNÓSTICO EN PANTALLA (sin F12)
  if(typeof sesion==='undefined' || !sesion){
    body.innerHTML='<div class="pap-empty" style="color:#C8241A">🔒 Variable sesion no disponible. (typeof='+(typeof sesion)+')</div>';
    return;
  }
  var respondio=false;
  var to=setTimeout(function(){
    if(!respondio){ body.innerHTML='<div class="pap-empty" style="color:#C8241A">⚠ El servidor NO respondió en 12s.<br>El profapoyo.gs o codigo.gs desplegado está desactualizado o roto.</div>'; }
  }, 12000);
  vzvRun().withSuccessHandler(function(resp){
    respondio=true; clearTimeout(to);
    // Mostrar el resultado CRUDO en pantalla para diagnóstico
    if(!resp){ body.innerHTML='<div style="padding:20px;color:#C8241A">DIAGNÓSTICO: el servidor devolvió null/undefined</div>'; return; }
    if(!resp.ok){ body.innerHTML='<div style="padding:20px;color:#C8241A">DIAGNÓSTICO: resp.ok=false → mensaje: '+(resp.mensaje||'(vacío)')+'</div>'; return; }
    var d=resp.datos||{};
    paLista=Array.isArray(d.datos)?d.datos:(Array.isArray(d)?d:[]);
    if(!paLista.length){
      body.innerHTML='<div style="padding:20px;color:#C8241A">DIAGNÓSTICO: respuesta OK pero lista vacía.<br>resp.datos = '+JSON.stringify(d).substring(0,300)+'</div>';
      return;
    }
    paFiltrar();
  }).withFailureHandler(function(e){
    respondio=true; clearTimeout(to);
    body.innerHTML='<div style="padding:20px;color:#C8241A">DIAGNÓSTICO - ERROR del servidor:<br>'+(e&&e.message?e.message:'desconocido')+'</div>';
  }).ejecutar('listarProfApoyo', { limite:500, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

function paFiltrar() {
  var q=(document.getElementById('pap-search').value||'').toUpperCase();
  var est=document.getElementById('pap-fil-estado').value;
  var area=document.getElementById('pap-fil-area').value;
  var f=paLista.filter(function(p){
    var okQ=!q || (p.NOMBRES+' '+p.APELLIDOS+' '+p.PROFESION+' '+p.ID_PROFESIONAL).toUpperCase().indexOf(q)>=0;
    var okE=!est || p.ESTADO===est;
    var okA=!area || p.ID_AREA_APOYO===area;
    return okQ&&okE&&okA;
  });
  paRender(f);
}

function paRender(lista) {
  var cont=document.getElementById('pap-body');
  document.getElementById('pap-count').textContent=lista.length+' profesional(es)';
  if(!lista.length){ cont.innerHTML='<div class="pap-empty">Sin profesionales registrados.</div>'; return; }
  var html='<div class="pap-grid">';
  lista.forEach(function(p){
    var ini=((p.NOMBRES||'?').charAt(0)+(p.APELLIDOS||'?').charAt(0)).toUpperCase();
    var badge=p.ESTADO==='ACTIVO'?'activo':'inactivo';
    var tel=(p.TELEFONO&&p.TELEFONO!=='-')?p.TELEFONO:'—';
    var email=(p.EMAIL&&p.EMAIL!=='-')?p.EMAIL:'';
    html+='<div class="pap-card">'+
      '<div class="pap-card-head">'+
        '<div class="pap-av">'+ini+'</div>'+
        '<div style="flex:1;min-width:0">'+
          '<div class="pap-nombre">'+(p.NOMBRES||'')+' '+(p.APELLIDOS||'')+'</div>'+
          '<div class="pap-id">'+(p.PROFESION||'—')+' · '+p.ID_PROFESIONAL+'</div>'+
        '</div>'+
      '</div>'+
      '<div class="pap-area">🔬 '+(p.AREA_NOMBRE||'Sin área')+'</div>'+
      '<div class="pap-info">'+
        '<div class="pap-info-row">📞 '+tel+'</div>'+
        (email?'<div class="pap-info-row">✉ '+email+'</div>':'')+
      '</div>'+
      '<div class="pap-footer">'+
        '<span class="pap-badge '+badge+'">'+(p.ESTADO||'')+'</span>'+
        paModalidadHTML(p.MODALIDADES)+
        '<button class="pap-edit" onclick="paEditar(\''+p.ID_PROFESIONAL+'\')">✏️ Editar</button>'+
      '</div>'+
    '</div>';
  });
  html+='</div>';
  cont.innerHTML=html;
}

// Editar lleva a la pantalla prof-nuevo y abre ese profesional
function paEditar(id) {
  goTo('prof-nuevo','Personal','Editar profesional');
  setTimeout(function(){ if(typeof pfSeleccionar==='function') pfSeleccionar(id); }, 400);
}
// Etiqueta(s) de modalidad de trabajo al costado del estado
var PA_MOD_INFO={
  FIJO:      {t:'Horario Fijo',      bg:'#EAF3FD', fg:'#1A6FC4', b:'#CFE2F7'},
  POR_TURNO: {t:'Horario Por Turno', bg:'#F3EEFB', fg:'#6B3FA0', b:'#E0D3F2'},
  VOLANTE:   {t:'Horario Volante',   bg:'#FFF0EE', fg:'#C8241A', b:'#F7D2CE'},
  MIXER:     {t:'Horario Mixer',     bg:'#E9F7F0', fg:'#0A7A3F', b:'#CDEBDC'}
};
function paModalidadHTML(mods){
  if(!mods || !mods.length) return '<span class="pa-mod-chip" style="background:#F4F5F7;color:#9AA0A6;border-color:#E2E4E9" title="Sin horario configurado">Sin Horario</span>';
  return mods.map(function(mo){
    var i=PA_MOD_INFO[String(mo).toUpperCase()]||{t:mo,bg:'#F4F5F7',fg:'#5A5F66',b:'#E2E4E9'};
    return '<span class="pa-mod-chip" style="background:'+i.bg+';color:'+i.fg+';border-color:'+i.b+'" title="Modalidad de trabajo">'+i.t+'</span>';
  }).join('');
}

</script>
