<style>
#sec-reportes { display:none;overflow:auto;position:absolute;top:56px;left:0;right:0;bottom:0;background:var(--bg,#F2F3F5); }
#sec-reportes.activo { display:block; }
.rp-wrap { padding:18px 22px; }
.rp-head { display:flex;justify-content:space-between;align-items:center;margin-bottom:16px; }
.rp-title { font-size:18px;font-weight:600;color:#1A1A1A; }
.rp-tabs { display:flex;gap:4px;border-bottom:1px solid #E2E4E9;margin-bottom:18px;flex-wrap:wrap; }
.rp-tab { padding:8px 13px;cursor:pointer;font-size:13px;color:#6B6B6B;border-bottom:2px solid transparent;user-select:none;white-space:nowrap; }
.rp-tab.activo { color:#C8241A;border-bottom-color:#C8241A;font-weight:600; }
.rp-card { background:#fff;border:1px solid #EEF0F3;border-radius:12px;padding:18px;margin-bottom:16px; }
.rp-fil { display:flex;gap:10px;flex-wrap:wrap;align-items:end;margin-bottom:16px; }
.rp-fg { display:flex;flex-direction:column;gap:3px; }
.rp-flabel { font-size:11.5px;color:#6B6B6B; }
.rp-finp { padding:8px 10px;border:1px solid #E2E4E9;border-radius:8px;font-size:13px; }
.rp-btn { padding:8px 14px;border:1px solid #E2E4E9;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:5px; }
.rp-btn.primary { background:#C8241A;color:#fff;border-color:#C8241A; }
.rp-stats { display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px; }
.rp-stat { flex:1;min-width:120px;background:#FAFBFC;border-radius:10px;padding:12px 14px; }
.rp-stat .lbl { font-size:11px;color:#8A8A8A;margin-bottom:3px; }
.rp-stat .val { font-size:18px;font-weight:600;color:#1A1A1A; }
.rp-stat.ok .val { color:#1F9D55; }
.rp-stat.warn .val { color:#C8241A; }
.rp-stat.info .val { color:#1A6FC4; }
.rp-table-wrap { overflow-x:auto; }
.rp-table { width:100%;border-collapse:collapse;font-size:12.5px; }
.rp-table th { text-align:left;padding:8px 9px;border-bottom:2px solid #EEF0F3;color:#6B6B6B;font-weight:600;font-size:11px;white-space:nowrap; }
.rp-table td { padding:7px 9px;border-bottom:1px solid #F2F3F5; }
.rp-badge { display:inline-block;padding:2px 7px;border-radius:9px;font-size:10.5px;font-weight:500; }
.rp-badge.ok { background:#E6F6EC;color:#1F9D55; }
.rp-badge.pend { background:#FDF0D5;color:#8A5A00; }
.rp-badge.ing { background:#E6F6EC;color:#1F9D55; }
.rp-badge.egr { background:#FAE6E4;color:#C8241A; }
.rp-monto { font-variant-numeric:tabular-nums;font-weight:500;text-align:right; }
.rp-empty { text-align:center;color:#8A8A8A;padding:30px 20px;font-size:13.5px; }
.rp-actions { display:flex;gap:8px;justify-content:flex-end;margin-bottom:10px; }
@media print {
  .rp-tabs, .rp-fil, .rp-actions, .sidebar, .topbar, #sidebar, .nav { display:none !important; }
  #sec-reportes { position:static;top:0; }
}
</style>

<div id="sec-reportes">
<div class="rp-wrap">
  <div class="rp-head"><div class="rp-title" id="rp-title">📊 Reportes</div></div>

  <div class="rp-tabs" id="rp-tabs" style="display:none">
    <div class="rp-tab activo" data-rep="ventas" onclick="rpTab('ventas')">Ventas</div>
    <div class="rp-tab" data-rep="citas" onclick="rpTab('citas')">Citas</div>
    <div class="rp-tab" data-rep="pacientes" onclick="rpTab('pacientes')">Pacientes</div>
    <div class="rp-tab" data-rep="medicos" onclick="rpTab('medicos')">Médicos</div>
    <div class="rp-tab" data-rep="caja" onclick="rpTab('caja')">Caja</div>
    <div class="rp-tab" data-rep="sesiones" onclick="rpTab('sesiones')">Sesiones</div>
    <div class="rp-tab" data-rep="paquetes" onclick="rpTab('paquetes')">Paquetes vendidos</div>
    <div class="rp-tab" data-rep="horarios" onclick="rpTab('horarios')">Horarios</div>
    <div class="rp-tab" data-rep="honorarios" onclick="rpTab('honorarios')">Honorarios</div>
  </div>

  <div class="rp-card">
    <div class="rp-fil">
      <div class="rp-fg"><label class="rp-flabel">Desde</label><input class="rp-finp" id="rp-desde" type="date"/></div>
      <div class="rp-fg"><label class="rp-flabel">Hasta</label><input class="rp-finp" id="rp-hasta" type="date"/></div>
      <div class="rp-fg" id="rp-fg-tipohorario" style="display:none"><label class="rp-flabel">Tipo</label><select class="rp-finp" id="rp-tipohorario" onchange="rpGenerar()"><option value="">Todos</option><option value="MEDICO">Solo médicos</option><option value="APOYO">Solo apoyo</option></select></div>
      <button class="rp-btn primary" onclick="rpGenerar()">🔍 Generar</button>
      <button class="rp-btn" onclick="rpMes()">Este mes</button>
      <button class="rp-btn" onclick="rpLimpiar()">Todo</button>
    </div>
    <div id="rp-stats" class="rp-stats"></div>

    <!-- Gráfico comparativo (solo reporte de ventas) — va ARRIBA de la lista -->
    <div id="rp-grafico-box" style="display:none;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid #EEF0F3">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px">
        <span style="font-size:14px;font-weight:700;color:#1A1A1A">📊 Comparativo de ventas</span>
        <div style="display:flex;gap:6px;margin-left:auto;align-items:center">
          <label style="font-size:12px;color:#555">Agrupar por:</label>
          <select id="rp-periodo" onchange="rpRenderGrafico()" style="padding:6px 10px;border:1px solid #E2E4E9;border-radius:7px;font-size:12.5px">
            <option value="mes">Mensual</option>
            <option value="trim">Trimestral</option>
            <option value="sem">Semestral</option>
            <option value="anio">Anual</option>
          </select>
          <label style="font-size:12px;color:#555;display:flex;align-items:center;gap:5px;margin-left:6px;cursor:pointer">
            <input type="checkbox" id="rp-comparar" onchange="rpRenderGrafico()" style="cursor:pointer"/> Comparar años
          </label>
        </div>
      </div>
      <div id="rp-grafico"></div>
    </div>

    <div class="rp-actions">
      <button class="rp-btn" onclick="rpExportar()">⬇ Exportar CSV</button>
      <button class="rp-btn" onclick="rpImprimir()">🖨 Imprimir</button>
    </div>
    <div id="rp-tabla"><div class="rp-empty">Seleccione un reporte y haga clic en Generar.</div></div>
  </div>
</div>
</div>

<script>
var rpRep='ventas', rpDatos=null;
var rpConfig={
  ventas:    { fn:'rptVentas',    titulo:'Reporte de Ventas' },
  citas:     { fn:'rptCitas',     titulo:'Reporte de Citas' },
  pacientes: { fn:'rptPacientes', titulo:'Reporte de Pacientes' },
  medicos:   { fn:'rptMedicos',   titulo:'Reporte de Médicos' },
  caja:      { fn:'rptCaja',      titulo:'Reporte de Caja' },
  sesiones:  { fn:'rptSesiones',  titulo:'Reporte de Sesiones' },
  paquetes:  { fn:'rptPaquetes',  titulo:'Reporte de Paquetes Vendidos' },
  horarios:  { fn:'rptHorarios',  titulo:'Reporte de Horarios' },
  honorarios:{ fn:'rptHonorarios', titulo:'Reporte de Honorarios' },
};

function rpAbrir(repInicial) {
  if(repInicial) rpRep=repInicial;
  rpTab(rpRep);
}

function rpTab(rep) {
  rpRep=rep;
  document.querySelectorAll('.rp-tab').forEach(function(t){ t.classList.toggle('activo', t.getAttribute('data-rep')===rep); });
  document.getElementById('rp-title').textContent='📊 '+rpConfig[rep].titulo;
  // El reporte de horarios usa selector de tipo (no fechas)
  var esHorarios = (rep==='horarios');
  var fgTipo=document.getElementById('rp-fg-tipohorario'); if(fgTipo) fgTipo.style.display = esHorarios?'':'none';
  rpGenerar();
}

function rpMes() {
  var hoy=new Date();
  var primero=new Date(hoy.getFullYear(), hoy.getMonth(), 1);
  document.getElementById('rp-desde').value=primero.toISOString().substring(0,10);
  document.getElementById('rp-hasta').value=hoy.toISOString().substring(0,10);
  rpGenerar();
}
function rpLimpiar() {
  document.getElementById('rp-desde').value='';
  document.getElementById('rp-hasta').value='';
  rpGenerar();
}

function rpGenerar() {
  var cont=document.getElementById('rp-tabla');
  var stats=document.getElementById('rp-stats');
  cont.innerHTML='<div class="rp-empty">Generando…</div>';
  stats.innerHTML='';
  var params={ usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' };
  var d=document.getElementById('rp-desde').value, h=document.getElementById('rp-hasta').value;
  if(d) params.fechaDesde=d; if(h) params.fechaHasta=h;
  if(rpRep==='horarios'){ var th=document.getElementById('rp-tipohorario'); if(th && th.value) params.tipoHorario=th.value; }
  vzvRun()
    .withSuccessHandler(function(resp){
      if(!resp||!resp.ok){ cont.innerHTML='<div class="rp-empty" style="color:#C8241A">⚠ '+(resp?resp.mensaje:'Error')+'</div>'; return; }
      rpDatos=resp.datos;
      rpRender();
    })
    .withFailureHandler(function(e){ cont.innerHTML='<div class="rp-empty" style="color:#C8241A">⚠ '+e.message+'</div>'; })
    .ejecutar(rpConfig[rpRep].fn, params);
}

function rpRender() {
  var d=rpDatos, t=d.totales, filas=d.filas;
  var stats=document.getElementById('rp-stats'), cont=document.getElementById('rp-tabla');
  // Ocultar el gráfico por defecto; solo el reporte de ventas lo muestra
  var gbox0=document.getElementById('rp-grafico-box'); if(gbox0 && rpRep!=='ventas') gbox0.style.display='none';

  // Stats + tabla según el reporte
  if(rpRep==='ventas'){
    stats.innerHTML=
      rpStat('Ventas', t.NUM)+rpStat('Total','S/ '+t.TOTAL,'ok')+rpStat('IGV','S/ '+t.IGV,'info')+rpStat('Descuentos','S/ '+t.DESCUENTO,'warn');
    cont.innerHTML=rpTabla(['Fecha','Comprobante','N°','Paciente','Subtotal','Desc.','IGV','Total','Estado'], filas.map(function(f){
      return ['<td>'+(f.FECHA||'')+'</td>','<td>'+(f.COMPROBANTE||'')+'</td>','<td class="rp-id">'+(f.NUMERO||'')+'</td>','<td>'+(f.PACIENTE||'')+'</td>',
        '<td class="rp-monto">'+(f.SUBTOTAL||'0.00')+'</td>','<td class="rp-monto">'+(f.DESCUENTO||'0.00')+'</td>','<td class="rp-monto">'+(f.IGV||'0.00')+'</td>',
        '<td class="rp-monto">S/ '+(f.TOTAL||'0.00')+'</td>','<td><span class="rp-badge '+(f.ESTADO_COMP==='ACEPTADO'||f.ESTADO_COMP==='EMITIDO'?'ok':'pend')+'">'+(f.ESTADO_COMP||'')+'</span></td>'].join('');
    }));
    // Mostrar y dibujar el gráfico comparativo
    var gbox=document.getElementById('rp-grafico-box'); if(gbox) gbox.style.display='';
    rpRenderGrafico();
  } else if(rpRep==='citas'){
    var porEst=t.POR_ESTADO||{};
    var statHtml=rpStat('Total citas', t.NUM);
    for(var e in porEst){ if(porEst.hasOwnProperty(e)) statHtml+=rpStat(e, porEst[e],'info'); }
    stats.innerHTML=statHtml;
    cont.innerHTML=rpTabla(['Fecha','Hora','Paciente','Médico','Especialidad','Estado','Pago'], filas.map(function(f){
      return ['<td>'+(f.FECHA||'')+'</td>','<td>'+(f.HORA||'')+'</td>','<td>'+(f.PACIENTE||'')+'</td>','<td>'+(f.MEDICO||'')+'</td>','<td>'+(f.ESPECIALIDAD||'')+'</td>',
        '<td>'+(f.ESTADO||'')+'</td>','<td><span class="rp-badge '+(f.PAGO==='PAGADO'?'ok':'pend')+'">'+(f.PAGO||'')+'</span></td>'].join('');
    }));
  } else if(rpRep==='pacientes'){
    stats.innerHTML=rpStat('Pacientes', t.NUM)+rpStat('Con citas', t.CON_CITAS,'info');
    cont.innerHTML=rpTabla(['Nombre','Tipo Doc','Documento','Teléfono','Correo','N° Citas','Registro','Estado'], filas.map(function(f){
      return ['<td>'+(f.NOMBRE||'')+'</td>','<td>'+(f.TDOC||'')+'</td>','<td>'+(f.DOCUMENTO||'')+'</td>','<td>'+(f.TELEFONO||'')+'</td>','<td>'+(f.CORREO||'')+'</td>',
        '<td style="text-align:center">'+(f.NUM_CITAS||0)+'</td>','<td>'+(f.FECHA_REGISTRO||'')+'</td>','<td>'+(f.ESTADO||'')+'</td>'].join('');
    }));
  } else if(rpRep==='medicos'){
    stats.innerHTML=rpStat('Médicos', t.NUM)+rpStat('Total citas', t.TOTAL_CITAS,'info');
    cont.innerHTML=rpTabla(['Médico','CMP','Especialidades','N° Citas','Atendidas','Estado'], filas.map(function(f){
      return ['<td>'+(f.NOMBRE||'')+'</td>','<td>'+(f.CMP||'')+'</td>','<td>'+(f.ESPECIALIDADES||'')+'</td>',
        '<td style="text-align:center">'+(f.NUM_CITAS||0)+'</td>','<td style="text-align:center">'+(f.ATENDIDAS||0)+'</td>','<td>'+(f.ESTADO||'')+'</td>'].join('');
    }));
  } else if(rpRep==='caja'){
    stats.innerHTML=rpStat('Movimientos', t.NUM)+rpStat('Ingresos','S/ '+t.INGRESOS,'ok')+rpStat('Egresos','S/ '+t.EGRESOS,'warn')+rpStat('Neto','S/ '+t.NETO,'info');
    cont.innerHTML=rpTabla(['Fecha','Hora','Tipo','Concepto','Modo','Monto','Usuario'], filas.map(function(f){
      return ['<td>'+(f.FECHA||'')+'</td>','<td>'+(f.HORA||'')+'</td>','<td><span class="rp-badge '+(f.TIPO==='INGRESO'?'ing':'egr')+'">'+(f.TIPO||'')+'</span></td>',
        '<td>'+(f.CONCEPTO||'')+'</td>','<td>'+(f.MODO_PAGO||'')+'</td>','<td class="rp-monto">S/ '+(f.MONTO||'0.00')+'</td>','<td>'+(f.USUARIO||'')+'</td>'].join('');
    }));
  } else if(rpRep==='sesiones'){
    stats.innerHTML=rpStat('Paquetes', t.NUM)+rpStat('Sesiones tot.', t.TOTAL_SESIONES,'info')+rpStat('Usadas', t.USADAS,'ok')+rpStat('Restantes', t.RESTANTES,'warn');
    cont.innerHTML=rpTabla(['Paciente','Paquete','Total','Usadas','Restantes','Inicio','Estado'], filas.map(function(f){
      return ['<td>'+(f.PACIENTE||'')+'</td>','<td>'+(f.PAQUETE||'')+'</td>','<td style="text-align:center">'+(f.TOTAL||0)+'</td>',
        '<td style="text-align:center">'+(f.USADAS||0)+'</td>','<td style="text-align:center">'+(f.RESTANTES||0)+'</td>','<td>'+(f.INICIO||'')+'</td>','<td>'+(f.ESTADO||'')+'</td>'].join('');
    }));
  } else if(rpRep==='horarios'){
    stats.innerHTML=rpStat('Horarios', t.NUM)+rpStat('Médicos', t.MEDICOS,'info')+rpStat('Apoyo', t.APOYO,'warn');
    cont.innerHTML=rpTabla(['Tipo','Profesional','Área / Especialidad','Día','Inicio','Fin','Intervalo'], filas.map(function(f){
      return ['<td><span class="rp-badge '+(f.TIPO==='MÉDICO'?'info':'warn')+'">'+(f.TIPO||'')+'</span></td>',
        '<td style="font-weight:500">'+(f.PROFESIONAL||'')+'</td>','<td>'+(f.AREA_ESP||'')+'</td>',
        '<td>'+(f.DIA||'')+'</td>','<td style="text-align:center">'+(f.HORA_INICIO||'')+'</td>',
        '<td style="text-align:center">'+(f.HORA_FIN||'')+'</td>','<td style="text-align:center">'+(f.INTERVALO||'')+'</td>'].join('');
    }));
  } else if(rpRep==='honorarios'){
    stats.innerHTML=rpStat('Personal', t.NUM)+rpStat('Total pagado','S/ '+t.TOTAL_PAGADO,'ok')+rpStat('Comisiones','S/ '+t.TOTAL_COMISION,'info')+rpStat('Turnos', t.TOTAL_TURNOS,'warn');
    cont.innerHTML=rpTabla(['Personal','Tipo','Turnos','Horas','Comisión generada','Total pagado'], filas.map(function(f){
      return ['<td style="font-weight:500">'+(f.NOMBRE||'')+'</td>','<td>'+(f.TIPO||'')+'</td>',
        '<td style="text-align:center">'+(f.TURNOS||0)+'</td>','<td style="text-align:center">'+(f.HORAS||0)+'</td>',
        '<td class="rp-monto">S/ '+(f.COMISION||'0.00')+'</td>','<td class="rp-monto" style="font-weight:600;color:#0A7A3F">S/ '+(f.PAGADO||'0.00')+'</td>'].join('');
    }));
  } else if(rpRep==='paquetes'){
    stats.innerHTML=rpStat('Paquetes distintos', t.NUM)+rpStat('Unidades', t.CANTIDAD,'info')+rpStat('Total vendido','S/ '+t.TOTAL,'ok');
    cont.innerHTML=rpTabla(['Paquete','Cantidad','Total'], filas.map(function(f){
      return ['<td>'+(f.PAQUETE||'')+'</td>','<td style="text-align:center">'+(f.CANTIDAD||0)+'</td>','<td class="rp-monto">S/ '+(f.TOTAL||'0.00')+'</td>'].join('');
    }));
  }
}

// ════════════════════════════════════════════════════════════
//  GRÁFICO COMPARATIVO DE VENTAS (por período, con comparación de años)
//  Agrupa en el frontend las filas ya cargadas (FECHA + TOTAL).
// ════════════════════════════════════════════════════════════
function rpPeriodoLabel(fecha, modo) {
  // fecha 'YYYY-MM-DD...' → devuelve {anio, clave, etiqueta}
  var s=String(fecha||''); if(s.length<7) return null;
  var anio=s.substring(0,4), mes=parseInt(s.substring(5,7));
  if(isNaN(mes)) return null;
  if(modo==='mes'){ var mm=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    return { anio:anio, orden:mes, etiqueta:mm[mes-1] }; }
  if(modo==='trim'){ var t=Math.ceil(mes/3); return { anio:anio, orden:t, etiqueta:'T'+t }; }
  if(modo==='sem'){ var se=mes<=6?1:2; return { anio:anio, orden:se, etiqueta:'S'+se }; }
  return { anio:anio, orden:0, etiqueta:anio }; // anual
}

function rpRenderGrafico() {
  var cont=document.getElementById('rp-grafico');
  if(!cont || !rpDatos || !rpDatos.filas) return;
  var modo=(document.getElementById('rp-periodo')||{}).value||'mes';
  var comparar=(document.getElementById('rp-comparar')||{}).checked;

  // Agrupar: mapa[clavePeriodo][anio] = suma
  var grupos={}, anios={}, ordenPeriodo={};
  rpDatos.filas.forEach(function(f){
    var p=rpPeriodoLabel(f.FECHA, modo); if(!p) return;
    var monto=parseFloat(String(f.TOTAL).replace(/,/g,''))||0;
    var clave=p.etiqueta;
    ordenPeriodo[clave]=p.orden;
    if(!grupos[clave]) grupos[clave]={};
    grupos[clave][p.anio]=(grupos[clave][p.anio]||0)+monto;
    anios[p.anio]=true;
  });

  var listaAnios=Object.keys(anios).sort();
  var listaPeriodos=Object.keys(grupos).sort(function(a,b){ return ordenPeriodo[a]-ordenPeriodo[b]; });
  if(!listaPeriodos.length){ cont.innerHTML='<div class="rp-empty">Sin datos para graficar en el rango seleccionado.</div>'; return; }

  // Colores por año
  var colores=['#C8241A','#1A6FC4','#1F9D55','#B8860B','#7C4DB8','#0A9396'];
  // Máximo para escalar
  var maxV=0;
  listaPeriodos.forEach(function(pk){ listaAnios.forEach(function(an){ var v=grupos[pk][an]||0; if(v>maxV) maxV=v; }); });
  if(maxV===0) maxV=1;

  // Si NO comparar años: una sola barra por período (suma de todos los años)
  var aniosDibujar = comparar ? listaAnios : ['_TOTAL_'];
  if(!comparar){
    var g2={}; listaPeriodos.forEach(function(pk){ var suma=0; listaAnios.forEach(function(an){ suma+=grupos[pk][an]||0; }); g2[pk]={ _TOTAL_:suma }; });
    grupos=g2; maxV=0; listaPeriodos.forEach(function(pk){ if(grupos[pk]._TOTAL_>maxV) maxV=grupos[pk]._TOTAL_; }); if(maxV===0) maxV=1;
  }

  var H=180; // alto del área de barras
  var html='<div style="display:flex;align-items:flex-end;gap:'+(comparar?'14':'8')+'px;height:'+(H+40)+'px;overflow-x:auto;padding:8px 4px;border-bottom:2px solid #E2E4E9">';
  listaPeriodos.forEach(function(pk){
    html+='<div style="display:flex;flex-direction:column;align-items:center;min-width:'+(comparar? (listaAnios.length*22+10):'44')+'px">';
    html+='<div style="display:flex;align-items:flex-end;gap:3px;height:'+H+'px">';
    aniosDibujar.forEach(function(an,idx){
      var v=grupos[pk][an]||0;
      var h=Math.round((v/maxV)*H);
      var col=comparar?colores[idx%colores.length]:'#C8241A';
      html+='<div title="'+(comparar?an+' · ':'')+pk+': S/ '+v.toFixed(2)+'" style="width:'+(comparar?'18':'34')+'px;height:'+Math.max(h,2)+'px;background:'+col+';border-radius:4px 4px 0 0"></div>';
    });
    html+='</div>';
    html+='<div style="font-size:11px;color:#555;margin-top:6px;font-weight:600">'+pk+'</div>';
    html+='</div>';
  });
  html+='</div>';

  // Leyenda (solo si compara años)
  if(comparar){
    html+='<div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;justify-content:center">';
    listaAnios.forEach(function(an,idx){
      html+='<span style="font-size:12px;color:#555;display:flex;align-items:center;gap:5px"><span style="width:12px;height:12px;border-radius:3px;background:'+colores[idx%colores.length]+';display:inline-block"></span>'+an+'</span>';
    });
    html+='</div>';
  }
  // Total y máximo
  html+='<div style="font-size:11.5px;color:#8A8A8A;margin-top:10px;text-align:right">Máximo del período: S/ '+maxV.toFixed(2)+'</div>';
  cont.innerHTML=html;
}

function rpStat(lbl, val, cls) {
  return '<div class="rp-stat '+(cls||'')+'"><div class="lbl">'+lbl+'</div><div class="val">'+val+'</div></div>';
}
function rpTabla(headers, filasHtml) {
  if(!filasHtml.length) return '<div class="rp-empty">Sin datos para el período seleccionado.</div>';
  var th=headers.map(function(h){ return '<th>'+h+'</th>'; }).join('');
  var tr=filasHtml.map(function(f){ return '<tr>'+f+'</tr>'; }).join('');
  return '<div class="rp-table-wrap"><table class="rp-table" id="rp-tabla-data"><thead><tr>'+th+'</tr></thead><tbody>'+tr+'</tbody></table></div>';
}

// ════ EXPORTAR CSV ════
function rpExportar() {
  var tabla=document.getElementById('rp-tabla-data');
  if(!tabla){ alert('⚠ Genere un reporte primero'); return; }
  var csv=[];
  // Encabezados
  var ths=tabla.querySelectorAll('thead th');
  var head=[]; ths.forEach(function(th){ head.push('"'+th.textContent.replace(/"/g,'""')+'"'); });
  csv.push(head.join(','));
  // Filas
  tabla.querySelectorAll('tbody tr').forEach(function(tr){
    var row=[]; tr.querySelectorAll('td').forEach(function(td){ row.push('"'+td.textContent.replace(/"/g,'""')+'"'); });
    csv.push(row.join(','));
  });
  var blob=new Blob(['\ufeff'+csv.join('\n')], { type:'text/csv;charset=utf-8;' });
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download=rpConfig[rpRep].titulo.replace(/ /g,'_')+'_'+new Date().toISOString().substring(0,10)+'.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ════ IMPRIMIR ════
function rpImprimir() {
  var tabla=document.getElementById('rp-tabla-data');
  if(!tabla){ alert('⚠ Genere un reporte primero'); return; }
  var d=document.getElementById('rp-desde').value, h=document.getElementById('rp-hasta').value;
  var rango = (d||h) ? ('Período: '+(d||'inicio')+' a '+(h||'hoy')) : 'Todos los registros';
  var stats=document.getElementById('rp-stats').innerHTML;
  var win=window.open('', '_blank', 'width=900,height=650');
  win.document.write('<html><head><title>'+rpConfig[rpRep].titulo+'</title><style>'+
    'body{font-family:Arial,sans-serif;font-size:12px;padding:20px;color:#000}'+
    'h2{margin:0 0 4px}.sub{color:#666;font-size:12px;margin-bottom:14px}'+
    'table{width:100%;border-collapse:collapse;margin-top:10px}'+
    'th,td{padding:5px 7px;border:1px solid #ccc;font-size:11px;text-align:left}'+
    'th{background:#f0f0f0}.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}'+
    '.rp-stat{background:#f7f7f7;border-radius:6px;padding:8px 12px}.rp-stat .lbl{font-size:10px;color:#888}.rp-stat .val{font-size:15px;font-weight:bold}'+
    '@media print{.noprint{display:none}}</style></head><body>'+
    '<h2>VIZVALL CONSULTORIOS MÉDICOS</h2>'+
    '<div class="sub">'+rpConfig[rpRep].titulo+' · '+rango+' · Generado: '+new Date().toLocaleString('es-PE')+'</div>'+
    '<div class="stats">'+stats+'</div>'+
    tabla.outerHTML+
    '<div class="noprint" style="margin-top:16px"><button onclick="window.print()">🖨 Imprimir</button></div>'+
    '</body></html>');
  win.document.close();
}
</script>
