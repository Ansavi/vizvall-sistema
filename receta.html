<style>
#sec-receta { display:none;overflow:auto;position:absolute;top:56px;left:0;right:0;bottom:0;background:var(--bg,#F2F3F5); }
#sec-receta.activo { display:block; }
.rc-wrap { padding:18px 22px; }
.rc-head { margin-bottom:16px; }
.rc-title { font-size:18px;font-weight:600;color:#1A1A1A; }
.rc-sub { font-size:13px;color:#8A8A8A;margin-top:3px; }
.rc-tabs { display:flex;gap:8px;margin-bottom:16px; }
.rc-tab { padding:9px 18px;border:1.5px solid #E2E4E9;border-radius:9px;background:#fff;cursor:pointer;font-size:13.5px;font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:all .15s; }
.rc-tab:hover { border-color:#C8241A; }
.rc-tab.sel { background:#C8241A;color:#fff;border-color:#C8241A; }
.rc-card { background:#fff;border:1px solid #EEF0F3;border-radius:12px;padding:0;margin-bottom:16px;overflow:hidden; }
.rc-list-item { display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid #F2F3F5;transition:background .1s; }
.rc-list-item:last-child { border-bottom:none; }
.rc-list-item:hover { background:#FAFBFC; }
.rc-li-icon { width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0; }
.rc-li-nombre { font-weight:500;font-size:13.5px;color:#1A1A1A; }
.rc-li-meta { font-size:12px;color:#8A8A8A;margin-top:2px; }
.rc-li-chip { font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px; }
.rc-li-chip.con { background:#E6F6EC;color:#0A7A3F; }
.rc-li-chip.sin { background:#F2F3F5;color:#9A9A9A; }
.rc-btn { padding:8px 15px;border:1px solid #E2E4E9;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:6px;font-family:DM Sans,sans-serif; }
.rc-btn.primary { background:#C8241A;color:#fff;border-color:#C8241A; }
.rc-btn.sm { padding:5px 12px;font-size:12px; }
.rc-btn:disabled { opacity:.5;cursor:not-allowed; }
.rc-finp { width:100%;padding:9px 11px;border:1px solid #E2E4E9;border-radius:8px;font-size:13.5px;box-sizing:border-box;background:#fff;font-family:DM Sans,sans-serif; }
.rc-finp:focus { border-color:#C8241A;outline:none; }
.rc-empty { text-align:center;color:#8A8A8A;padding:40px 20px;font-size:13.5px; }
.rc-search-input { padding:8px 12px;border:1.5px solid #E2E4E9;border-radius:8px;font-size:13px;width:280px;outline:none;font-family:DM Sans,sans-serif; }
.rc-search-input:focus { border-color:#C8241A; }
/* Panel de edición (modal lateral) */
.rc-panel-ov { position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center; }
.rc-panel-ov.open { display:flex; }
.rc-panel { background:#fff;border-radius:12px;width:560px;max-width:94%;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.18); }
.rc-panel-head { padding:14px 18px;border-bottom:1px solid #EEF0F3;display:flex;align-items:center;justify-content:space-between; }
.rc-panel-title { font-size:15px;font-weight:600; }
.rc-panel-body { flex:1;overflow-y:auto;padding:16px 18px; }
.rc-panel-foot { padding:12px 18px;border-top:1px solid #EEF0F3;display:flex;justify-content:flex-end;gap:8px; }
.rc-ins-row { display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid #EEF0F3;border-radius:8px;margin-bottom:6px;font-size:13px; }
.rc-ins-cant { font-weight:600;color:#C8241A;font-family:monospace; }
.rc-add-row { display:grid;grid-template-columns:2fr 1fr auto;gap:10px;align-items:end;background:#FAFBFC;border-radius:8px;padding:12px;margin-top:10px; }
.rc-result { position:absolute;background:#fff;border:1px solid #E2E4E9;border-radius:8px;max-height:200px;overflow:auto;z-index:60;box-shadow:0 4px 12px rgba(0,0,0,.1);min-width:260px; }
.rc-result div { padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #F2F3F5; }
.rc-result div:hover { background:#FAFBFC; }
.rc-stock-bad { color:#C8241A;font-weight:600; }
@media(max-width:600px){ .rc-add-row{grid-template-columns:1fr} }
</style>

<div id="sec-receta">
<div class="rc-wrap">
  <div class="rc-head">
    <div class="rc-title">🧪 Insumos por servicio</div>
    <div class="rc-sub">Define qué insumos consume cada servicio o paquete. Al vender, se descuentan automáticamente del stock.</div>
  </div>

  <!-- Botones Servicios / Paquetes -->
  <div class="rc-tabs">
    <div class="rc-tab sel" id="rc-tab-serv" onclick="rcVista('servicios')">🩺 Servicios</div>
    <div class="rc-tab" id="rc-tab-paq" onclick="rcVista('paquetes')">📦 Paquetes</div>
  </div>

  <!-- Toolbar -->
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">
    <input class="rc-search-input" id="rc-search" type="text" placeholder="Buscar…" oninput="rcFiltrar()"/>
    <button class="rc-btn" onclick="rcCargarLista()">↺ Actualizar</button>
    <span style="font-size:12px;color:#8A8A8A;margin-left:auto" id="rc-count">—</span>
  </div>

  <!-- Lista -->
  <div class="rc-card">
    <div id="rc-lista"><div class="rc-empty">⏳ Cargando…</div></div>
  </div>
</div>
</div><!-- /sec-receta -->

<!-- PANEL DE EDICIÓN DE RECETA -->
<div class="rc-panel-ov" id="rc-panel">
  <div class="rc-panel">
    <div class="rc-panel-head">
      <span class="rc-panel-title" id="rc-panel-title">Receta</span>
      <button class="rc-btn sm" onclick="rcCerrarPanel()">✕</button>
    </div>
    <div class="rc-panel-body">
      <div style="font-size:11px;font-weight:600;text-transform:uppercase;color:#8A8A8A;margin-bottom:8px">Insumos de la receta</div>
      <div id="rc-panel-insumos"><div class="rc-empty">Cargando…</div></div>

      <div style="border-top:1px dashed #E2E4E9;margin:14px 0 10px"></div>
      <div style="font-size:11px;font-weight:600;text-transform:uppercase;color:#8A8A8A;margin-bottom:8px">Agregar insumo</div>
      <div class="rc-add-row">
        <div style="position:relative">
          <label style="font-size:11.5px;color:#666;display:block;margin-bottom:3px">Insumo</label>
          <input class="rc-finp" id="rc-prod-search" type="text" placeholder="Buscar producto…" autocomplete="off" oninput="rcBuscarProd()"/>
          <input type="hidden" id="rc-prod-id"/>
          <div id="rc-prod-result"></div>
        </div>
        <div>
          <label style="font-size:11.5px;color:#666;display:block;margin-bottom:3px">Cantidad</label>
          <input class="rc-finp" id="rc-prod-cant" type="number" min="0" step="0.01" placeholder="0"/>
        </div>
        <button class="rc-btn primary" onclick="rcAgregar()">+ Agregar</button>
      </div>
    </div>
    <div class="rc-panel-foot">
      <button class="rc-btn" onclick="rcCerrarPanel()">Cerrar</button>
    </div>
  </div>
</div>

<script>
// ═══ RECETAS — prefijo "rc" · soporta Servicios y Paquetes ═══
var rcVistaActual='servicios';
var rcItems=[];        // lista de servicios o paquetes
var rcConReceta={};    // mapa id → total insumos
var rcProductos=[];    // catálogo de insumos
var rcProdSel=null;
var rcEditId=null;     // id del servicio/paquete en edición

function rcAbrir() {
  rcCargarProductos();
  rcVista('servicios');
}

function rcVista(v) {
  rcVistaActual=v;
  document.getElementById('rc-tab-serv').classList.toggle('sel', v==='servicios');
  document.getElementById('rc-tab-paq').classList.toggle('sel', v==='paquetes');
  document.getElementById('rc-search').value='';
  rcCargarLista();
}

function rcCargarProductos() {
  google.script.run.withSuccessHandler(function(resp){
    rcProductos = resp&&resp.ok&&Array.isArray(resp.datos)?resp.datos:[];
  }).withFailureHandler(function(){}).ejecutar('listarProductos',{soloActivos:true,usuario:sesion.USUARIO||'',rol:sesion.ROL||'',token:sesion.TOKEN||''});
}

function rcCargarLista() {
  var body=document.getElementById('rc-lista');
  body.innerHTML='<div class="rc-empty">⏳ Cargando…</div>';
  var esServ = rcVistaActual==='servicios';
  // 1. Cargar los que tienen receta (para el conteo)
  var accionReceta = esServ ? 'listarServiciosConReceta' : 'listarPaquetesConReceta';
  google.script.run.withSuccessHandler(function(respR){
    rcConReceta={};
    if(respR&&respR.ok&&Array.isArray(respR.datos)){
      respR.datos.forEach(function(x){
        var id = esServ ? x.ID_SERVICIO : x.ID_PAQUETE;
        rcConReceta[id] = x.TOTAL_INSUMOS;
      });
    }
    // 2. Cargar TODOS los servicios/paquetes
    var accionLista = esServ ? 'listarServicios' : 'listarPaquetes';
    google.script.run.withSuccessHandler(function(resp){
      var datos = resp&&resp.ok ? (Array.isArray(resp.datos)?resp.datos:(resp.datos&&resp.datos.datos?resp.datos.datos:[])) : [];
      rcItems = datos.filter(function(x){ return x.ESTADO==='ACTIVO'; });
      rcFiltrar();
    }).withFailureHandler(function(e){ body.innerHTML='<div class="rc-empty" style="color:#C8241A">Error: '+e.message+'</div>'; })
      .ejecutar(accionLista, { estado:'ACTIVO', limite:500, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
  }).withFailureHandler(function(){
    // Si falla el conteo, igual cargar la lista
    rcConReceta={}; rcCargarLista2();
  }).ejecutar(accionReceta, { usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

function rcCargarLista2() {
  var esServ = rcVistaActual==='servicios';
  var accionLista = esServ ? 'listarServicios' : 'listarPaquetes';
  google.script.run.withSuccessHandler(function(resp){
    var datos = resp&&resp.ok ? (Array.isArray(resp.datos)?resp.datos:(resp.datos&&resp.datos.datos?resp.datos.datos:[])) : [];
    rcItems = datos.filter(function(x){ return x.ESTADO==='ACTIVO'; });
    rcFiltrar();
  }).withFailureHandler(function(){}).ejecutar(accionLista, { estado:'ACTIVO', limite:500, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

function rcFiltrar() {
  var q=(document.getElementById('rc-search').value||'').toUpperCase();
  var esServ = rcVistaActual==='servicios';
  var f=rcItems.filter(function(x){
    var nom = esServ ? x.NOMBRE_SERVICIO : x.NOMBRE_PAQUETE;
    return !q || (nom||'').toUpperCase().indexOf(q)>=0;
  });
  rcRender(f);
}

function rcRender(lista) {
  var body=document.getElementById('rc-lista');
  var esServ = rcVistaActual==='servicios';
  document.getElementById('rc-count').textContent=lista.length+(esServ?' servicio(s)':' paquete(s)');
  if(!lista.length){ body.innerHTML='<div class="rc-empty">Sin '+(esServ?'servicios':'paquetes')+' activos.</div>'; return; }
  var icon = esServ ? '🩺' : '📦';
  var iconBg = esServ ? '#E6F1FB' : '#F3E8FF';
  body.innerHTML=lista.map(function(x){
    var id = esServ ? x.ID_SERVICIO : x.ID_PAQUETE;
    var nom = esServ ? x.NOMBRE_SERVICIO : x.NOMBRE_PAQUETE;
    var total = rcConReceta[id]||0;
    var chip = total>0
      ? '<span class="rc-li-chip con">'+total+' insumo'+(total>1?'s':'')+'</span>'
      : '<span class="rc-li-chip sin">Sin receta</span>';
    return '<div class="rc-list-item">'+
      '<div class="rc-li-icon" style="background:'+iconBg+'">'+icon+'</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div class="rc-li-nombre">'+(nom||'—')+'</div>'+
        '<div class="rc-li-meta">'+id+'</div>'+
      '</div>'+
      chip+
      '<button class="rc-btn sm" onclick="rcEditar(\''+id+'\',\''+(nom||'').replace(/'/g,"\\\\'")+'\')">✏️ Editar</button>'+
    '</div>';
  }).join('');
}

// ─── PANEL DE EDICIÓN ───
function rcEditar(id, nombre) {
  rcEditId=id;
  rcProdSel=null;
  document.getElementById('rc-panel-title').textContent='Receta: '+nombre;
  document.getElementById('rc-prod-search').value='';
  document.getElementById('rc-prod-id').value='';
  document.getElementById('rc-prod-cant').value='';
  document.getElementById('rc-prod-result').innerHTML='';
  document.getElementById('rc-panel').classList.add('open');
  rcCargarInsumos();
}

function rcCargarInsumos() {
  var cont=document.getElementById('rc-panel-insumos');
  cont.innerHTML='<div class="rc-empty">Cargando…</div>';
  var esServ = rcVistaActual==='servicios';
  var accion = esServ ? 'listarRecetaServicio' : 'listarRecetaPaquete';
  var params = { usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' };
  if(esServ) params.ID_SERVICIO=rcEditId; else params.ID_PAQUETE=rcEditId;
  google.script.run.withSuccessHandler(function(resp){
    var receta = resp&&resp.ok&&Array.isArray(resp.datos)?resp.datos:[];
    rcRenderInsumos(receta);
  }).withFailureHandler(function(e){ cont.innerHTML='<div class="rc-empty" style="color:#C8241A">Error: '+e.message+'</div>'; })
    .ejecutar(accion, params);
}

function rcRenderInsumos(receta) {
  var cont=document.getElementById('rc-panel-insumos');
  if(!receta.length){ cont.innerHTML='<div class="rc-empty" style="padding:20px">Sin insumos. Agregue el primero abajo.</div>'; return; }
  var esServ = rcVistaActual==='servicios';
  cont.innerHTML=receta.map(function(r){
    var idIns = esServ ? r.ID_SERVICIO_INSUMO : r.ID_PAQUETE_INSUMO;
    var stockBad = (parseFloat(r.STOCK_ACTUAL)||0) < (parseFloat(r.CANTIDAD)||0);
    return '<div class="rc-ins-row">'+
      '<span style="flex:1">'+(r.PRODUCTO_NOMBRE||r.ID_PRODUCTO)+'</span>'+
      '<span class="rc-ins-cant">x'+r.CANTIDAD+'</span>'+
      '<span style="font-size:11.5px;color:'+(stockBad?'#C8241A':'#8A8A8A')+'">stock: '+r.STOCK_ACTUAL+' '+(r.UNIDAD_MEDIDA||'')+'</span>'+
      '<button class="rc-btn sm" style="color:#C8241A;border-color:#F5C2C0" onclick="rcQuitar(\''+idIns+'\')">✕</button>'+
    '</div>';
  }).join('');
}

function rcBuscarProd() {
  var q=(document.getElementById('rc-prod-search').value||'').toUpperCase();
  var box=document.getElementById('rc-prod-result');
  if(q.length<1){ box.innerHTML=''; return; }
  var f=rcProductos.filter(function(p){ return (p.NOMBRE||'').toUpperCase().indexOf(q)>=0; }).slice(0,8);
  if(!f.length){ box.innerHTML='<div class="rc-result"><div style="color:#8A8A8A">Sin resultados</div></div>'; return; }
  box.innerHTML='<div class="rc-result">'+f.map(function(p){
    return '<div onclick="rcSelProd(\''+p.ID_PRODUCTO+'\')">'+p.NOMBRE+' <span style="color:#8A8A8A;font-size:11.5px">('+(p.UNIDAD_MEDIDA||'')+', stock '+p.STOCK+')</span></div>';
  }).join('')+'</div>';
}

function rcSelProd(id) {
  rcProdSel=rcProductos.find(function(p){ return p.ID_PRODUCTO===id; });
  if(!rcProdSel) return;
  document.getElementById('rc-prod-search').value=rcProdSel.NOMBRE;
  document.getElementById('rc-prod-id').value=id;
  document.getElementById('rc-prod-result').innerHTML='';
}

function rcAgregar() {
  var idProd=document.getElementById('rc-prod-id').value;
  var cant=document.getElementById('rc-prod-cant').value;
  if(!idProd){ alert('⚠ Busque y seleccione un insumo'); return; }
  if(!cant||parseFloat(cant)<=0){ alert('⚠ Indique una cantidad mayor a 0'); return; }
  var esServ = rcVistaActual==='servicios';
  var accion = esServ ? 'agregarInsumoReceta' : 'agregarInsumoRecetaPaquete';
  var params = { ID_PRODUCTO:idProd, CANTIDAD:cant, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' };
  if(esServ) params.ID_SERVICIO=rcEditId; else params.ID_PAQUETE=rcEditId;
  google.script.run.withSuccessHandler(function(resp){
    if(!resp||!resp.ok){ alert('⚠ '+(resp?resp.mensaje:'Error')); return; }
    document.getElementById('rc-prod-search').value='';
    document.getElementById('rc-prod-id').value='';
    document.getElementById('rc-prod-cant').value='';
    rcProdSel=null;
    rcCargarInsumos();      // refresca insumos del panel
    rcCargarLista();        // refresca el conteo en la lista (sin F5)
  }).withFailureHandler(function(e){ alert('⚠ '+e.message); }).ejecutar(accion, params);
}

function rcQuitar(idIns) {
  if(!confirm('¿Quitar este insumo de la receta?')) return;
  var esServ = rcVistaActual==='servicios';
  var accion = esServ ? 'quitarInsumoReceta' : 'quitarInsumoRecetaPaquete';
  var params = { usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' };
  if(esServ) params.ID_SERVICIO_INSUMO=idIns; else params.ID_PAQUETE_INSUMO=idIns;
  google.script.run.withSuccessHandler(function(resp){
    if(!resp||!resp.ok){ alert('⚠ '+(resp?resp.mensaje:'Error')); return; }
    rcCargarInsumos();
    rcCargarLista();
  }).withFailureHandler(function(e){ alert('⚠ '+e.message); }).ejecutar(accion, params);
}

function rcCerrarPanel() {
  document.getElementById('rc-panel').classList.remove('open');
  rcEditId=null;
}
</script>
