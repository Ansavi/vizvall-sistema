<!-- MODULO: HORARIOS MÉDICOS (calendario 3 vistas) — prefijo "ho" -->
<style>
#sec-horarios { display:none;overflow:hidden;position:absolute;top:56px;left:0;right:0;bottom:0;flex-direction:column;background:var(--bg,#F2F3F5); }
#sec-horarios.activo { display:flex; }
.ho-toolbar { background:#fff;border-bottom:1px solid #E2E4E9;padding:10px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap; }
.ho-title { font-size:15px;font-weight:600;margin-right:auto; }
.ho-sel-med { padding:7px 12px;border:1.5px solid #E2E4E9;border-radius:8px;font-size:13px;font-family:DM Sans,sans-serif;background:#fff;outline:none;min-width:260px; }
.ho-sel-med:focus { border-color:#C8241A; }
.ho-tabs { display:inline-flex;border:1.5px solid #E2E4E9;border-radius:8px;overflow:hidden; }
.ho-tab { padding:7px 16px;font-size:12.5px;font-weight:500;cursor:pointer;background:#fff;border:none;font-family:DM Sans,sans-serif;color:#4A4A4A; }
.ho-tab.activo { background:#C8241A;color:#fff; }
.ho-btn { padding:7px 14px;border-radius:8px;font-size:12.5px;font-weight:500;cursor:pointer;border:1.5px solid #E2E4E9;background:#fff;color:#1A1A1A;font-family:DM Sans,sans-serif;display:inline-flex;align-items:center;gap:5px; }
.ho-btn:hover { background:#F2F3F5; }
.ho-btn.primary { background:#C8241A;color:#fff;border-color:#C8241A; }
.ho-btn.primary:hover { background:#E8352A; }
.ho-btn.sm { padding:4px 10px;font-size:11.5px; }
.ho-body { flex:1;overflow:auto;padding:16px 18px; }
.ho-empty { padding:50px 20px;text-align:center;color:#8A8A8A; }
/* Leyenda */
.ho-leyenda { display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px;font-size:12px; }
.ho-ley-item { display:flex;align-items:center;gap:5px; }
.ho-ley-color { width:14px;height:14px;border-radius:3px; }
/* Grilla semanal */
.ho-grid { background:#fff;border:1px solid #E2E4E9;border-radius:10px;overflow:hidden;width:100%;border-collapse:collapse; }
.ho-grid th { padding:8px 4px;font-size:11px;font-weight:600;text-transform:uppercase;color:#8A8A8A;background:#FAFBFC;border-bottom:1px solid #E2E4E9;border-right:1px solid #EEF0F3;text-align:center; }
.ho-grid th.ho-hora-col { width:60px; }
.ho-grid td { border-bottom:1px solid #F4F5F7;border-right:1px solid #F4F5F7;height:30px;vertical-align:top;position:relative; }
.ho-grid td.ho-hora-cell { font-size:11px;color:#8A8A8A;text-align:right;padding-right:6px;font-family:monospace;background:#FAFBFC;vertical-align:middle; }
.ho-grid td.ho-slot { cursor:pointer; }
.ho-grid td.ho-slot:hover { background:#FDECEA; }
.ho-bloque { position:absolute;left:1px;right:1px;border-radius:4px;padding:2px 5px;font-size:10px;color:#fff;cursor:pointer;overflow:hidden;z-index:2;box-shadow:0 1px 2px rgba(0,0,0,.15); }
.ho-bloque:hover { filter:brightness(1.08);z-index:3; }
/* Lista */
.ho-lista-dia { background:#fff;border:1px solid #E2E4E9;border-radius:10px;margin-bottom:12px;overflow:hidden; }
.ho-lista-dia-head { padding:9px 14px;background:#FAFBFC;border-bottom:1px solid #E2E4E9;font-weight:600;font-size:13px; }
.ho-lista-item { display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid #F4F5F7;font-size:13px; }
.ho-lista-item:last-child { border-bottom:none; }
.ho-lista-color { width:10px;height:10px;border-radius:50%;flex-shrink:0; }
.ho-lista-hora { font-family:monospace;color:#4A4A4A; }
.ho-lista-del { margin-left:auto;padding:3px 9px;border-radius:6px;border:1px solid #FAD4D1;background:#FDECEA;color:#C8241A;cursor:pointer;font-size:11px;font-family:DM Sans,sans-serif; }
/* Mes */
.ho-mes { background:#fff;border:1px solid #E2E4E9;border-radius:10px;width:100%;border-collapse:collapse; }
.ho-mes th { padding:9px;font-size:11px;font-weight:600;text-transform:uppercase;color:#8A8A8A;background:#FAFBFC;border:1px solid #EEF0F3; }
.ho-mes td { border:1px solid #EEF0F3;height:70px;vertical-align:top;padding:5px;font-size:12px; }
.ho-mes-dia { font-weight:600;color:#4A4A4A;margin-bottom:3px; }
.ho-mes-marca { font-size:9px;padding:1px 4px;border-radius:3px;color:#fff;margin-bottom:1px;display:block;overflow:hidden;white-space:nowrap;text-overflow:ellipsis; }
/* Modal */
.ho-modal-ov { position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center; }
.ho-modal-ov.open { display:flex; }
.ho-modal { background:#fff;border-radius:12px;width:440px;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.18); }
.ho-modal-head { padding:14px 18px;border-bottom:1px solid #E2E4E9;display:flex;align-items:center;justify-content:space-between; }
.ho-modal-title { font-size:15px;font-weight:600; }
.ho-modal-body { padding:16px 18px; }
.ho-modal-foot { padding:12px 18px;border-top:1px solid #E2E4E9;display:flex;gap:8px;justify-content:flex-end; }
.ho-fg { margin-bottom:12px; }
.ho-fg.half { display:inline-block;width:48%; }
.ho-fg.half:first-child { margin-right:3%; }
.ho-flabel { display:block;font-size:12px;font-weight:500;margin-bottom:4px;color:#4A4A4A; }
.ho-finp { width:100%;padding:8px 10px;border:1.5px solid #E2E4E9;border-radius:8px;font-size:13px;font-family:DM Sans,sans-serif;outline:none;box-sizing:border-box; }
.ho-finp:focus { border-color:#C8241A; }
.ho-diachk { display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border:1.5px solid #E2E4E9;border-radius:7px;font-size:12.5px;cursor:pointer;user-select:none; }
.ho-diachk input { cursor:pointer;accent-color:#C8241A; }
</style>

<div id="sec-horarios">
  <div class="ho-toolbar">
    <div class="ho-title">Horarios médicos</div>
    <div class="ho-tabs" style="margin-right:6px">
      <button class="ho-tab activo" id="ho-mode-ind" onclick="hoModo('individual')">Por médico</button>
      <button class="ho-tab" id="ho-mode-glob" onclick="hoModo('global')">Global</button>
    </div>
    <select class="ho-sel-med" id="ho-sel-med" onchange="hoCambiarMedico()">
      <option value="">— Seleccione un médico —</option>
    </select>
    <select class="ho-sel-med" id="ho-fil-esp" style="display:none;min-width:180px" onchange="hoRenderGlobal()">
      <option value="">Todas las especialidades</option>
    </select>
    <div class="ho-tabs">
      <button class="ho-tab activo" id="ho-tab-semana" onclick="hoVista('semana')">Semana</button>
      <button class="ho-tab" id="ho-tab-lista" onclick="hoVista('lista')">Lista</button>
      <button class="ho-tab" id="ho-tab-mes" onclick="hoVista('mes')">Mes</button>
    </div>
    <button class="ho-btn primary" id="ho-btn-nuevo" onclick="hoNuevo()">+ Agregar horario</button>
  </div>
  <div class="ho-body" id="ho-body">
    <div class="ho-empty">👨‍⚕️ Seleccione un médico para ver sus horarios</div>
  </div>
</div>

<!-- MODAL -->
<div class="ho-modal-ov" id="ho-modal">
  <div class="ho-modal">
    <div class="ho-modal-head">
      <span class="ho-modal-title" id="ho-modal-title">Agregar horario</span>
      <button class="ho-btn sm" onclick="hoCerrarModal()">✕</button>
    </div>
    <div class="ho-modal-body">
      <div class="ho-fg">
        <label class="ho-flabel">Especialidad <span style="color:#C8241A">*</span></label>
        <select class="ho-finp" id="ho-f-esp"><option value="">— Seleccione —</option></select>
      </div>
      <div class="ho-fg">
        <label class="ho-flabel">Días <span style="color:#C8241A">*</span> <span style="font-weight:400;color:#8A8A8A">(marca uno o varios)</span></label>
        <div id="ho-dias-check" style="display:flex;flex-wrap:wrap;gap:6px">
          <label class="ho-diachk"><input type="checkbox" class="ho-f-dia-chk" value="LUNES"/> Lun</label>
          <label class="ho-diachk"><input type="checkbox" class="ho-f-dia-chk" value="MARTES"/> Mar</label>
          <label class="ho-diachk"><input type="checkbox" class="ho-f-dia-chk" value="MIERCOLES"/> Mié</label>
          <label class="ho-diachk"><input type="checkbox" class="ho-f-dia-chk" value="JUEVES"/> Jue</label>
          <label class="ho-diachk"><input type="checkbox" class="ho-f-dia-chk" value="VIERNES"/> Vie</label>
          <label class="ho-diachk"><input type="checkbox" class="ho-f-dia-chk" value="SABADO"/> Sáb</label>
          <label class="ho-diachk"><input type="checkbox" class="ho-f-dia-chk" value="DOMINGO"/> Dom</label>
        </div>
        <div style="margin-top:6px;display:flex;gap:6px">
          <button type="button" class="ho-btn sm" onclick="hoMarcarDias('LV')">Lun-Vie</button>
          <button type="button" class="ho-btn sm" onclick="hoMarcarDias('todos')">Todos</button>
          <button type="button" class="ho-btn sm" onclick="hoMarcarDias('ninguno')">Ninguno</button>
        </div>
      </div>
      <div class="ho-fg half"><label class="ho-flabel">Inicio</label><input class="ho-finp" id="ho-f-ini" type="time" value="08:00"/></div>
      <div class="ho-fg half"><label class="ho-flabel">Fin</label><input class="ho-finp" id="ho-f-fin" type="time" value="13:00"/></div>
      <div class="ho-fg">
        <label class="ho-flabel">Intervalo</label>
        <select class="ho-finp" id="ho-f-int">
          <option value="15">15 min</option><option value="20">20 min</option>
          <option value="30" selected>30 min</option><option value="45">45 min</option><option value="60">60 min</option>
        </select>
      </div>
    </div>
    <div class="ho-modal-foot">
      <button class="ho-btn" id="ho-btn-eliminar" onclick="hoEliminar()" style="margin-right:auto;color:#C8241A;border-color:#FAD4D1;display:none">🗑 Eliminar</button>
      <button class="ho-btn" onclick="hoCerrarModal()">Cancelar</button>
      <button class="ho-btn primary" id="ho-btn-guardar" onclick="hoGuardar()">✓ Guardar</button>
    </div>
  </div>
</div>

<script>
// ═══ MÓDULO HORARIOS — prefijo "ho" ═══
var hoVistaActual='semana', hoMedicos=[], hoMedSel=null, hoHorarios=[], hoEsps=[], hoEditId=null;
var HO_DIAS=['LUNES','MARTES','MIERCOLES','JUEVES','VIERNES','SABADO','DOMINGO'];
var HO_DIAS_CORTO={LUNES:'Lun',MARTES:'Mar',MIERCOLES:'Mié',JUEVES:'Jue',VIERNES:'Vie',SABADO:'Sáb',DOMINGO:'Dom'};
var HO_COLORES=['#C8241A','#0A6B4F','#0E4F8A','#8A5A00','#6A1B8A','#0A6B6B','#8A0E3A','#4A5A0A'];

var hoModoActual='individual', hoHorariosGlobal=[];

// Llamado desde Index.html
function hoAbrir() {
  // Siempre recargar médicos para incluir los recién creados
  hoCargarMedicos();
}

function hoModo(m) {
  hoModoActual=m;
  document.getElementById('ho-mode-ind').classList.toggle('activo', m==='individual');
  document.getElementById('ho-mode-glob').classList.toggle('activo', m==='global');
  document.getElementById('ho-sel-med').style.display = m==='global'?'none':'';
  document.getElementById('ho-fil-esp').style.display = m==='global'?'':'none';
  document.getElementById('ho-btn-nuevo').style.display = m==='global'?'none':'';
  if(m==='global') hoCargarGlobal();
  else { if(hoMedSel) hoCargarDatos(); else document.getElementById('ho-body').innerHTML='<div class="ho-empty">👨‍⚕️ Seleccione un médico</div>'; }
}

function hoCargarGlobal() {
  var body=document.getElementById('ho-body');
  body.innerHTML='<div class="ho-empty">⏳ Cargando todos los horarios…</div>';
  google.script.run
    .withSuccessHandler(function(resp){
      hoHorariosGlobal = resp&&resp.ok&&Array.isArray(resp.datos)?resp.datos:[];
      // Llenar filtro de especialidades
      var sel=document.getElementById('ho-fil-esp');
      var espsUnicas={};
      hoHorariosGlobal.forEach(function(h){ if(h.ID_ESPECIALIDAD) espsUnicas[h.ID_ESPECIALIDAD]=h.ESPECIALIDAD_NOMBRE; });
      sel.innerHTML='<option value="">Todas las especialidades</option>';
      Object.keys(espsUnicas).forEach(function(id){ var o=document.createElement('option'); o.value=id; o.textContent=espsUnicas[id]; sel.appendChild(o); });
      hoRenderGlobal();
    })
    .withFailureHandler(function(e){ body.innerHTML='<div class="ho-empty" style="color:#C8241A">⚠ '+e.message+'</div>'; })
    .ejecutar('listarTodosHorarios', { usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

// Color por médico (en vista global)
var HO_COLORES_MED=['#C8241A','#0A6B4F','#0E4F8A','#8A5A00','#6A1B8A','#0A6B6B','#8A0E3A','#4A5A0A','#B5651D','#1A7A3A'];
function hoColorMed(idMed) {
  var ids=[];
  hoHorariosGlobal.forEach(function(h){ if(ids.indexOf(h.ID_MEDICO)<0) ids.push(h.ID_MEDICO); });
  var idx=ids.indexOf(idMed);
  return HO_COLORES_MED[(idx<0?0:idx) % HO_COLORES_MED.length];
}

function hoRenderGlobal() {
  var body=document.getElementById('ho-body');
  var filEsp=document.getElementById('ho-fil-esp').value;
  var datos = filEsp ? hoHorariosGlobal.filter(function(h){ return h.ID_ESPECIALIDAD===filEsp; }) : hoHorariosGlobal;
  if(!datos.length){ body.innerHTML='<div class="ho-empty">Sin horarios registrados</div>'; return; }
  // Leyenda por médico
  var meds=[];
  datos.forEach(function(h){ if(meds.indexOf(h.ID_MEDICO)<0) meds.push(h.ID_MEDICO); });
  var ley=meds.map(function(id){
    var n=''; for(var i=0;i<datos.length;i++){ if(datos[i].ID_MEDICO===id){ n=datos[i].MEDICO_NOMBRE; break; } }
    return '<div class="ho-ley-item"><span class="ho-ley-color" style="background:'+hoColorMed(id)+'"></span>Dr. '+n+'</div>';
  }).join('');
  // Grilla semanal con todos
  var hIni=7,hFin=21;
  var html='<div class="ho-leyenda">'+ley+'</div><table class="ho-grid"><thead><tr><th class="ho-hora-col"></th>';
  HO_DIAS.forEach(function(d){ html+='<th>'+HO_DIAS_CORTO[d]+'</th>'; });
  html+='</tr></thead><tbody>';
  for(var h=hIni;h<hFin;h++){
    var hhmm=(h<10?'0':'')+h+':00';
    html+='<tr><td class="ho-hora-cell">'+hhmm+'</td>';
    HO_DIAS.forEach(function(d){
      var bloques='';
      datos.forEach(function(hr){
        if(hr.DIA_SEMANA!==d) return;
        var ini=parseInt((hr.HORA_INICIO||'0:0').split(':')[0]);
        if(ini!==h) return;
        var fin=parseInt((hr.HORA_FIN||'0:0').split(':')[0]);
        var finMin=parseInt((hr.HORA_FIN||'0:0').split(':')[1])||0;
        var iniMin=parseInt((hr.HORA_INICIO||'0:0').split(':')[1])||0;
        var durH=(fin+finMin/60)-(ini+iniMin/60);
        var alto=Math.max(durH*30,18);
        bloques+='<div class="ho-bloque" style="top:'+((iniMin/60)*30)+'px;height:'+(alto-2)+'px;background:'+hoColorMed(hr.ID_MEDICO)+'" title="Dr. '+hr.MEDICO_NOMBRE+' · '+hr.ESPECIALIDAD_NOMBRE+'">'+
          hr.HORA_INICIO+'<br>'+hr.MEDICO_NOMBRE.split(' ')[0]+'<br><span style="opacity:.85">'+hr.ESPECIALIDAD_NOMBRE+'</span></div>';
      });
      html+='<td style="position:relative">'+bloques+'</td>';
    });
    html+='</tr>';
  }
  html+='</tbody></table>';
  body.innerHTML=html;
}

function hoCargarMedicos() {
  var sel=document.getElementById('ho-sel-med');
  if(!sesion){ return; }
  var prevSel = sel ? sel.value : '';  // recordar selección actual
  google.script.run
    .withSuccessHandler(function(resp){
      var lista = resp&&resp.ok ? (resp.datos&&resp.datos.datos?resp.datos.datos:(Array.isArray(resp.datos)?resp.datos:[])) : [];
      hoMedicos=lista;
      sel.innerHTML='<option value="">— Seleccione un médico —</option>';
      lista.forEach(function(m){
        var o=document.createElement('option');
        o.value=m.ID_MEDICO; o.textContent='Dr. '+m.NOMBRES+' '+m.APELLIDOS+' (CMP '+(m.NUMERO_CMP||'—')+')';
        sel.appendChild(o);
      });
      // Restaurar selección previa si sigue existiendo
      if(prevSel){ sel.value=prevSel; }
    })
    .withFailureHandler(function(){})
    .ejecutar('listarMedicos', { estado:'ACTIVO', limite:200, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

function hoCambiarMedico() {
  var id=document.getElementById('ho-sel-med').value;
  if(!id){ hoMedSel=null; document.getElementById('ho-body').innerHTML='<div class="ho-empty">👨‍⚕️ Seleccione un médico para ver sus horarios</div>'; return; }
  hoMedSel=hoMedicos.find(function(m){ return m.ID_MEDICO===id; });
  hoCargarDatos();
}

function hoCargarDatos() {
  if(!hoMedSel) return;
  var body=document.getElementById('ho-body');
  body.innerHTML='<div class="ho-empty">⏳ Cargando horarios…</div>';
  // Cargar especialidades del médico + horarios
  google.script.run
    .withSuccessHandler(function(respE){
      hoEsps = respE&&respE.ok&&Array.isArray(respE.datos)?respE.datos:[];
      google.script.run
        .withSuccessHandler(function(respH){
          hoHorarios = respH&&respH.ok&&Array.isArray(respH.datos)?respH.datos:[];
          hoRender();
        })
        .withFailureHandler(function(e){ body.innerHTML='<div class="ho-empty" style="color:#C8241A">⚠ '+e.message+'</div>'; })
        .ejecutar('listarHorariosMedico', { ID_MEDICO:hoMedSel.ID_MEDICO, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
    })
    .withFailureHandler(function(e){ body.innerHTML='<div class="ho-empty" style="color:#C8241A">⚠ '+e.message+'</div>'; })
    .ejecutar('listarEspecialidadesMedico', { ID_MEDICO:hoMedSel.ID_MEDICO, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

// Color por especialidad (consistente)
function hoColorEsp(idEsp) {
  var idx=0;
  for(var i=0;i<hoEsps.length;i++){ if(hoEsps[i].ID_ESPECIALIDAD===idEsp){ idx=i; break; } }
  return HO_COLORES[idx % HO_COLORES.length];
}
function hoNombreEsp(idEsp) {
  for(var i=0;i<hoEsps.length;i++){ if(hoEsps[i].ID_ESPECIALIDAD===idEsp) return hoEsps[i].ESPECIALIDAD_NOMBRE; }
  return 'Sin especialidad';
}

function hoVista(v) {
  hoVistaActual=v;
  ['semana','lista','mes'].forEach(function(x){
    var t=document.getElementById('ho-tab-'+x); if(t) t.classList.toggle('activo', x===v);
  });
  hoRender();
}

function hoRender() {
  if(!hoMedSel){ return; }
  var body=document.getElementById('ho-body');
  var leyenda=hoLeyendaHTML();
  if(hoVistaActual==='semana') body.innerHTML=leyenda+hoRenderSemana();
  else if(hoVistaActual==='lista') body.innerHTML=leyenda+hoRenderLista();
  else body.innerHTML=leyenda+hoRenderMes();
}

function hoLeyendaHTML() {
  if(!hoEsps.length) return '<div class="ho-leyenda"><span style="color:#8A8A8A;font-size:12px">⚠ Este médico no tiene especialidades asignadas. Asígnalas en Editar médico.</span></div>';
  var items=hoEsps.map(function(e,i){
    return '<div class="ho-ley-item"><span class="ho-ley-color" style="background:'+HO_COLORES[i%HO_COLORES.length]+'"></span>'+e.ESPECIALIDAD_NOMBRE+'</div>';
  }).join('');
  return '<div class="ho-leyenda">'+items+'</div>';
}

// ── VISTA SEMANA (grilla) ──
function hoRenderSemana() {
  var hIni=7, hFin=21; // 07:00 a 21:00
  var html='<table class="ho-grid"><thead><tr><th class="ho-hora-col"></th>';
  HO_DIAS.forEach(function(d){ html+='<th>'+HO_DIAS_CORTO[d]+'</th>'; });
  html+='</tr></thead><tbody>';
  for(var h=hIni;h<hFin;h++){
    var hhmm=(h<10?'0':'')+h+':00';
    html+='<tr><td class="ho-hora-cell">'+hhmm+'</td>';
    HO_DIAS.forEach(function(d){
      html+='<td class="ho-slot" onclick="hoNuevoEn(\''+d+'\','+h+')" data-dia="'+d+'" data-hora="'+h+'">'+hoBloquesEn(d,h,hIni)+'</td>';
    });
    html+='</tr>';
  }
  html+='</tbody></table>';
  return html;
}
function hoBloquesEn(dia, hora, hIni) {
  var out='';
  hoHorarios.forEach(function(hr){
    if(hr.DIA_SEMANA!==dia) return;
    var ini=parseInt((hr.HORA_INICIO||'0:0').split(':')[0]);
    var iniMin=parseInt((hr.HORA_INICIO||'0:0').split(':')[1])||0;
    if(ini!==hora) return; // dibujar solo en su hora de inicio
    var fin=parseInt((hr.HORA_FIN||'0:0').split(':')[0]);
    var finMin=parseInt((hr.HORA_FIN||'0:0').split(':')[1])||0;
    var durH=(fin+finMin/60)-(ini+iniMin/60);
    var alto=Math.max(durH*30,18);
    var top=(iniMin/60)*30;
    var color=hoColorEsp(hr.ID_ESPECIALIDAD);
    out+='<div class="ho-bloque" style="top:'+top+'px;height:'+(alto-2)+'px;background:'+color+'" onclick="event.stopPropagation();hoEditar(\''+hr.ID_HORARIO+'\')">'+
      hr.HORA_INICIO+'-'+hr.HORA_FIN+'<br>'+hoNombreEsp(hr.ID_ESPECIALIDAD)+'</div>';
  });
  return out;
}

// ── VISTA LISTA ──
function hoRenderLista() {
  if(!hoHorarios.length) return '<div class="ho-empty">Sin horarios. Clic en "+ Agregar horario".</div>';
  var html='';
  HO_DIAS.forEach(function(d){
    var delDia=hoHorarios.filter(function(h){ return h.DIA_SEMANA===d; });
    if(!delDia.length) return;
    delDia.sort(function(a,b){ return (a.HORA_INICIO||'')>(b.HORA_INICIO||'')?1:-1; });
    html+='<div class="ho-lista-dia"><div class="ho-lista-dia-head">'+hoDiaLargo(d)+'</div>';
    delDia.forEach(function(h){
      html+='<div class="ho-lista-item"><span class="ho-lista-color" style="background:'+hoColorEsp(h.ID_ESPECIALIDAD)+'"></span>'+
        '<span class="ho-lista-hora">'+h.HORA_INICIO+' – '+h.HORA_FIN+'</span>'+
        '<span style="color:#8A8A8A">c/'+h.INTERVALO_MIN+'min</span>'+
        '<span style="font-weight:500">'+hoNombreEsp(h.ID_ESPECIALIDAD)+'</span>'+
        '<button class="ho-lista-del" onclick="hoEditar(\''+h.ID_HORARIO+'\')">✏️ Editar</button></div>';
    });
    html+='</div>';
  });
  return html||'<div class="ho-empty">Sin horarios.</div>';
}
function hoDiaLargo(d){ return {LUNES:'Lunes',MARTES:'Martes',MIERCOLES:'Miércoles',JUEVES:'Jueves',VIERNES:'Viernes',SABADO:'Sábado',DOMINGO:'Domingo'}[d]||d; }

// ── VISTA MES ──
function hoRenderMes() {
  var hoy=new Date();
  var anio=hoy.getFullYear(), mes=hoy.getMonth();
  var primero=new Date(anio,mes,1);
  var diasMes=new Date(anio,mes+1,0).getDate();
  var inicioSemana=(primero.getDay()+6)%7; // Lunes=0
  var mapDia={0:'LUNES',1:'MARTES',2:'MIERCOLES',3:'JUEVES',4:'VIERNES',5:'SABADO',6:'DOMINGO'};
  var meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var html='<div style="font-weight:600;margin-bottom:10px;font-size:14px">'+meses[mes]+' '+anio+'</div>';
  html+='<table class="ho-mes"><thead><tr>';
  ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].forEach(function(d){ html+='<th>'+d+'</th>'; });
  html+='</tr></thead><tbody><tr>';
  for(var i=0;i<inicioSemana;i++) html+='<td style="background:#FAFBFC"></td>';
  var col=inicioSemana;
  for(var dia=1;dia<=diasMes;dia++){
    var fecha=new Date(anio,mes,dia);
    var diaSem=mapDia[(fecha.getDay()+6)%7];
    var horariosDia=hoHorarios.filter(function(h){ return h.DIA_SEMANA===diaSem; });
    var marcas=horariosDia.map(function(h){ return '<span class="ho-mes-marca" style="background:'+hoColorEsp(h.ID_ESPECIALIDAD)+'">'+h.HORA_INICIO+'-'+h.HORA_FIN+' '+hoNombreEsp(h.ID_ESPECIALIDAD).substring(0,8)+'</span>'; }).join('');
    html+='<td><div class="ho-mes-dia">'+dia+'</div>'+marcas+'</td>';
    col++;
    if(col===7){ html+='</tr><tr>'; col=0; }
  }
  while(col>0&&col<7){ html+='<td style="background:#FAFBFC"></td>'; col++; }
  html+='</tr></tbody></table>';
  return html;
}

// ── MODAL ──
function hoLlenarEspSelect() {
  var sel=document.getElementById('ho-f-esp');
  sel.innerHTML='<option value="">— Seleccione —</option>';
  // Especialidades que YA tienen al menos un horario asignado
  var conHorario={};
  (hoHorarios||[]).forEach(function(h){ if(h.ID_ESPECIALIDAD) conHorario[h.ID_ESPECIALIDAD]=true; });
  hoEsps.forEach(function(e){
    var o=document.createElement('option'); o.value=e.ID_ESPECIALIDAD;
    var marca = conHorario[e.ID_ESPECIALIDAD] ? '  ✓ (ya tiene horario)' : '';
    o.textContent=e.ESPECIALIDAD_NOMBRE + marca;
    sel.appendChild(o);
  });
}

function hoNuevo() {
  if(!hoMedSel){ alert('⚠ Seleccione un médico primero'); return; }
  if(!hoEsps.length){ alert('⚠ Este médico no tiene especialidades asignadas. Asígnalas en Editar médico.'); return; }
  hoEditId=null;
  document.getElementById('ho-modal-title').textContent='Agregar horario';
  document.getElementById('ho-btn-eliminar').style.display='none';
  hoLlenarEspSelect();
  hoMarcarDias('ninguno');
  document.getElementById('ho-f-int').value='30';
  document.getElementById('ho-f-ini').value='08:00';
  document.getElementById('ho-f-fin').value='13:00';
  document.getElementById('ho-modal').classList.add('open');
}

function hoNuevoEn(dia, hora) {
  hoNuevo();
  // Marcar solo el día clicado
  var chks=document.querySelectorAll('.ho-f-dia-chk');
  for(var i=0;i<chks.length;i++){ chks[i].checked=(chks[i].value===dia); }
  document.getElementById('ho-f-ini').value=(hora<10?'0':'')+hora+':00';
  document.getElementById('ho-f-fin').value=((hora+1)<10?'0':'')+(hora+1)+':00';
}

function hoEditar(id) {
  var h=hoHorarios.find(function(x){ return x.ID_HORARIO===id; });
  if(!h) return;
  hoEditId=id;
  document.getElementById('ho-modal-title').textContent='Editar horario';
  document.getElementById('ho-btn-eliminar').style.display='';
  hoLlenarEspSelect();
  document.getElementById('ho-f-esp').value=h.ID_ESPECIALIDAD||'';
  // En edición: marcar solo el día de ese horario
  var chks=document.querySelectorAll('.ho-f-dia-chk');
  for(var i=0;i<chks.length;i++){ chks[i].checked=(chks[i].value===h.DIA_SEMANA); }
  document.getElementById('ho-f-int').value=h.INTERVALO_MIN||'30';
  document.getElementById('ho-f-ini').value=h.HORA_INICIO;
  document.getElementById('ho-f-fin').value=h.HORA_FIN;
  document.getElementById('ho-modal').classList.add('open');
}

function hoCerrarModal() { document.getElementById('ho-modal').classList.remove('open'); }

function hoMarcarDias(modo) {
  var chks=document.querySelectorAll('.ho-f-dia-chk');
  for(var i=0;i<chks.length;i++){
    if(modo==='todos') chks[i].checked=true;
    else if(modo==='ninguno') chks[i].checked=false;
    else if(modo==='LV') chks[i].checked=(['LUNES','MARTES','MIERCOLES','JUEVES','VIERNES'].indexOf(chks[i].value)>=0);
  }
}

function hoGuardar() {
  var idEsp=document.getElementById('ho-f-esp').value;
  var ini=document.getElementById('ho-f-ini').value;
  var fin=document.getElementById('ho-f-fin').value;
  var intv=document.getElementById('ho-f-int').value;
  // Recoger días marcados
  var dias=[];
  var chks=document.querySelectorAll('.ho-f-dia-chk');
  for(var i=0;i<chks.length;i++){ if(chks[i].checked) dias.push(chks[i].value); }

  if(!idEsp){ alert('⚠ Seleccione la especialidad'); return; }
  if(!dias.length){ alert('⚠ Marque al menos un día'); return; }
  if(!ini||!fin){ alert('⚠ Indique hora de inicio y fin'); return; }
  if(fin<=ini){ alert('⚠ La hora fin debe ser mayor que la de inicio'); return; }

  var btn=document.getElementById('ho-btn-guardar');
  btn.disabled=true; btn.textContent='⏳…';

  // Guardar todos los días en secuencia
  var pendientes=dias.length, errores=0;
  function guardarUno(dia, callback) {
    google.script.run
      .withSuccessHandler(function(resp){ if(!resp||!resp.ok) errores++; callback(); })
      .withFailureHandler(function(){ errores++; callback(); })
      .ejecutar('guardarHorarioMedico', { ID_MEDICO:hoMedSel.ID_MEDICO, ID_ESPECIALIDAD:idEsp, DIA_SEMANA:dia, HORA_INICIO:ini, HORA_FIN:fin, INTERVALO_MIN:intv, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
  }
  function procesarTodos() {
    var idx=0;
    function siguiente() {
      if(idx>=dias.length){
        btn.disabled=false; btn.textContent='✓ Guardar';
        if(typeof pnNotif==='function') pnNotif('✓ '+(dias.length-errores)+' horario(s) guardado(s)'+(errores?' · '+errores+' con error':''),'ok');
        hoCerrarModal(); hoCargarDatos();
        return;
      }
      guardarUno(dias[idx], function(){ idx++; siguiente(); });
    }
    siguiente();
  }

  // Si es edición: primero eliminar el horario original, luego crear los días marcados
  if(hoEditId){
    google.script.run
      .withSuccessHandler(function(){ procesarTodos(); })
      .withFailureHandler(function(){ procesarTodos(); })
      .ejecutar('eliminarHorarioMedico', { ID_HORARIO:hoEditId, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
  } else {
    procesarTodos();
  }
}

function hoEliminar() {
  if(!hoEditId) return;
  if(!confirm('¿Eliminar este horario?')) return;
  google.script.run
    .withSuccessHandler(function(resp){
      if(!resp||!resp.ok){ alert('⚠ '+(resp?resp.mensaje:'Error')); return; }
      if(typeof pnNotif==='function') pnNotif('✓ Horario eliminado','ok');
      hoCerrarModal(); hoCargarDatos();
    })
    .withFailureHandler(function(e){ alert('⚠ '+e.message); })
    .ejecutar('eliminarHorarioMedico', { ID_HORARIO:hoEditId, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}
</script>
