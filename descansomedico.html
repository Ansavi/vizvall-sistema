<style>
#sec-descansomedico { display:none;overflow:auto;position:absolute;top:56px;left:0;right:0;bottom:0;background:var(--bg,#F2F3F5); }
#sec-descansomedico.activo { display:block; }
.dmv-wrap { padding:18px 22px;max-width:1100px;margin:0 auto; }
.dmv-head { margin-bottom:16px; }
.dmv-title { font-size:18px;font-weight:600;color:#1A1A1A;display:flex;align-items:center;gap:8px; }
.dmv-sub { font-size:13px;color:#8A8A8A;margin-top:2px; }
.dmv-tabs { display:flex;gap:8px;margin-bottom:16px;border-bottom:1px solid #E2E4E9; }
.dmv-tab { padding:9px 18px;cursor:pointer;font-size:13.5px;font-weight:600;color:#8A8A8A;border-bottom:2px solid transparent;margin-bottom:-1px; }
.dmv-tab.activo { color:#C8241A;border-bottom-color:#C8241A; }
.dmv-card { background:#fff;border:1px solid #EEF0F3;border-radius:12px;padding:18px;margin-bottom:16px; }
.dmv-filtros { display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap; }
.dmv-search { flex:1;min-width:200px;padding:9px 12px;border:1px solid #E2E4E9;border-radius:8px;font-size:13px;box-sizing:border-box;font-family:DM Sans,sans-serif; }
.dmv-date { padding:9px 12px;border:1px solid #E2E4E9;border-radius:8px;font-size:13px;font-family:DM Sans,sans-serif; }
.dmv-list-item { display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid #EEF0F3;border-radius:10px;margin-bottom:8px;cursor:pointer;transition:background .12s,border-color .12s; }
.dmv-list-item:hover { background:#FDF3F2;border-color:#F0B5AF; }
.dmv-ava { width:42px;height:42px;border-radius:50%;background:#FDECEA;color:#C8241A;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;font-weight:600; }
.dmv-info { flex:1;min-width:0; }
.dmv-nom { font-size:14px;font-weight:700;color:#1A1A1A; }
.dmv-meta { font-size:12px;color:#8A8A8A;margin-top:2px; }
.dmv-arrow { color:#C8241A;font-size:18px; }
.dmv-pac-sel { display:flex;align-items:center;gap:12px;padding:14px 18px;background:#FDECEA;border:1px solid #F0B5AF;border-radius:10px;margin-bottom:16px; }
.dmv-fg { margin-bottom:12px; }
.dmv-lbl { font-size:11.5px;color:#555;display:block;margin-bottom:4px;font-weight:600; }
.dmv-inp { width:100%;padding:9px 11px;border:1px solid #E2E4E9;border-radius:8px;font-size:13px;box-sizing:border-box;font-family:DM Sans,sans-serif; }
.dmv-grid3 { display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px; }
.dmv-grid2 { display:grid;grid-template-columns:1fr 1fr;gap:12px; }
.dmv-foot { display:flex;gap:10px;justify-content:flex-end;margin-top:18px; }
.dmv-btn { padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600; }
.dmv-btn-prim { background:#C8241A;color:#fff; }
.dmv-btn-sec { background:#F2F3F5;color:#555; }
.dmv-btn-doc { background:#fff;color:#C8241A;border:1px solid #F0B5AF; }
.dmv-empty { padding:50px 20px;text-align:center;color:#8A8A8A; }
.dmv-hint { font-size:10.5px;color:#8A8A8A;font-weight:400; }
@media(max-width:600px){ .dmv-grid3,.dmv-grid2{grid-template-columns:1fr} }
</style>

<div id="sec-descansomedico">
  <div class="dmv-wrap">
    <div class="dmv-head">
      <div class="dmv-title">📋 Descanso Médico</div>
      <div class="dmv-sub">Emisión de descanso médico — reposo por indicación del médico tratante</div>
    </div>

    <div class="dmv-tabs">
      <div class="dmv-tab activo" id="dmv-tab-nuevo" onclick="dmVerTab('nuevo')">Emitir descanso</div>
      <div class="dmv-tab" id="dmv-tab-hist" onclick="dmVerTab('hist')">Historial</div>
    </div>

    <!-- TAB: Emitir descanso -->
    <div id="dmv-panel-nuevo">
      <!-- Paso 1: seleccionar paciente -->
      <div class="dmv-card" id="dmv-card-lista">
        <div style="font-size:13px;font-weight:700;color:#C8241A;margin-bottom:12px">1. Seleccione el paciente atendido</div>
        <div class="dmv-filtros">
          <input class="dmv-search" id="dmv-buscar" placeholder="Buscar por nombre o documento…" oninput="dmBuscarDebounce()"/>
          <input class="dmv-date" id="dmv-fecha" type="date" onchange="dmCargarPacientes()"/>
          <button class="dmv-btn dmv-btn-sec" onclick="dmLimpiarFiltros()">Limpiar</button>
        </div>
        <div id="dmv-lista"><div class="dmv-empty">Cargando…</div></div>
      </div>

      <!-- Paso 2: formulario (oculto hasta elegir paciente) -->
      <div class="dmv-card" id="dmv-card-form" style="display:none">
        <div class="dmv-pac-sel">
          <div class="dmv-ava" id="dmv-sel-ava">👤</div>
          <div class="dmv-info">
            <div class="dmv-nom" id="dmv-sel-nom">—</div>
            <div class="dmv-meta" id="dmv-sel-meta">—</div>
          </div>
          <button class="dmv-btn dmv-btn-sec" onclick="dmCancelarForm()">Cambiar</button>
        </div>

        <div style="font-size:13px;font-weight:700;color:#C8241A;margin-bottom:12px">2. Datos del descanso</div>

        <div class="dmv-grid2">
          <div class="dmv-fg">
            <label class="dmv-lbl">Diagnóstico</label>
            <input class="dmv-inp" id="dmv-diag" placeholder="DIAGNÓSTICO"/>
          </div>
          <div class="dmv-fg">
            <label class="dmv-lbl">CIE-10 <span class="dmv-hint">(opcional)</span></label>
            <input class="dmv-inp" id="dmv-cie10" placeholder="EJ: J02.9"/>
          </div>
        </div>

        <div class="dmv-grid3">
          <div class="dmv-fg">
            <label class="dmv-lbl">Días de reposo</label>
            <input class="dmv-inp" id="dmv-dias" type="number" min="1" placeholder="3" onchange="dmCalcularFechas()"/>
          </div>
          <div class="dmv-fg">
            <label class="dmv-lbl">Desde <span class="dmv-hint">(auto: hoy)</span></label>
            <input class="dmv-inp" id="dmv-desde" type="date" onchange="dmCalcularFechas(true)"/>
          </div>
          <div class="dmv-fg">
            <label class="dmv-lbl">Hasta <span class="dmv-hint">(auto)</span></label>
            <input class="dmv-inp" id="dmv-hasta" type="date"/>
          </div>
        </div>

        <div class="dmv-grid2">
          <div class="dmv-fg">
            <label class="dmv-lbl">Modalidad</label>
            <select class="dmv-inp" id="dmv-tipo">
              <option value="DOMICILIARIO">Domiciliario</option>
              <option value="HOSPITALARIO">Hospitalario</option>
            </select>
          </div>
          <div class="dmv-fg">
            <label class="dmv-lbl">Observación <span class="dmv-hint">(opcional)</span></label>
            <input class="dmv-inp" id="dmv-obs" placeholder="OBSERVACIÓN"/>
          </div>
        </div>

        <div class="dmv-foot">
          <button class="dmv-btn dmv-btn-sec" onclick="dmCancelarForm()">Cancelar</button>
          <button class="dmv-btn dmv-btn-prim" onclick="dmGuardar()">💾 Guardar y generar documento</button>
        </div>
      </div>
    </div>

    <!-- TAB: Historial -->
    <div id="dmv-panel-hist" style="display:none">
      <div class="dmv-card">
        <div class="dmv-filtros">
          <input class="dmv-search" id="dmv-hist-buscar" placeholder="Buscar por nombre de paciente…" oninput="dmBuscarHistDebounce()"/>
        </div>
        <div id="dmv-hist-lista"><div class="dmv-empty">Cargando…</div></div>
      </div>
    </div>

  </div>
</div>

<script>
// ════════ DESCANSO MÉDICO (prefijo dm) ════════
var dmPacienteSel = null;
var dmConfigEmpresa = null;
var dmBuscarTimer = null, dmBuscarHistTimer = null;

function dmInit() {
  dmVerTab('nuevo');
  dmCargarPacientes();
  // Precargar config de empresa para el documento
  vzvRun().withSuccessHandler(function(r){
    if(r && r.ok && r.datos) dmConfigEmpresa = r.datos;
  }).withFailureHandler(function(){}).ejecutar('obtenerConfigEmpresa', {usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||''});
}

function dmVerTab(tab) {
  document.getElementById('dmv-tab-nuevo').classList.toggle('activo', tab==='nuevo');
  document.getElementById('dmv-tab-hist').classList.toggle('activo', tab==='hist');
  document.getElementById('dmv-panel-nuevo').style.display = tab==='nuevo' ? 'block' : 'none';
  document.getElementById('dmv-panel-hist').style.display = tab==='hist' ? 'block' : 'none';
  if(tab==='hist') dmCargarHistorial();
}

function dmBuscarDebounce(){ clearTimeout(dmBuscarTimer); dmBuscarTimer=setTimeout(dmCargarPacientes, 350); }
function dmBuscarHistDebounce(){ clearTimeout(dmBuscarHistTimer); dmBuscarHistTimer=setTimeout(dmCargarHistorial, 350); }

function dmLimpiarFiltros(){
  document.getElementById('dmv-buscar').value='';
  document.getElementById('dmv-fecha').value='';
  dmCargarPacientes();
}

function dmCargarPacientes() {
  var cont = document.getElementById('dmv-lista');
  cont.innerHTML = '<div class="dmv-empty">Cargando…</div>';
  var busqueda = document.getElementById('dmv-buscar').value || '';
  var fecha = document.getElementById('dmv-fecha').value || '';
  vzvRun('Cargando pacientes…').withSuccessHandler(function(r){
    if(!r || !r.ok){ cont.innerHTML='<div class="dmv-empty">⚠ '+(r?r.mensaje:'Error')+'</div>'; return; }
    var filas = r.datos || [];
    if(!filas.length){ cont.innerHTML='<div class="dmv-empty">Sin pacientes atendidos'+(busqueda||fecha?' con ese filtro':'')+'.</div>'; return; }
    cont.innerHTML = filas.map(function(f){
      var ini = (f.NOMBRE_PACIENTE||'?').charAt(0).toUpperCase();
      var metaPartes = [];
      if(f.DOCUMENTO) metaPartes.push('Doc: '+f.DOCUMENTO);
      if(f.FECHA) metaPartes.push(f.FECHA);
      if(f.DIAGNOSTICO) metaPartes.push(f.DIAGNOSTICO);
      return '<div class="dmv-list-item" onclick=\'dmSeleccionar('+JSON.stringify(f).replace(/'/g,"&#39;")+')\'>'+
        '<div class="dmv-ava">'+ini+'</div>'+
        '<div class="dmv-info"><div class="dmv-nom">'+(f.NOMBRE_PACIENTE||'—')+'</div>'+
        '<div class="dmv-meta">'+(metaPartes.join(' · ')||'—')+'</div></div>'+
        '<div class="dmv-arrow">→</div></div>';
    }).join('');
  }).withFailureHandler(function(e){
    cont.innerHTML='<div class="dmv-empty">⚠ '+e.message+'</div>';
  }).ejecutar('listarPacientesParaDescanso', { busqueda:busqueda, fecha:fecha, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

function dmSeleccionar(f) {
  dmPacienteSel = f;
  document.getElementById('dmv-card-lista').style.display='none';
  document.getElementById('dmv-card-form').style.display='block';
  document.getElementById('dmv-sel-ava').textContent = (f.NOMBRE_PACIENTE||'?').charAt(0).toUpperCase();
  document.getElementById('dmv-sel-nom').textContent = f.NOMBRE_PACIENTE||'—';
  var meta=[]; if(f.DOCUMENTO)meta.push('Doc: '+f.DOCUMENTO); if(f.FECHA)meta.push('Atendido: '+f.FECHA);
  document.getElementById('dmv-sel-meta').textContent = meta.join(' · ');
  // Pre-llenar diagnóstico y CIE-10 desde la atención
  document.getElementById('dmv-diag').value = f.DIAGNOSTICO || '';
  document.getElementById('dmv-cie10').value = f.CIE10 || '';
  document.getElementById('dmv-dias').value = '';
  document.getElementById('dmv-desde').value = '';
  document.getElementById('dmv-hasta').value = '';
  document.getElementById('dmv-obs').value = '';
  document.getElementById('dmv-tipo').value = 'DOMICILIARIO';
  document.getElementById('dmv-dias').focus();
}

function dmCancelarForm() {
  dmPacienteSel = null;
  document.getElementById('dmv-card-form').style.display='none';
  document.getElementById('dmv-card-lista').style.display='block';
}

// Cálculo automático de fechas (inclusive, días calendario) — igual criterio que acordamos
function dmCalcularFechas(desdeManual) {
  var elDias=document.getElementById('dmv-dias');
  var elDesde=document.getElementById('dmv-desde');
  var elHasta=document.getElementById('dmv-hasta');
  var dias=parseInt(elDias.value,10);
  if(isNaN(dias)||dias<=0) return;
  if(!elDesde.value){
    var hoy=new Date();
    elDesde.value=hoy.getFullYear()+'-'+String(hoy.getMonth()+1).padStart(2,'0')+'-'+String(hoy.getDate()).padStart(2,'0');
  }
  var p=elDesde.value.split('-');
  if(p.length!==3) return;
  var d=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
  d.setDate(d.getDate()+(dias-1));
  elHasta.value=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function dmGuardar() {
  if(!dmPacienteSel){ alert('⚠ Seleccione un paciente'); return; }
  var dias=document.getElementById('dmv-dias').value;
  var desde=document.getElementById('dmv-desde').value;
  var hasta=document.getElementById('dmv-hasta').value;
  if(!dias||parseInt(dias,10)<=0){ alert('⚠ Indique los días de reposo'); return; }
  if(!desde||!hasta){ alert('⚠ Faltan las fechas (escriba los días para calcularlas)'); return; }

  var params={
    ID_PACIENTE:dmPacienteSel.ID_PACIENTE,
    NOMBRE_PACIENTE:dmPacienteSel.NOMBRE_PACIENTE,
    ID_ATENCION:dmPacienteSel.ID_ATENCION||'',
    ID_VENTA:dmPacienteSel.ID_VENTA||'',
    DIAGNOSTICO:document.getElementById('dmv-diag').value,
    CIE10:document.getElementById('dmv-cie10').value,
    DIAS:dias, DESDE:desde, HASTA:hasta,
    TIPO:document.getElementById('dmv-tipo').value,
    OBSERVACION:document.getElementById('dmv-obs').value,
    ID_MEDICO:dmPacienteSel.ID_MEDICO||'',
    NOMBRE_MEDICO:dmPacienteSel.NOMBRE_MEDICO||'',
    usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||''
  };

  vzvRun('Guardando descanso…').withSuccessHandler(function(r){
    if(!r||!r.ok){ alert('⚠ '+(r?r.mensaje:'Error')); return; }
    // Generar el documento de inmediato con los datos ingresados
    dmImprimirDoc(params, dmPacienteSel);
    dmCancelarForm();
    dmCargarPacientes();
  }).withFailureHandler(function(e){ alert('⚠ '+e.message); })
    .ejecutar('guardarDescanso', params);
}

// ── Historial ──
function dmCargarHistorial() {
  var cont=document.getElementById('dmv-hist-lista');
  cont.innerHTML='<div class="dmv-empty">Cargando…</div>';
  var q=document.getElementById('dmv-hist-buscar').value||'';
  vzvRun('Cargando historial…').withSuccessHandler(function(r){
    if(!r||!r.ok){ cont.innerHTML='<div class="dmv-empty">⚠ '+(r?r.mensaje:'Error')+'</div>'; return; }
    var filas=r.datos||[];
    if(!filas.length){ cont.innerHTML='<div class="dmv-empty">Sin descansos emitidos.</div>'; return; }
    cont.innerHTML=filas.map(function(f){
      var ini=(f.NOMBRE_PACIENTE||'?').charAt(0).toUpperCase();
      return '<div class="dmv-list-item" onclick="dmReimprimir(\''+f.ID_DESCANSO+'\')">'+
        '<div class="dmv-ava">'+ini+'</div>'+
        '<div class="dmv-info"><div class="dmv-nom">'+(f.NOMBRE_PACIENTE||'—')+'</div>'+
        '<div class="dmv-meta">'+f.DIAS+' día(s) · '+dmFmt(f.DESDE)+' a '+dmFmt(f.HASTA)+' · '+(f.FECHA_REGISTRO||'').substring(0,10)+'</div></div>'+
        '<div class="dmv-arrow">🖨</div></div>';
    }).join('');
  }).withFailureHandler(function(e){ cont.innerHTML='<div class="dmv-empty">⚠ '+e.message+'</div>'; })
    .ejecutar('listarDescansos', { busqueda:q, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

function dmReimprimir(id) {
  vzvRun('Cargando…').withSuccessHandler(function(r){
    if(!r||!r.ok){ alert('⚠ '+(r?r.mensaje:'Error')); return; }
    var d=r.datos;
    dmImprimirDoc({
      DIAGNOSTICO:d.DIAGNOSTICO, CIE10:d.CIE10, DIAS:d.DIAS, DESDE:d.DESDE, HASTA:d.HASTA,
      TIPO:d.TIPO, NOMBRE_MEDICO:d.NOMBRE_MEDICO
    }, {
      NOMBRE_PACIENTE:d.NOMBRE_PACIENTE, DOCUMENTO:d.DOCUMENTO, EDAD:d.EDAD, SEXO:d.SEXO,
      NOMBRE_MEDICO:d.NOMBRE_MEDICO, MEDICO_CMP:d.MEDICO_CMP, MEDICO_RNE:d.MEDICO_RNE
    });
  }).withFailureHandler(function(e){ alert('⚠ '+e.message); })
    .ejecutar('obtenerDescanso', { ID_DESCANSO:id, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

function dmFmt(f){ if(!f||f==='-')return''; var p=String(f).substring(0,10).split('-'); return p.length===3?(p[2]+'/'+p[1]+'/'+p[0]):f; }

// ── Documento de Descanso Médico (mismo diseño VIZVALL) ──
function dmImprimirDoc(params, pac) {
  var emp = dmConfigEmpresa || { NOMBRE:'CONSULTORIOS MÉDICOS VIZVALL', RUC:'', DIRECCION:'', TELEFONO:'', LOGO_URL:'', LEMA:'' };
  var logo = (emp.LOGO_URL && emp.LOGO_URL!=='-' && emp.LOGO_URL!=='') ? emp.LOGO_URL : '';
  var hoy=new Date();
  var fechaEmision=String(hoy.getDate()).padStart(2,'0')+'/'+String(hoy.getMonth()+1).padStart(2,'0')+'/'+hoy.getFullYear();

  var reg=[];
  if(pac.MEDICO_CMP) reg.push('CMP: '+pac.MEDICO_CMP);
  if(pac.MEDICO_RNE) reg.push('RNE: '+pac.MEDICO_RNE);
  var firmaReg = reg.length ? '<div class="dm-firma-reg">'+reg.join(' &nbsp;·&nbsp; ')+'</div>' : '';

  var encabezado = logo
    ? '<div class="dm-head"><img src="'+logo+'" class="dm-logo" onerror="this.style.display=\'none\'"/></div>'
    : '<div class="dm-head"><div class="dm-emp-nom">'+(emp.NOMBRE||'CONSULTORIOS MÉDICOS VIZVALL')+'</div></div>';

  function v(x){ return (params[x] && params[x]!=='-') ? params[x] : ''; }

  // Tratamiento y género según sexo del paciente
  var sexo = (pac.SEXO||'').toString().toUpperCase();
  var esFem = (sexo.indexOf('F')===0 || sexo.indexOf('MUJER')>=0);
  var tratamiento = esFem ? 'la Sra./Srta.' : 'el Sr.';
  var generoLetra = esFem ? 'a' : 'o';
  // Tipo de documento (por defecto DNI)
  var tipoDoc = (pac.TIPO_DOCUMENTO && pac.TIPO_DOCUMENTO!=='-') ? pac.TIPO_DOCUMENTO : 'DNI';
  // Edad
  var edadTxt = pac.EDAD ? (' de '+String(pac.EDAD).replace(/\s*años?/i,'')+' años') : '';
  // Fecha larga en español: "Lima, 06 de Mayo del 2026"
  var meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var ciudad = (emp.CIUDAD && emp.CIUDAD!=='-') ? emp.CIUDAD : 'Lima';
  var fechaLarga = ciudad+', '+String(hoy.getDate()).padStart(2,'0')+' de '+meses[hoy.getMonth()]+' del '+hoy.getFullYear();

  var html='<!DOCTYPE html><html><head><meta charset="utf-8"><title>Descanso Médico</title>'+
    '<style>'+
    '@page{size:A4 portrait;margin:14mm}'+
    '*{box-sizing:border-box}'+
    'body{font-family:\'Segoe UI\',\'Helvetica Neue\',Arial,sans-serif;color:#1A1A1A;font-size:10.5pt;line-height:1.4;padding:0;margin:0}'+
    '.dm-head{text-align:center;padding-bottom:12px;border-bottom:3px solid #C8241A;margin-bottom:2px}'+
    '.dm-logo{max-height:70px;max-width:220px}'+
    '.dm-emp-nom{font-size:20pt;font-weight:800;color:#C8241A;letter-spacing:.5px}'+
    '.dm-empdatos{text-align:center;font-size:8.5pt;color:#777;padding:8px 0 0;margin-bottom:18px}'+
    '.dm-titulo{text-align:center;font-size:14pt;font-weight:700;letter-spacing:2px;color:#fff;background:#C8241A;padding:8px;border-radius:6px;margin:0 0 20px}'+
    '.dm-datos{background:#F8F4F4;border-radius:8px;padding:14px 18px;margin-bottom:8px;border-left:4px solid #C8241A}'+
    '.dm-row{display:flex;flex-wrap:wrap;margin:6px 0;font-size:10.5pt;gap:4px 24px}'+
    '.dm-k{color:#999;font-weight:600;font-size:9pt;text-transform:uppercase;letter-spacing:.5px;min-width:150px}'+
    '.dm-vv{color:#1A1A1A;font-weight:600;flex:1;min-width:0}'+
    '.dm-cuerpo{font-size:11pt;line-height:1.7;text-align:justify;margin:8px 0}'+
    '.dm-cuerpo p{margin:0}'+
    '.dm-cuerpo b{color:#1A1A1A}'+
    '.dm-fechas{display:flex;gap:40px;justify-content:center;margin:18px 0;padding:14px;background:#FDECEA;border:1.5px solid #F0B5AF;border-radius:10px;font-size:11.5pt}'+
    '.dm-fk{color:#C8241A;font-weight:700;text-transform:uppercase;font-size:9.5pt;letter-spacing:.5px}'+
    '.dm-firma{margin-top:70px;text-align:center}'+
