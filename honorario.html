<style>
#sec-honorarios { display:none;overflow:auto;position:absolute;top:56px;left:0;right:0;bottom:0;background:var(--bg,#F2F3F5); }
#sec-honorarios.activo { display:block; }
.hn-wrap { padding:20px 24px; }
.hn-title { font-size:20px;font-weight:700;margin-bottom:4px;letter-spacing:-.3px;display:flex;align-items:center;gap:9px; }
.hn-sub { font-size:13px;color:#8A8A8A;margin-bottom:20px; }
.hn-tabs { display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;background:#F4F5F7;padding:5px;border-radius:12px;width:fit-content; }
.hn-tab { padding:9px 16px;border:none;border-radius:8px;background:transparent;cursor:pointer;font-size:13px;font-weight:600;color:#6B7280;display:inline-flex;align-items:center;gap:7px;transition:all .18s; }
.hn-tab:hover { color:#C8241A;background:rgba(200,36,26,.06); }
.hn-tab.sel { background:#fff;color:#C8241A;box-shadow:0 1px 3px rgba(0,0,0,.1); }
.hn-card { background:#fff;border:1px solid #EEF0F3;border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04); }
.hn-fg { margin-bottom:12px; }
.hn-flabel { display:block;font-size:12px;color:#555;margin-bottom:4px;font-weight:500; }
.hn-finp { width:100%;padding:9px 11px;border:1px solid #E2E4E9;border-radius:8px;font-size:13.5px;box-sizing:border-box;font-family:DM Sans,sans-serif; }
.hn-finp:focus { border-color:#C8241A;outline:none;box-shadow:0 0 0 3px rgba(200,36,26,.08); }
.hn-btn { padding:9px 16px;border:1px solid #E2E4E9;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;font-family:DM Sans,sans-serif;display:inline-flex;align-items:center;gap:5px; }
.hn-btn.primary { background:#C8241A;color:#fff;border-color:#C8241A;font-weight:600;box-shadow:0 1px 2px rgba(200,36,26,.2); }
.hn-btn.primary:hover { background:#A81E15; }
.hn-btn:hover { background:#FAFBFC; }
.hn-btn.sm { padding:5px 11px;font-size:12px; }
.hn-table { width:100%;border-collapse:collapse;font-size:13px; }
.hn-table th { padding:10px 12px;text-align:left;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#9AA0A6;background:#FAFBFC;border-bottom:1px solid #E8EAED; }
.hn-table td { padding:11px 12px;border-bottom:1px solid #F2F3F5; }
.hn-table tbody tr:hover { background:#FAFBFC; }
.hn-chip { font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:20px;background:#EDE9FE;color:#6B3FA0;display:inline-flex;align-items:center;gap:4px; }
.hn-empty { text-align:center;color:#8A8A8A;padding:36px 20px;font-size:13.5px; }
.hn-grid2 { display:grid;grid-template-columns:1fr 1fr;gap:12px; }
@media(max-width:600px){ .hn-grid2{grid-template-columns:1fr} }
</style>

<div id="sec-honorarios">
<div class="hn-wrap">
  <div class="hn-title" id="hn-title">💼 Honorarios del personal</div>
  <div class="hn-sub" id="hn-sub">Configura cómo se le paga a cada médico/profesional y registra sus pagos.</div>

  <div class="hn-tabs" style="display:none">
    <div class="hn-tab sel" id="hn-tab-config" onclick="hnVista('config')">⚙️ Configuración</div>
    <div class="hn-tab" id="hn-tab-asistencia" onclick="hnVista('asistencia')">📋 Asistencia</div>
    <div class="hn-tab" id="hn-tab-pagar" onclick="hnVista('pagar')">💵 Pagar honorario</div>
    <div class="hn-tab" id="hn-tab-comisiones" onclick="hnVista('comisiones')">💼 Comisiones</div>
    <div class="hn-tab" id="hn-tab-historial" onclick="hnVista('historial')">🧾 Historial de pagos</div>
  </div>

  <div id="hn-body"><div class="hn-empty">Cargando…</div></div>
</div>
</div>

<!-- MODAL: configurar honorario -->
<div id="hn-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:12px;width:90%;max-width:480px;max-height:90vh;overflow:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid #EEF0F3">
      <span style="font-weight:600;font-size:15px" id="hn-modal-title">Nueva configuración</span>
      <button class="hn-btn sm" onclick="hnCerrarModal()">✕</button>
    </div>
    <div style="padding:16px 18px">
      <input type="hidden" id="hn-c-id"/>
      <div class="hn-fg">
        <label class="hn-flabel">Tipo de personal <span style="color:#C8241A">*</span></label>
        <select class="hn-finp" id="hn-c-tipo" onchange="hnCargarPersonal()">
          <option value="MEDICO">Médico</option>
          <option value="PROFESIONAL">Profesional de apoyo</option>
        </select>
      </div>
      <div class="hn-fg">
        <label class="hn-flabel">Personal <span style="color:#C8241A">*</span></label>
        <select class="hn-finp" id="hn-c-personal"><option value="">— Cargando… —</option></select>
      </div>
      <div class="hn-fg">
        <label class="hn-flabel">Modalidad de pago <span style="color:#C8241A">*</span></label>
        <select class="hn-finp" id="hn-c-modalidad" onchange="hnAjustarMonto()">
          <option value="SUELDO_FIJO">Sueldo fijo mensual</option>
          <option value="POR_TURNO">Monto fijo por turno</option>
          <option value="POR_HORA">Monto fijo por hora</option>
          <option value="PORCENTAJE">Porcentaje sobre ventas</option>
        </select>
      </div>
      <div class="hn-fg">
        <label class="hn-flabel" id="hn-c-montolabel">Monto (S/) <span style="color:#C8241A">*</span></label>
        <input class="hn-finp" id="hn-c-monto" type="number" min="0" step="0.01" placeholder="0.00"/>
        <span style="font-size:11px;color:#8A8A8A" id="hn-c-montohint"></span>
      </div>
      <div class="hn-fg">
        <label class="hn-flabel">Descripción / nota</label>
        <input class="hn-finp" id="hn-c-desc" type="text" maxlength="100" placeholder="Opcional" oninput="this.value=this.value.toUpperCase()"/>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:6px">
        <button class="hn-btn" onclick="hnCerrarModal()">Cancelar</button>
        <button class="hn-btn primary" onclick="hnGuardarConfig()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<script>
// ═══ HONORARIOS — prefijo "hn" ═══
var hnVistaActual='config', hnConfigs=[], hnMedicos=[], hnProfesionales=[], hnPagos=[];

function hnAbrir(sub) {
  // Mapeo de la acción del menú → pestaña interna
  var mapa = {
    'Resumen':'resumen',
    'Configuración honorarios':'config', 'Configuración':'config', 'Configuracion':'config',
    'Asistencia':'asistencia',
    'Pagar honorario':'pagar', 'Pagar':'pagar',
    'Comisiones':'comisiones',
    'Historial de pagos':'historial', 'Historial':'historial'
  };
  var vista = (sub && mapa[sub]) ? mapa[sub] : 'resumen';
  hnVista(vista);
}

function hnVista(v) {
  hnVistaActual=v;
  ['resumen','config','asistencia','pagar','comisiones','historial'].forEach(function(t){
    var el=document.getElementById('hn-tab-'+t); if(el) el.classList.toggle('sel', t===v);
  });
  // Actualizar título/subtítulo según la sección (navegación por menú)
  var titulos = {
    resumen:   ['📊 Resumen de honorarios','Vista general de comisiones y pagos.'],
    config:    ['⚙️ Configuración de honorarios','Define cómo se le paga a cada médico/profesional.'],
    asistencia:['📋 Asistencia','Registra y consulta la asistencia del personal.'],
    pagar:     ['💵 Pagar honorario','Calcula y registra el pago de honorarios.'],
    comisiones:['💼 Comisiones','Asigna y paga comisiones por venta (médicos y profesionales).'],
    historial: ['🧾 Historial de pagos','Consulta los pagos realizados.']
  };
  var t = document.getElementById('hn-title'), s = document.getElementById('hn-sub');
  if (t && titulos[v]) t.textContent = titulos[v][0];
  if (s && titulos[v]) s.textContent = titulos[v][1];
  if(v==='resumen') hnCargarResumen();
  else if(v==='config') hnCargarConfig();
  else if(v==='asistencia') hnCargarAsistencia();
  else if(v==='pagar') hnCargarPagar();
  else if(v==='comisiones') hnCargarComisiones();
  else hnCargarHistorial();
}

function hnSoles(n){ return 'S/ '+(parseFloat(n)||0).toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function hnModLabel(m){ return {SUELDO_FIJO:'Sueldo fijo',POR_TURNO:'Por turno',POR_HORA:'Por hora',PORCENTAJE:'% sobre ventas'}[m]||m; }

// ── CONFIGURACIÓN ──
// ── RESUMEN / TABLERO ──
function hnCargarResumen() {
  var body=document.getElementById('hn-body');
  body.innerHTML='<div class="hn-empty">⏳ Cargando resumen…</div>';
  vzvRun().withSuccessHandler(function(resp){
    if(!resp||!resp.ok){ body.innerHTML='<div class="hn-empty" style="color:#C8241A">⚠ '+(resp?resp.mensaje:'Error')+'</div>'; return; }
    hnRenderResumen(resp.datos);
  }).withFailureHandler(function(e){ body.innerHTML='<div class="hn-empty" style="color:#C8241A">⚠ '+e.message+'</div>'; })
    .ejecutar('resumenHonorarios', { usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

function hnFicha(icono, etiqueta, valor, color, sub) {
  return '<div style="background:#fff;border:1px solid #EEF0F3;border-radius:14px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.04)">'+
    '<div style="font-size:22px;margin-bottom:8px">'+icono+'</div>'+
    '<div style="font-size:24px;font-weight:700;color:'+color+';line-height:1">'+valor+'</div>'+
    '<div style="font-size:12px;color:#6B7280;margin-top:6px;font-weight:500">'+etiqueta+'</div>'+
    (sub?'<div style="font-size:11px;color:#9AA0A6;margin-top:3px">'+sub+'</div>':'')+
  '</div>';
}

function hnRenderResumen(d) {
  var body=document.getElementById('hn-body');
  var mesTxt = d.MES || '';

  var html='';
  // Bloque 1: Comisiones
  html+='<div style="font-size:13px;font-weight:700;color:#6B3FA0;margin:4px 0 12px">💼 COMISIONES</div>'+
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px">'+
      hnFicha('💰','Pendientes de pago', hnSoles(d.COM_PENDIENTE), '#C8241A', 'Este mes: '+hnSoles(d.COM_PENDIENTE_MES))+
      hnFicha('✅','Pagadas (total)', hnSoles(d.COM_PAGADA), '#0A7A3F', 'Este mes: '+hnSoles(d.COM_PAGADA_MES))+
      hnFicha('👥','Personas con pendiente', d.PERSONAS_PENDIENTES, '#1A5A9E', '')+
    '</div>';

  // Bloque 2: Pagos de honorarios
  html+='<div style="font-size:13px;font-weight:700;color:#0A7A3F;margin:4px 0 12px">💵 PAGOS DE HONORARIOS</div>'+
    '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:24px">'+
      hnFicha('💵','Total pagado (histórico)', hnSoles(d.PAGOS_TOTAL), '#0A7A3F', '')+
      hnFicha('📅','Pagado este mes', hnSoles(d.PAGOS_MES), '#1A5A9E', (d.PAGOS_CANT_MES||0)+' pago(s)')+
    '</div>';

  // Bloque 3: Desglose por persona (lo que se debe)
  html+='<div class="hn-card">'+
    '<div style="font-size:15px;font-weight:700;color:#1A1A1A;margin-bottom:4px">📋 Pendiente por persona</div>'+
    '<div style="font-size:12px;color:#8A8A8A;margin-bottom:14px">Comisiones pendientes de pago agrupadas por ejecutor.</div>';
  var desglose = d.DESGLOSE || [];
  if (!desglose.length) {
    html+='<div class="hn-empty">No hay comisiones pendientes. 🎉</div>';
  } else {
    html+='<table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr>'+
      '<th style="padding:8px 12px;text-align:left;font-size:10.5px;color:#8A8A8A;font-weight:600;text-transform:uppercase">Persona</th>'+
      '<th style="padding:8px 12px;text-align:left;font-size:10.5px;color:#8A8A8A;font-weight:600;text-transform:uppercase">Tipo</th>'+
      '<th style="padding:8px 12px;text-align:center;font-size:10.5px;color:#8A8A8A;font-weight:600;text-transform:uppercase">Comisiones</th>'+
      '<th style="padding:8px 12px;text-align:right;font-size:10.5px;color:#8A8A8A;font-weight:600;text-transform:uppercase">Total a pagar</th>'+
      '</tr></thead><tbody>';
    desglose.forEach(function(p){
      var tipoBadge = p.tipo==='PROFESIONAL'
        ? '<span style="font-size:10.5px;padding:2px 8px;border-radius:10px;background:#E6F0FB;color:#1A5A9E">🔬 Profesional</span>'
        : '<span style="font-size:10.5px;padding:2px 8px;border-radius:10px;background:#E6F6EC;color:#0A7A3F">🩺 Médico</span>';
      html+='<tr style="border-top:1px solid #F0F1F3">'+
        '<td style="padding:9px 12px;font-weight:600;color:#1A1A1A">'+(p.nombre||'—')+'</td>'+
        '<td style="padding:9px 12px">'+tipoBadge+'</td>'+
        '<td style="padding:9px 12px;text-align:center;color:#666">'+(p.cantidad||0)+'</td>'+
        '<td style="padding:9px 12px;text-align:right;color:#C8241A;font-weight:700">'+hnSoles(p.total)+'</td>'+
      '</tr>';
    });
    html+='</tbody></table>';
  }
  html+='</div>';

  body.innerHTML=html;
}

function hnCargarConfig() {
  var body=document.getElementById('hn-body');
  body.innerHTML='<div class="hn-empty">⏳ Cargando…</div>';
  vzvRun().withSuccessHandler(function(resp){
    if(!resp||!resp.ok){ body.innerHTML='<div class="hn-empty" style="color:#C8241A">⚠ '+(resp?resp.mensaje:'Error')+'</div>'; return; }
    hnConfigs = Array.isArray(resp.datos)?resp.datos.filter(function(x){return x.ESTADO==='ACTIVO';}):[];
    hnRenderConfig();
  }).withFailureHandler(function(e){ body.innerHTML='<div class="hn-empty" style="color:#C8241A">⚠ '+e.message+'</div>'; })
    .ejecutar('listarHonorarioConfig', { usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

function hnRenderConfig() {
  var body=document.getElementById('hn-body');
  var html='<div style="display:flex;justify-content:flex-end;margin-bottom:12px"><button class="hn-btn primary" onclick="hnNuevaConfig()">+ Asignar honorario</button></div>';
  if(!hnConfigs.length){
    html+='<div class="hn-card"><div class="hn-empty">Sin configuraciones. Asigne cómo se le paga a cada médico/profesional.</div></div>';
    body.innerHTML=html; return;
  }
  html+='<div class="hn-card" style="padding:0"><table class="hn-table"><thead><tr><th>Personal</th><th>Tipo</th><th>Modalidad</th><th style="text-align:right">Monto</th><th style="text-align:center">Acciones</th></tr></thead><tbody>';
  hnConfigs.forEach(function(h){
    html+='<tr>'+
      '<td><b>'+(h.NOMBRE_PERSONAL||'—')+'</b></td>'+
      '<td>'+(h.TIPO_PERSONAL||'')+'</td>'+
      '<td><span class="hn-chip">'+hnModLabel(h.MODALIDAD)+'</span></td>'+
      '<td style="text-align:right;font-weight:600">'+(h.MODALIDAD==='PORCENTAJE'?(h.MONTO+'%'):hnSoles(h.MONTO))+'</td>'+
      '<td style="text-align:center">'+
        '<button class="hn-btn sm" onclick="hnEditarConfig(\''+h.ID_HONORARIO_CONFIG+'\')">✏️</button> '+
        '<button class="hn-btn sm" style="color:#C8241A;border-color:#F5C2C0" onclick="hnDesactivarConfig(\''+h.ID_HONORARIO_CONFIG+'\')">✕</button>'+
      '</td>'+
    '</tr>';
  });
  html+='</tbody></table></div>';
  body.innerHTML=html;
}

function hnNuevaConfig() {
  document.getElementById('hn-modal-title').textContent='Nueva configuración';
  document.getElementById('hn-c-id').value='';
  document.getElementById('hn-c-tipo').value='MEDICO';
  document.getElementById('hn-c-modalidad').value='SUELDO_FIJO';
  document.getElementById('hn-c-monto').value='';
  document.getElementById('hn-c-desc').value='';
  hnAjustarMonto();
  hnCargarPersonal();
  document.getElementById('hn-modal').style.display='flex';
}

function hnEditarConfig(id) {
  var h=hnConfigs.find(function(x){ return x.ID_HONORARIO_CONFIG===id; });
  if(!h) return;
  document.getElementById('hn-modal-title').textContent='Editar configuración';
  document.getElementById('hn-c-id').value=h.ID_HONORARIO_CONFIG;
  document.getElementById('hn-c-tipo').value=h.TIPO_PERSONAL||'MEDICO';
  document.getElementById('hn-c-modalidad').value=h.MODALIDAD||'SUELDO_FIJO';
  document.getElementById('hn-c-monto').value=h.MONTO||'';
  document.getElementById('hn-c-desc').value=(h.DESCRIPCION&&h.DESCRIPCION!=='-')?h.DESCRIPCION:'';
  hnAjustarMonto();
  hnCargarPersonal(h.ID_PERSONAL);
  document.getElementById('hn-modal').style.display='flex';
}

function hnAjustarMonto() {
  var mod=document.getElementById('hn-c-modalidad').value;
  var label=document.getElementById('hn-c-montolabel');
  var hint=document.getElementById('hn-c-montohint');
  if(mod==='PORCENTAJE'){ label.innerHTML='Porcentaje (%) <span style="color:#C8241A">*</span>'; hint.textContent='Ej: 60 = el personal recibe 60% de lo facturado'; }
  else if(mod==='POR_TURNO'){ label.innerHTML='Monto por turno (S/) <span style="color:#C8241A">*</span>'; hint.textContent='Lo que se paga por cada turno trabajado'; }
  else if(mod==='POR_HORA'){ label.innerHTML='Monto por hora (S/) <span style="color:#C8241A">*</span>'; hint.textContent='Lo que se paga por cada hora trabajada'; }
  else { label.innerHTML='Sueldo mensual (S/) <span style="color:#C8241A">*</span>'; hint.textContent='Monto fijo mensual'; }
}

function hnCargarPersonal(seleccionar) {
  var tipo=document.getElementById('hn-c-tipo').value;
  var sel=document.getElementById('hn-c-personal');
  sel.innerHTML='<option value="">⏳ Cargando…</option>';
  if(tipo==='MEDICO'){
    if(hnMedicos.length){ hnLlenarPersonal(hnMedicos, seleccionar, 'ID_MEDICO'); return; }
    vzvRun().withSuccessHandler(function(resp){
      var d = resp&&resp.ok ? (resp.datos&&resp.datos.datos?resp.datos.datos:(Array.isArray(resp.datos)?resp.datos:[])) : [];
      hnMedicos=d; hnLlenarPersonal(d, seleccionar, 'ID_MEDICO');
    }).withFailureHandler(function(){}).ejecutar('listarMedicos',{limite:500,usuario:sesion.USUARIO||'',rol:sesion.ROL||'',token:sesion.TOKEN||''});
  } else {
    if(hnProfesionales.length){ hnLlenarPersonal(hnProfesionales, seleccionar, 'ID_PROFESIONAL'); return; }
    vzvRun().withSuccessHandler(function(resp){
      var d = resp&&resp.ok ? (resp.datos&&resp.datos.datos?resp.datos.datos:(Array.isArray(resp.datos)?resp.datos:[])) : [];
      hnProfesionales=d; hnLlenarPersonal(d, seleccionar, 'ID_PROFESIONAL');
    }).withFailureHandler(function(){}).ejecutar('listarProfApoyo',{limite:500,usuario:sesion.USUARIO||'',rol:sesion.ROL||'',token:sesion.TOKEN||''});
  }
}

function hnLlenarPersonal(lista, seleccionar, idCol) {
  var sel=document.getElementById('hn-c-personal');
  if(!lista.length){ sel.innerHTML='<option value="">Sin registros</option>'; return; }
  sel.innerHTML='<option value="">— Seleccione —</option>'+lista.map(function(p){
    var nom=(p.NOMBRES||'')+' '+(p.APELLIDOS||'');
    var s4=(seleccionar===p[idCol])?' selected':'';
    return '<option value="'+p[idCol]+'" data-nombre="'+nom.trim()+'"'+s4+'>'+nom.trim()+'</option>';
  }).join('');
}

function hnGuardarConfig() {
  var sel=document.getElementById('hn-c-personal');
  var idPersonal=sel.value;
  var nombre=sel.options[sel.selectedIndex]?sel.options[sel.selectedIndex].getAttribute('data-nombre'):'';
  var monto=document.getElementById('hn-c-monto').value;
  if(!idPersonal){ alert('⚠ Seleccione el personal'); return; }
  if(!monto||parseFloat(monto)<0){ alert('⚠ Indique el monto'); return; }
  vzvRun().withSuccessHandler(function(resp){
    if(!resp||!resp.ok){ alert('⚠ '+(resp?resp.mensaje:'Error')); return; }
    hnCerrarModal();
    hnCargarConfig();
  }).withFailureHandler(function(e){ alert('⚠ '+e.message); })
    .ejecutar('guardarHonorarioConfig', {
      ID_HONORARIO_CONFIG: document.getElementById('hn-c-id').value,
      TIPO_PERSONAL: document.getElementById('hn-c-tipo').value,
      ID_PERSONAL: idPersonal, NOMBRE_PERSONAL: nombre,
      MODALIDAD: document.getElementById('hn-c-modalidad').value,
      MONTO: monto, DESCRIPCION: document.getElementById('hn-c-desc').value,
      usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||''
    });
}

function hnDesactivarConfig(id) {
  if(!confirm('¿Desactivar esta configuración de honorario?')) return;
  vzvRun().withSuccessHandler(function(resp){
    if(!resp||!resp.ok){ alert('⚠ '+(resp?resp.mensaje:'Error')); return; }
    hnCargarConfig();
  }).withFailureHandler(function(e){ alert('⚠ '+e.message); })
    .ejecutar('desactivarHonorarioConfig', { ID_HONORARIO_CONFIG:id, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

function hnCerrarModal() { document.getElementById('hn-modal').style.display='none'; }

// ── ASISTENCIA (Fase B) ──
var hnAsisFecha='';

function hnCargarAsistencia() {
  var body=document.getElementById('hn-body');
  if(!hnAsisFecha) hnAsisFecha=hnHoyISO();
  body.innerHTML=
    '<div class="hn-card">'+
      '<div style="font-size:14px;font-weight:600;margin-bottom:14px">📋 Registrar asistencia</div>'+
      '<div class="hn-grid2">'+
        '<div class="hn-fg"><label class="hn-flabel">Tipo de personal</label>'+
          '<select class="hn-finp" id="hn-a-tipo" onchange="hnACargarPersonal()"><option value="MEDICO">Médico</option><option value="PROFESIONAL">Profesional de apoyo</option></select></div>'+
        '<div class="hn-fg"><label class="hn-flabel">Personal <span style="color:#C8241A">*</span></label>'+
          '<select class="hn-finp" id="hn-a-personal" onchange="hnListarAsistenciaMes()"><option value="">— Cargando… —</option></select></div>'+
      '</div>'+
      '<div class="hn-grid2">'+
        '<div class="hn-fg"><label class="hn-flabel">Fecha <span style="color:#C8241A">*</span></label>'+
          '<input class="hn-finp" id="hn-a-fecha" type="date" value="'+hnAsisFecha+'" onchange="hnAsisFecha=this.value"/></div>'+
        '<div class="hn-fg"><label class="hn-flabel">Turno</label>'+
          '<select class="hn-finp" id="hn-a-turno"><option value="MAÑANA">Mañana</option><option value="TARDE">Tarde</option><option value="NOCHE">Noche</option><option value="ÚNICO">Único</option></select></div>'+
      '</div>'+
      '<div class="hn-grid2">'+
        '<div class="hn-fg"><label class="hn-flabel">Horas trabajadas</label>'+
          '<input class="hn-finp" id="hn-a-horas" type="number" min="0" step="0.5" placeholder="Ej: 6"/></div>'+
        '<div class="hn-fg"><label class="hn-flabel">¿Asistió?</label>'+
          '<select class="hn-finp" id="hn-a-asistio"><option value="SI">✓ Sí asistió</option><option value="NO">✕ No asistió</option></select></div>'+
      '</div>'+
      '<div style="display:flex;justify-content:flex-end"><button class="hn-btn primary" onclick="hnGuardarAsistencia()">💾 Registrar</button></div>'+
    '</div>'+

      '<div style="padding:14px 16px;border-bottom:1px solid #F2F3F5;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">'+
        '<span style="font-size:14px;font-weight:600" id="hn-a-titulo">Asistencia del mes</span>'+
        '<div style="display:flex;align-items:center;gap:6px">'+
          '<input class="hn-finp" id="hn-a-mes" type="month" value="'+hnMesActual()+'" onchange="hnListarAsistenciaMes()" style="padding:5px 8px;font-size:12px;width:auto"/>'+
        '</div>'+
      '</div>'+
      '<div style="padding:8px 16px;background:#FAFBFC;border-bottom:1px solid #F2F3F5;font-size:12px;color:#8A8A8A" id="hn-a-resumen"></div>'+
      '<div id="hn-a-lista"><div class="hn-empty">Seleccione un personal para ver su asistencia del mes.</div></div>'+
    '</div>';

function hnMesActual(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }

function hnACargarPersonal() {
  var tipo=document.getElementById('hn-a-tipo').value;
  var sel=document.getElementById('hn-a-personal');
  sel.innerHTML='<option value="">⏳…</option>';
  var accion = tipo==='MEDICO' ? 'listarMedicos' : 'listarProfApoyo';
  var idCol = tipo==='MEDICO' ? 'ID_MEDICO' : 'ID_PROFESIONAL';
  vzvRun().withSuccessHandler(function(resp){
    var d = resp&&resp.ok ? (resp.datos&&resp.datos.datos?resp.datos.datos:(Array.isArray(resp.datos)?resp.datos:[])) : [];
    if(!d.length){ sel.innerHTML='<option value="">Sin registros</option>'; return; }
    sel.innerHTML='<option value="">— Seleccione —</option>'+d.map(function(p){
      var nom=((p.NOMBRES||'')+' '+(p.APELLIDOS||'')).trim();
      return '<option value="'+p[idCol]+'" data-nombre="'+nom+'">'+nom+'</option>';
    }).join('');
  }).withFailureHandler(function(){}).ejecutar(accion,{limite:500,usuario:sesion.USUARIO||'',rol:sesion.ROL||'',token:sesion.TOKEN||''});
}

function hnGuardarAsistencia() {
  var sel=document.getElementById('hn-a-personal');
  var idP=sel.value;
  var nombre=sel.options[sel.selectedIndex]?sel.options[sel.selectedIndex].getAttribute('data-nombre'):'';
  var fecha=document.getElementById('hn-a-fecha').value;
  if(!idP){ alert('⚠ Seleccione el personal'); return; }
  if(!fecha){ alert('⚠ Indique la fecha'); return; }
  vzvRun().withSuccessHandler(function(resp){
    if(!resp||!resp.ok){ alert('⚠ '+(resp?resp.mensaje:'Error')); return; }
    document.getElementById('hn-a-horas').value='';
    hnListarAsistenciaMes();
    if(typeof pnNotif==='function') pnNotif('✓ Asistencia registrada','ok');
  }).withFailureHandler(function(e){ alert('⚠ '+e.message); })
    .ejecutar('registrarAsistencia', {
      TIPO_PERSONAL:document.getElementById('hn-a-tipo').value, ID_PERSONAL:idP, NOMBRE_PERSONAL:nombre,
      FECHA:fecha, TURNO:document.getElementById('hn-a-turno').value,
      HORAS:document.getElementById('hn-a-horas').value||'0',
      ASISTIO:document.getElementById('hn-a-asistio').value,
      usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||''
    });
}

function hnListarAsistenciaMes() {
  var sel=document.getElementById('hn-a-personal');
  var idP=sel?sel.value:'';
  var nombre=(sel&&sel.options[sel.selectedIndex])?sel.options[sel.selectedIndex].getAttribute('data-nombre'):'';
  var cont=document.getElementById('hn-a-lista');
  var titulo=document.getElementById('hn-a-titulo');
  var resumen=document.getElementById('hn-a-resumen');
  if(!idP){
    if(cont) cont.innerHTML='<div class="hn-empty">Seleccione un personal para ver su asistencia del mes.</div>';
    if(titulo) titulo.textContent='Asistencia del mes';
    if(resumen) resumen.textContent='';
    return;
  }
  // Calcular rango del mes elegido
  var mes=document.getElementById('hn-a-mes').value || hnMesActual(); // YYYY-MM
  var desde=mes+'-01';
  var partes=mes.split('-');
  var ultimoDia=new Date(parseInt(partes[0]), parseInt(partes[1]), 0).getDate();
  var hasta=mes+'-'+String(ultimoDia).padStart(2,'0');
  if(titulo) titulo.textContent='Asistencia de '+(nombre||'—');
  if(cont) cont.innerHTML='<div class="hn-empty">Cargando…</div>';
  vzvRun().withSuccessHandler(function(resp){
    var lista = resp&&resp.ok&&Array.isArray(resp.datos)?resp.datos:[];
    hnRenderAsistenciaMes(lista, mes);
  }).withFailureHandler(function(){ if(cont) cont.innerHTML='<div class="hn-empty" style="color:#C8241A">Error</div>'; })
    .ejecutar('listarAsistencia', { ID_PERSONAL:idP, desde:desde, hasta:hasta, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

function hnRenderAsistenciaMes(lista, mes) {
  var cont=document.getElementById('hn-a-lista');
  var resumen=document.getElementById('hn-a-resumen');
  if(!cont) return;
  // Resumen del mes (valor añadido)
  var totalDias=0, totalHoras=0, asistidos=0, faltas=0;
  lista.forEach(function(a){
    totalDias++;
    totalHoras += (parseFloat(a.HORAS)||0);
    if(String(a.ASISTIO).toUpperCase()==='SI') asistidos++; else faltas++;
  });
  if(resumen){
    if(lista.length){
      resumen.innerHTML='📅 <b>'+asistidos+'</b> día(s) asistido(s)'+(faltas>0?' · ✕ <b style="color:#C8241A">'+faltas+'</b> falta(s)':'')+' · 🕐 <b>'+totalHoras+'</b> hora(s) en el mes';
    } else { resumen.textContent=''; }
  }
  if(!lista.length){ cont.innerHTML='<div class="hn-empty" style="padding:24px">Sin registros este mes. Registre el primer día arriba.</div>'; return; }
  var esAdmin=(sesion&&sesion.ROL==='ADMINISTRADOR');
  cont.innerHTML=lista.map(function(a){
    var asistio = String(a.ASISTIO).toUpperCase()==='SI';
    var btn = esAdmin ? '<button class="hn-btn sm" style="color:#C8241A;border-color:#F5C2C0" onclick="hnAnularAsistencia(\''+a.ID_ASISTENCIA+'\')">✕</button>' : '';
    var fecha=(a.FECHA||'').substring(0,10);
    return '<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #F2F3F5">'+
      '<div style="width:32px;height:32px;border-radius:7px;background:'+(asistio?'#E6F6EC':'#FDECEA')+';display:flex;align-items:center;justify-content:center">'+(asistio?'✓':'✕')+'</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div style="font-size:13px;font-weight:500">'+fecha+'</div>'+
        '<div style="font-size:11.5px;color:#8A8A8A">'+(a.TURNO||'')+(a.HORAS&&a.HORAS!=='0'?' · '+a.HORAS+'h':'')+' · '+(asistio?'Asistió':'No asistió')+'</div></div>'+
      btn+
    '</div>';
  }).join('');
}

function hnAnularAsistencia(id) {
  if(!confirm('¿Anular este registro de asistencia?')) return;
  vzvRun().withSuccessHandler(function(resp){
    if(!resp||!resp.ok){ alert('⚠ '+(resp?resp.mensaje:'Error')); return; }
    hnListarAsistenciaMes();
  }).withFailureHandler(function(e){ alert('⚠ '+e.message); })
    .ejecutar('anularAsistencia', { ID_ASISTENCIA:id, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

function hnPagoSelConfig() {
  var id=document.getElementById('hn-p-config').value;
  var h=hnConfigs.find(function(x){ return x.ID_HONORARIO_CONFIG===id; });
  var box=document.getElementById('hn-p-tipopago-box');
  if(h && h.MODALIDAD==='SUELDO_FIJO'){
    // Mostrar selector quincena/fin de mes/completo
    if(box) box.style.display='';
    // Resetear a quincena por defecto
    var radios=document.getElementsByName('hn-tipopago');
    for(var i=0;i<radios.length;i++){ radios[i].checked = (radios[i].value==='QUINCENA'); }
    hnTipoPagoSueldo();
  } else {
    if(box) box.style.display='none';
    document.getElementById('hn-p-monto').value = h ? h.MONTO : '';
    var hint=document.getElementById('hn-p-sueldohint'); if(hint) hint.textContent='';
  }
  // Panel de asistencia: solo para POR_TURNO y POR_HORA
  var asisBox=document.getElementById('hn-p-asis-box');
  if(h && (h.MODALIDAD==='POR_TURNO' || h.MODALIDAD==='POR_HORA')){
    if(asisBox){
      asisBox.style.display='';
      var tit=document.getElementById('hn-p-asis-titulo');
      if(tit) tit.textContent = h.MODALIDAD==='POR_TURNO'
        ? '📊 Calcular: turnos asistidos × '+hnSoles(h.MONTO)+' por turno'
        : '📊 Calcular: horas trabajadas × '+hnSoles(h.MONTO)+' por hora';
      document.getElementById('hn-p-asis-resultado').textContent='';
      // Prefijar periodo = mes actual
      var hoy=new Date();
      document.getElementById('hn-p-asis-desde').value=hoy.getFullYear()+'-'+String(hoy.getMonth()+1).padStart(2,'0')+'-01';
      document.getElementById('hn-p-asis-hasta').value=hnHoyISO();
    }
  } else {
    if(asisBox) asisBox.style.display='none';
  }
  hnCalcTotal();
}

// Calcula el monto desde la asistencia del periodo (turnos×tarifa o horas×tarifa)
function hnCalcularDesdeAsistencia() {
  var id=document.getElementById('hn-p-config').value;
  var h=hnConfigs.find(function(x){ return x.ID_HONORARIO_CONFIG===id; });
  if(!h){ alert('⚠ Seleccione la configuración'); return; }
  var desde=document.getElementById('hn-p-asis-desde').value;
  var hasta=document.getElementById('hn-p-asis-hasta').value;
  if(!desde||!hasta){ alert('⚠ Indique el periodo'); return; }
  var res=document.getElementById('hn-p-asis-resultado');
  res.textContent='⏳ Calculando…';
  vzvRun().withSuccessHandler(function(resp){
    if(!resp||!resp.ok){ res.textContent='⚠ '+(resp?resp.mensaje:'Error'); return; }
    var d=resp.datos;
    var tarifa=parseFloat(h.MONTO)||0;
    var cantidad, unidad, monto;
    if(h.MODALIDAD==='POR_TURNO'){ cantidad=d.totalTurnos; unidad='turno(s)'; monto=cantidad*tarifa; }
    else { cantidad=d.totalHoras; unidad='hora(s)'; monto=cantidad*tarifa; }
    res.innerHTML='✓ <b>'+cantidad+' '+unidad+'</b> × '+hnSoles(tarifa)+' = <b style="color:#0A7A3F">'+hnSoles(monto)+'</b>';
    // Volcar al monto a pagar
    document.getElementById('hn-p-monto').value=monto.toFixed(2);
    // Copiar periodo a los campos de pago
    document.getElementById('hn-p-desde').value=desde;
    document.getElementById('hn-p-hasta').value=hasta;
    hnCalcTotal();
  }).withFailureHandler(function(e){ res.textContent='⚠ '+e.message; })
    .ejecutar('calcularAsistenciaPeriodo', { ID_PERSONAL:h.ID_PERSONAL, desde:desde, hasta:hasta, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

// Calcula el monto según el tipo de pago elegido (quincena = medio sueldo)
function hnTipoPagoSueldo() {
  var id=document.getElementById('hn-p-config').value;
  var h=hnConfigs.find(function(x){ return x.ID_HONORARIO_CONFIG===id; });
  if(!h) return;
  var sueldo=parseFloat(h.MONTO)||0;
  var tipo='QUINCENA';
  var radios=document.getElementsByName('hn-tipopago');
  for(var i=0;i<radios.length;i++){ if(radios[i].checked){ tipo=radios[i].value; break; } }
  var monto = (tipo==='COMPLETO') ? sueldo : (sueldo/2);
  document.getElementById('hn-p-monto').value=monto.toFixed(2);
  var hint=document.getElementById('hn-p-sueldohint');
  if(hint){
    if(tipo==='COMPLETO') hint.textContent='Sueldo mensual completo: '+hnSoles(sueldo);
    else hint.textContent='Medio sueldo ('+hnSoles(sueldo)+' ÷ 2 = '+hnSoles(sueldo/2)+')';
  }
  // Autocompletar observación con el tipo
  var obs=document.getElementById('hn-p-obs');
  if(obs){
    var txt = tipo==='QUINCENA'?'PAGO QUINCENA':(tipo==='FIN_MES'?'PAGO FIN DE MES':'PAGO MES COMPLETO');
    obs.value=txt;
  }
  hnCalcTotal();
}

// Calcula el total = monto base + bono
function hnCalcTotal() {
  var monto=parseFloat(document.getElementById('hn-p-monto').value)||0;
  var bono=parseFloat(document.getElementById('hn-p-bono').value)||0;
  var total=monto+bono;
  var el=document.getElementById('hn-p-total');
  if(el) el.textContent=hnSoles(total);
}

function hnRegistrarPago() {
  var id=document.getElementById('hn-p-config').value;
  var montoBase=parseFloat(document.getElementById('hn-p-monto').value)||0;
  var bono=parseFloat(document.getElementById('hn-p-bono').value)||0;
  if(!id){ alert('⚠ Seleccione la configuración'); return; }
  if(montoBase<=0){ alert('⚠ Indique un monto mayor a 0'); return; }
  if(bono<0){ alert('⚠ El bono no puede ser negativo'); return; }
  var h=hnConfigs.find(function(x){ return x.ID_HONORARIO_CONFIG===id; });
  if(!h){ alert('⚠ Configuración no válida'); return; }
  var monto=(montoBase+bono).toFixed(2); // total = base + bono
  // Agregar el bono a la observación para que quede el detalle
  var obsBase=document.getElementById('hn-p-obs').value.trim();
  var obsFinal = bono>0 ? ((obsBase?obsBase+' ':'')+'+ BONO S/'+bono.toFixed(2)+' (BASE S/'+montoBase.toFixed(2)+')') : obsBase;
  vzvRun().withSuccessHandler(function(resp){
    if(!resp||!resp.ok){ alert('⚠ '+(resp?resp.mensaje:'Error')); return; }
    alert('✓ Pago registrado correctamente');
    hnVista('historial');
  }).withFailureHandler(function(e){ alert('⚠ '+e.message); })
    .ejecutar('registrarPagoHonorario', {
      TIPO_PERSONAL:h.TIPO_PERSONAL, ID_PERSONAL:h.ID_PERSONAL, NOMBRE_PERSONAL:h.NOMBRE_PERSONAL,
      MODALIDAD:h.MODALIDAD, MONTO:monto,
      PERIODO_DESDE:document.getElementById('hn-p-desde').value||'-',
      PERIODO_HASTA:document.getElementById('hn-p-hasta').value||'-',
      MODO_PAGO:document.getElementById('hn-p-modo').value,
      OBSERVACION:obsFinal,
      usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||''
    });
}

      '<div style="display:flex;align-items:center;gap:10px">'+
        (esServicio
          ? '<input type="checkbox" id="hncom-chk-'+idx+'" '+(it.COM_ACTIVA?'checked':'')+disab+' onchange="hnComToggle('+idx+')" style="width:17px;height:17px"/>'
          : '<span style="width:17px;text-align:center" title="Los paquetes no comisionan por ítem">—</span>')+
        '<div style="flex:1">'+
          '<div style="font-weight:600;color:#1A1A1A">'+(it.SERVICIO_NOMBRE||'—')+(esPagada?' <span style="font-size:10.5px;padding:2px 8px;border-radius:10px;background:#0A7A3F;color:#fff;margin-left:6px">✓ Pagada</span>':'')+'</div>'+
          '<div style="font-size:11.5px;color:#8A8A8A">'+(etiqueta?etiqueta+' · ':'')+'S/ '+(parseFloat(it.SUBTOTAL)||0).toFixed(2)+(esPagada?' · Comisión: S/ '+(parseFloat(it.COM_MONTO)||0).toFixed(2):'')+'</div>'+
        '</div>'+
      '</div>'+
      (esServicio
        ? '<div id="hncom-cfg-'+idx+'" style="display:'+(it.COM_ACTIVA?'grid':'none')+';grid-template-columns:2fr 1fr 1fr;gap:10px;margin-top:10px;padding-left:27px">'+
            '<div><label style="font-size:10.5px;color:#666;display:block;margin-bottom:3px">Ejecutor</label>'+
              '<select id="hncom-ejec-'+idx+'"'+disab+' style="width:100%;padding:7px;border:1px solid #E2E4E9;border-radius:6px;font-size:12px'+(esPagada?';background:#F2F3F5':'')+'">'+hnComOpcionesEjecutor(selEjec)+'</select></div>'+
            '<div><label style="font-size:10.5px;color:#666;display:block;margin-bottom:3px">Cálculo</label>'+
              '<select id="hncom-tipo-'+idx+'"'+disab+' style="width:100%;padding:7px;border:1px solid #E2E4E9;border-radius:6px;font-size:12px'+(esPagada?';background:#F2F3F5':'')+'">'+
                '<option value="PORCENTAJE"'+(it.COM_TIPO_CALCULO!=='MONTO_FIJO'?' selected':'')+'>% Porcentaje</option>'+
                '<option value="MONTO_FIJO"'+(it.COM_TIPO_CALCULO==='MONTO_FIJO'?' selected':'')+'>S/ Monto fijo</option>'+

function hnComToggle(idx){
  var chk=document.getElementById('hncom-chk-'+idx);
  var cfg=document.getElementById('hncom-cfg-'+idx);
  if(cfg) cfg.style.display = chk.checked ? 'grid' : 'none';
}

function hnComCerrar(){ document.getElementById('hncom-detalle').innerHTML=''; hnComVentaActual=null; }

function hnComGuardar(){
  if(!hnComVentaActual){ alert('⚠ No hay venta abierta'); return; }
  var comisiones=[];
  for(var idx=0; idx<hnComItems.length; idx++){
    var it=hnComItems[idx];
    if(String(it.TIPO).toUpperCase()!=='SERVICIO') continue;
    // Los ítems ya pagados no se tocan (protección)
    if(String(it.COM_ESTADO||'').toUpperCase()==='PAGADA') continue;
    var chk=document.getElementById('hncom-chk-'+idx);
    if(!chk||!chk.checked) continue;
    var ejecVal=document.getElementById('hncom-ejec-'+idx).value;
    var valor=parseFloat(document.getElementById('hncom-val-'+idx).value)||0;
    var tipo=document.getElementById('hncom-tipo-'+idx).value;
    if(!ejecVal){ alert('⚠ Seleccione el ejecutor de: '+it.SERVICIO_NOMBRE); return; }
    if(valor<=0){ alert('⚠ Ingrese el valor de comisión de: '+it.SERVICIO_NOMBRE); return; }
    var sel=document.getElementById('hncom-ejec-'+idx);
    var nombreEjec=sel.options[sel.selectedIndex].textContent.replace(/^[^ ]+ /,'');
    var partes=ejecVal.split('|');
    comisiones.push({
      ID_DVENTA:it.ID_DVENTA, ID_SERVICIO:it.ID_SERVICIO, SERVICIO_NOMBRE:it.SERVICIO_NOMBRE,
      BASE:it.SUBTOTAL, TIPO_EJECUTOR:partes[0], ID_EJECUTOR:partes[1], NOMBRE_EJECUTOR:nombreEjec,
      TIPO_CALCULO:tipo, VALOR:valor
    });
  }
  vzvRun().withSuccessHandler(function(resp){
    if(!resp||!resp.ok){ alert('⚠ '+(resp?resp.mensaje:'Error')); return; }
    alert('✓ '+resp.mensaje);
    hnComCerrar();
    hnComCargarVentas();
    hnComCargarPagos();
  }).withFailureHandler(function(e){ alert('⚠ '+e.message); })
    .ejecutar('guardarComisionesDeVenta', { ID_VENTA:hnComVentaActual, comisiones:JSON.stringify(comisiones), usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

// ── Pago de comisiones pendientes (agrupadas por ejecutor) ──
function hnComCargarPagos(){
  var cont=document.getElementById('hncom-pagos');
  if(!cont) return;
  cont.innerHTML='<div class="hn-empty">Cargando…</div>';
  vzvRun().withSuccessHandler(function(resp){
    if(!resp||!resp.ok){ cont.innerHTML='<div class="hn-empty" style="color:#C8241A">⚠ '+(resp?resp.mensaje:'Error')+'</div>'; return; }
    hnComRenderPagos(Array.isArray(resp.datos)?resp.datos:[]);
  }).withFailureHandler(function(e){ cont.innerHTML='<div class="hn-empty" style="color:#C8241A">⚠ '+e.message+'</div>'; })
    .ejecutar('listarComisiones', { estado:'PENDIENTE', usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

function hnComRenderPagos(lista){
  var cont=document.getElementById('hncom-pagos');
  if(!cont) return;
  var pend=lista.filter(function(co){ return co.ESTADO==='PENDIENTE'; });
  if(!pend.length){ cont.innerHTML='<div class="hn-empty">No hay comisiones pendientes de pago.</div>'; return; }
  // Agrupar por ejecutor (ID_MEDICO contiene al médico o profesional)
  var grupos={};
  pend.forEach(function(co){
    var k=co.ID_MEDICO||'-';
    if(!grupos[k]) grupos[k]={ id:k, nombre:co.NOMBRE_MEDICO||k, tipo:co.TIPO_EJECUTOR||'MEDICO', total:0, cant:0 };
    grupos[k].total += (parseFloat(co.MONTO_COMISION)||0);
    grupos[k].cant++;
  });
  var html='<table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr>'+
    '<th style="padding:8px 12px;text-align:left;font-size:10.5px;color:#8A8A8A;font-weight:600;text-transform:uppercase">Ejecutor</th>'+
    '<th style="padding:8px 12px;text-align:left;font-size:10.5px;color:#8A8A8A;font-weight:600;text-transform:uppercase">Tipo</th>'+
    '<th style="padding:8px 12px;text-align:center;font-size:10.5px;color:#8A8A8A;font-weight:600;text-transform:uppercase">Comisiones</th>'+
    '<th style="padding:8px 12px;text-align:right;font-size:10.5px;color:#8A8A8A;font-weight:600;text-transform:uppercase">Total</th>'+
    '<th></th></tr></thead><tbody>';
  Object.keys(grupos).forEach(function(k){
    var g=grupos[k];
    var tipoBadge = g.tipo==='PROFESIONAL'
      ? '<span style="font-size:10.5px;padding:2px 8px;border-radius:10px;background:#E6F0FB;color:#1A5A9E">🔬 Profesional</span>'
      : '<span style="font-size:10.5px;padding:2px 8px;border-radius:10px;background:#E6F6EC;color:#0A7A3F">🩺 Médico</span>';
    html+='<tr style="border-top:1px solid #F0F1F3">'+
      '<td style="padding:9px 12px;font-weight:600;color:#1A1A1A">'+g.nombre+'</td>'+
      '<td style="padding:9px 12px">'+tipoBadge+'</td>'+
      '<td style="padding:9px 12px;text-align:center;color:#666">'+g.cant+'</td>'+
      '<td style="padding:9px 12px;text-align:right;color:#0A7A3F;font-weight:600">'+hnSoles(g.total)+'</td>'+
      '<td style="padding:9px 12px;text-align:right"><button onclick="hnComPagar(\''+g.id+'\',\''+(g.nombre.replace(/\\/g,"").replace(/'/g,""))+'\','+g.total+')" style="background:#0A7A3F;color:#fff;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:12px;font-weight:600">💵 Pagar</button></td>'+
    '</tr>';
  });
  html+='</tbody></table>';
  cont.innerHTML=html;
}

function hnComPagar(idEjecutor, nombre, total){

function hnCargarHistorial() {

    .ejecutar('listarPagosHonorario', { usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

function hnRenderHistorial() {
  var body=document.getElementById('hn-body');
  if(!hnPagos.length){ body.innerHTML='<div class="hn-card"><div class="hn-empty">Sin pagos registrados aún.</div></div>'; return; }
  var html='<div class="hn-card" style="padding:0"><table class="hn-table"><thead><tr><th>Fecha</th><th>Personal</th><th>Modalidad</th><th>Periodo</th><th style="text-align:right">Monto</th></tr></thead><tbody>';
  hnPagos.forEach(function(p){
    var periodo = (p.PERIODO_DESDE&&p.PERIODO_DESDE!=='-') ? (p.PERIODO_DESDE+' al '+p.PERIODO_HASTA) : '—';
    html+='<tr>'+
      '<td>'+(p.FECHA_PAGO||'').substring(0,16)+'</td>'+
      '<td><b>'+(p.NOMBRE_PERSONAL||'—')+'</b></td>'+
      '<td><span class="hn-chip">'+hnModLabel(p.MODALIDAD)+'</span></td>'+
      '<td style="font-size:12px;color:#8A8A8A">'+periodo+'</td>'+
      '<td style="text-align:right;font-weight:600;color:#C8241A">'+hnSoles(p.MONTO)+'</td>'+
    '</tr>';
  });
  html+='</tbody></table></div>';
  body.innerHTML=html;
}
</script>
