<!-- MODULO: LISTA DE MEDICOS
     Archivo: med-lista.html
     Llamado desde: Index.html via include()
-->
<style>
#sec-med-lista {
  display:none;overflow:hidden;position:absolute;
  top:56px;left:0;right:0;bottom:0;
  flex-direction:column;background:var(--bg,#F2F3F5);
}
#sec-med-lista.activo { display:flex; }
.ml-toolbar {
  background:#fff;border-bottom:1px solid var(--border,#E2E4E9);
  padding:10px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;
}
.ml-search-wrap { position:relative;flex:1;min-width:200px;max-width:360px; }
.ml-search-wrap svg { position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#8A8A8A; }
.ml-search {
  width:100%;padding:7px 12px 7px 34px;
  border:1.5px solid var(--border,#E2E4E9);border-radius:8px;
  font-size:13px;font-family:DM Sans,sans-serif;background:#F2F3F5;outline:none;
}
.ml-search:focus { border-color:#C8241A;background:#fff; }
.ml-select { padding:7px 10px;border:1.5px solid #E2E4E9;border-radius:8px;font-size:12.5px;font-family:DM Sans,sans-serif;background:#F2F3F5;outline:none;cursor:pointer; }
.ml-btn { padding:7px 14px;border-radius:8px;font-size:12.5px;font-weight:500;cursor:pointer;border:1.5px solid #E2E4E9;background:#fff;color:#1A1A1A;font-family:DM Sans,sans-serif;display:inline-flex;align-items:center;gap:5px;transition:background .12s;white-space:nowrap; }
.ml-btn:hover { background:#F2F3F5; }
.ml-btn.primary { background:#C8241A;color:#fff;border-color:#C8241A; }
.ml-btn.primary:hover { background:#E8352A; }
.ml-count { font-size:12px;color:#8A8A8A;margin-left:auto;white-space:nowrap; }
.ml-body { flex:1;overflow:auto;padding:16px 18px; }
.ml-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:12px;
}
.ml-card {
  background:#fff;border:1px solid #E2E4E9;border-radius:10px;
  padding:16px;cursor:pointer;transition:all .15s;
}
.ml-card:hover { border-color:#C8241A;box-shadow:0 2px 12px rgba(200,36,26,.1);transform:translateY(-1px); }
.ml-card-head { display:flex;align-items:center;gap:10px;margin-bottom:10px; }
.ml-av {
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:16px;flex-shrink:0;
}
.ml-av-m { background:#D4EDF8;color:#0A5A8A; }
.ml-av-f { background:#F8D9F0;color:#8A0E6A; }
.ml-nombre { font-weight:600;font-size:13.5px;margin-bottom:2px; }
.ml-cmp { font-size:11.5px;color:#8A8A8A;font-family:monospace; }
.ml-esp { display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:#EAF3FD;color:#0A4A8A;margin-bottom:8px; }
.ml-info { font-size:12px;color:#4A4A4A;display:flex;flex-direction:column;gap:3px; }
.ml-info-row { display:flex;align-items:center;gap:5px; }
.ml-info-icon { color:#8A8A8A;font-size:11px;width:14px; }
.ml-footer { display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px solid #EEF0F3; }
.ml-empty { padding:60px 20px;text-align:center;color:#8A8A8A; }
/* Drawer */
.ml-drawer {
  position:absolute;top:0;right:0;bottom:0;width:400px;
  background:#fff;border-left:1px solid #E2E4E9;
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .25s;z-index:50;
  box-shadow:-4px 0 24px rgba(0,0,0,.08);
}
.ml-drawer.open { transform:translateX(0); }
.ml-drawer-head { padding:14px 16px;border-bottom:1px solid #E2E4E9;display:flex;align-items:center;gap:10px;flex-shrink:0; }
.ml-drawer-body { flex:1;overflow-y:auto;padding:14px 16px; }
.ml-drawer-foot { padding:10px 16px;border-top:1px solid #E2E4E9;display:flex;gap:8px;flex-shrink:0; }
.ml-section { margin-bottom:14px; }
.ml-section-title { font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:#8A8A8A;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #EEF0F3; }
.ml-row { display:flex;justify-content:space-between;padding:4px 0;font-size:13px; }
.ml-row-lbl { color:#8A8A8A;flex-shrink:0;margin-right:8px; }
.ml-row-val { font-weight:500;text-align:right; }
.ml-hor-item { display:flex;gap:8px;padding:5px 8px;border:1px solid #EEF0F3;border-radius:6px;margin-bottom:5px;font-size:12.5px; }
.ml-hor-dia { font-weight:600;min-width:60px; }
.ml-mod-chip{display:inline-block;font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:20px;border:1px solid;margin-left:5px;letter-spacing:.2px}
.ml-hor-chip{display:inline-block;font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:20px;border:1px solid;margin-left:5px;letter-spacing:.2px}
</style>

<div id="sec-med-lista">
  <!-- TOOLBAR -->
  <div class="ml-toolbar">
    <div class="ml-search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input class="ml-search" id="ml-search" type="text"
        placeholder="Buscar médico, CMP…" oninput="mlFiltrar()"/>
    </div>
    <select class="ml-select" id="ml-fil-estado" onchange="mlCargar()">
      <option value="">Todos los estados</option>
      <option value="ACTIVO">Activos</option>
      <option value="INACTIVO">Inactivos</option>
    </select>
    <select class="ml-select" id="ml-fil-esp" onchange="mlCargar()">
      <option value="">Todas las especialidades</option>
    </select>
    <button class="ml-btn" onclick="mlCargar()">↺ Actualizar</button>
    <button class="ml-btn primary" onclick="goTo('med-nuevo','Médicos','Nuevo médico')">+ Nuevo médico</button>
    <span class="ml-count" id="ml-count">—</span>
  </div>

  <!-- GRID -->
  <div class="ml-body" id="ml-body">
    <div class="ml-empty">⏳ Cargando médicos…</div>
  </div>

  <!-- DRAWER -->
  <div class="ml-drawer" id="ml-drawer">
    <div class="ml-drawer-head">
      <div id="ml-dav" style="width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0"></div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:600" id="ml-dnombre">—</div>
        <div style="font-size:11.5px;color:#8A8A8A" id="ml-did">—</div>
      </div>
      <button class="ml-btn" onclick="mlCerrarDrawer()" style="padding:4px 10px;font-size:12px">✕</button>
    </div>
    <div class="ml-drawer-body" id="ml-drawer-body"></div>
    <div class="ml-drawer-foot">
      <button class="ml-btn primary" onclick="mlEditarDesdeDrawer()">✏️ Editar</button>
      <button class="ml-btn" onclick="mlCerrarDrawer()">Cerrar</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  MÓDULO: LISTA MÉDICOS — prefijo "ml"
// ═══════════════════════════════════════════════════════════════

var mlDatos     = [];
var mlMedSelec  = null;
var mlTimer     = null;
var mlEspLoaded = false;

function mlCargar() {
  var body=document.getElementById('ml-body');
  body.innerHTML='<div class="ml-empty">⏳ Cargando…</div>';
  document.getElementById('ml-count').textContent='—';
  if(!sesion) { body.innerHTML='<div class="ml-empty">🔒 Inicie sesión</div>'; return; }

  var params={
    estado:       document.getElementById('ml-fil-estado').value,
    especialidad: document.getElementById('ml-fil-esp').value,
    query:        document.getElementById('ml-search').value.trim(),
    limite:       100, pagina:1,
    usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'',
  };

  // Cargar especialidades para el filtro (una vez)
  if(!mlEspLoaded) mlCargarFiltroEsp();

  vzvRun()
    .withSuccessHandler(function(resp) {
      if(!resp||!resp.ok){ body.innerHTML='<div class="ml-empty" style="color:#C8241A">⚠ '+(resp?resp.mensaje:'Error')+'</div>'; return; }
      mlDatos = resp.datos.datos||[];
      var total=resp.datos.total||0;
      document.getElementById('ml-count').textContent=total+' médico(s)';
      if(!mlDatos.length){
        body.innerHTML='<div class="ml-empty"><div style="font-size:36px;margin-bottom:10px;opacity:.3">👨‍⚕️</div>'
          +'<div style="font-weight:500;margin-bottom:6px">Sin médicos encontrados</div>'
          +'<button class="ml-btn primary" onclick="goTo(\'med-nuevo\',\'Médicos\',\'Nuevo médico\')">+ Nuevo médico</button></div>';
        return;
      }
      mlRenderGrid(mlDatos);
    })
    .withFailureHandler(function(e){ body.innerHTML='<div class="ml-empty" style="color:#C8241A">⚠ '+e.message+'</div>'; })
    .ejecutar('listarMedicos', params);
}

function mlCargarFiltroEsp() {
  if(!sesion) return;
  mlEspLoaded=true;
  vzvRun()
    .withSuccessHandler(function(resp){
      if(!resp||!resp.ok) return;
      var sel=document.getElementById('ml-fil-esp');
      (resp.datos||[]).filter(function(e){ return e.ESTADO==='ACTIVO'; }).forEach(function(e){
        var o=document.createElement('option'); o.value=e.ID_ESPECIALIDAD; o.textContent=e.ESPECIALIDAD; sel.appendChild(o);
      });
    })
    .withFailureHandler(function(){})
    .ejecutar('listarMaestras', { tabla:'ESPECIALIDAD', usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

function mlFiltrar() {
  if(mlTimer) clearTimeout(mlTimer);
  mlTimer=setTimeout(function(){ mlCargar(); },400);
}

function mlRenderGrid(lista) {
  var body=document.getElementById('ml-body');
  var dias={LUNES:'Lun',MARTES:'Mar',MIERCOLES:'Mié',JUEVES:'Jue',VIERNES:'Vie',SABADO:'Sáb',DOMINGO:'Dom'};
  body.innerHTML='<div class="ml-grid">'+lista.map(function(m){
    var ini=(m.NOMBRES||' ')[0]+(m.APELLIDOS||' ')[0];
    var sexo=(m.SEXO||'M').toUpperCase();
    var est=(m.ESTADO||'ACTIVO').toLowerCase();
    var tel=m.TELEFONO&&m.TELEFONO!=='-'?m.TELEFONO:'—';
    var email=m.EMAIL&&m.EMAIL!=='-'?m.EMAIL:'—';
    return '<div class="ml-card" onclick="mlVerFicha(\''+m.ID_MEDICO+'\')">'
      +'<div class="ml-card-head">'
      +'<div class="ml-av '+(sexo==='F'?'ml-av-f':'ml-av-m')+'">'+ini+'</div>'
      +'<div><div class="ml-nombre">Dr. '+m.NOMBRES+' '+m.APELLIDOS+'</div>'
      +'<div class="ml-cmp">CMP '+m.NUMERO_CMP+' · '+m.ID_MEDICO+'</div></div>'
      +'</div>'
      +'<div class="ml-esp">🩺 '+(m.ESPECIALIDAD_NOMBRE||'Sin especialidad')+'</div>'
      +'<div class="ml-info">'
      +(tel!=='—'?'<div class="ml-info-row"><span class="ml-info-icon">📞</span>'+tel+'</div>':'')
      +(email!=='—'?'<div class="ml-info-row"><span class="ml-info-icon">✉</span>'+email+'</div>':'')
      +'</div>'
      +'<div class="ml-footer">'
      +'<span class="est-badge est-'+est+'">'+m.ESTADO+'</span>'
      +mlModalidadHTML(m.MODALIDADES)
      +mlHorarioHTML(m.HORARIO_RESUMEN)
      +'<button class="ml-btn" style="padding:3px 10px;font-size:11.5px" onclick="event.stopPropagation();mlEditar(\''+m.ID_MEDICO+'\')">✏️ Editar</button>'
      +'</div>'
      +'</div>';
  }).join('')+'</div>';
}

// ── DRAWER ───────────────────────────────────────────────────
function mlVerFicha(id) {
  var m=mlDatos.find(function(x){ return x.ID_MEDICO===id; });
  if(!m) return;
  mlMedSelec=m;
  var ini=(m.NOMBRES||' ')[0]+(m.APELLIDOS||' ')[0];
  var sexo=(m.SEXO||'M').toUpperCase();
  var dav=document.getElementById('ml-dav');
  dav.textContent=ini;
  dav.style.background=sexo==='F'?'#F8D9F0':'#D4EDF8';
  dav.style.color=sexo==='F'?'#8A0E6A':'#0A5A8A';
  document.getElementById('ml-dnombre').textContent='Dr. '+m.NOMBRES+' '+m.APELLIDOS;
  document.getElementById('ml-did').textContent=m.ID_MEDICO+' · CMP '+m.NUMERO_CMP;

  var html='';
  html+='<div class="ml-section"><div class="ml-section-title">Datos Profesionales</div>';
  html+=mlFila('Especialidad', m.ESPECIALIDAD_NOMBRE||'—');
  html+=mlFila('CMP', m.NUMERO_CMP||'—');
  html+=mlFila('Estado','<span class="est-badge est-'+(m.ESTADO||'').toLowerCase()+'">'+m.ESTADO+'</span>');
  html+='</div>';
  html+='<div class="ml-section"><div class="ml-section-title">Datos Personales</div>';
  html+=mlFila('Nombres', 'Dr. '+m.NOMBRES+' '+m.APELLIDOS);
  if(m.FECHA_NACIMIENTO&&m.FECHA_NACIMIENTO!=='-') html+=mlFila('Fecha nac.', new Date(m.FECHA_NACIMIENTO).toLocaleDateString('es-PE'));
  html+=mlFila('Sexo', m.SEXO==='M'?'Masculino':m.SEXO==='F'?'Femenino':'—');
  html+=mlFila('Documento', (m.ID_TIPO_DOCUMENTO==='1'?'DNI':m.ID_TIPO_DOCUMENTO==='2'?'C.E.':'OTRO')+' '+m.NUMERO_DOCUMENTO);
  html+='</div>';
  html+='<div class="ml-section"><div class="ml-section-title">Contacto</div>';
  html+=mlFila('Teléfono', m.TELEFONO&&m.TELEFONO!=='-'?m.TELEFONO:'—');
  html+=mlFila('Email', m.EMAIL&&m.EMAIL!=='-'?m.EMAIL:'—');
  html+='</div>';
  if(m.OBSERVACIONES&&m.OBSERVACIONES!=='-'){
    html+='<div class="ml-section"><div class="ml-section-title">Observaciones</div>';
    html+='<div style="font-size:13px;color:#4A4A4A;line-height:1.5">'+m.OBSERVACIONES+'</div></div>';
  }

  // Horarios
  html+='<div class="ml-section"><div class="ml-section-title">Horarios de Atención</div>';
  html+='<div id="ml-drawer-horarios"><div style="font-size:12.5px;color:#8A8A8A;text-align:center">Cargando…</div></div></div>';

  document.getElementById('ml-drawer-body').innerHTML=html;
  document.getElementById('ml-drawer').classList.add('open');

  // Cargar horarios
  if(sesion) {
    vzvRun()
      .withSuccessHandler(function(resp){
        var lista=resp&&resp.ok&&Array.isArray(resp.datos)?resp.datos:[];
        var el=document.getElementById('ml-drawer-horarios');
        if(!el) return;
        if(!lista.length){ el.innerHTML='<div style="font-size:12.5px;color:#8A8A8A;text-align:center">Sin horarios registrados</div>'; return; }
        var dias={LUNES:'Lunes',MARTES:'Martes',MIERCOLES:'Miércoles',JUEVES:'Jueves',VIERNES:'Viernes',SABADO:'Sábado',DOMINGO:'Domingo'};
        el.innerHTML=lista.map(function(h){
          return '<div class="ml-hor-item"><span class="ml-hor-dia">'+(dias[h.DIA_SEMANA]||h.DIA_SEMANA)+'</span>'
            +'<span style="font-family:monospace;color:#4A4A4A">'+h.HORA_INICIO+' – '+h.HORA_FIN+'</span>'
            +'<span style="font-size:11px;color:#8A8A8A;margin-left:auto">c/'+h.INTERVALO_MIN+'min</span>'
            +'</div>';
        }).join('');
      })
      .withFailureHandler(function(){})
      .ejecutar('listarHorariosMedico',{ ID_MEDICO:m.ID_MEDICO, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
  }
}

function mlCerrarDrawer() {
  document.getElementById('ml-drawer').classList.remove('open');
  mlMedSelec=null;
}

function mlEditarDesdeDrawer() {
  if(!mlMedSelec) return;
  mlCerrarDrawer();
  mlEditar(mlMedSelec.ID_MEDICO);
}

function mlEditar(id) {
  var m=mlDatos.find(function(x){ return x.ID_MEDICO===id; });
  if(!m) return;
  goTo('med-nuevo','Médicos','Nuevo médico');
  setTimeout(function(){
    mnModo='editar'; mnMedSelec=m;
    mnMostrarForm(); mnPoblarForm(m);
    // Cargar especialidades disponibles para el selector
    mnCargarEspecialidades();
  },300);
}

function mlFila(lbl,val){
  return '<div class="ml-row"><span class="ml-row-lbl">'+lbl+'</span><span class="ml-row-val">'+val+'</span></div>';
}
// Etiqueta(s) de modalidad de trabajo al costado del estado
var ML_MOD_INFO={
  FIJO:      {t:'Personal Fijo',      bg:'#EAF3FD', fg:'#1A6FC4', b:'#CFE2F7'},
  POR_TURNO: {t:'Personal Por Turno', bg:'#F3EEFB', fg:'#6B3FA0', b:'#E0D3F2'},
  VOLANTE:   {t:'Personal Volante',   bg:'#FFF0EE', fg:'#C8241A', b:'#F7D2CE'},
  MIXER:     {t:'Personal Mixer',     bg:'#E9F7F0', fg:'#0A7A3F', b:'#CDEBDC'}
};
function mlModalidadHTML(mods){
  if(!mods || !mods.length) return '<span class="ml-mod-chip" style="background:#F4F5F7;color:#9AA0A6;border-color:#E2E4E9" title="Sin modalidad configurada">Sin Definir</span>';
  return mods.map(function(mo){
    var i=ML_MOD_INFO[String(mo).toUpperCase()]||{t:mo,bg:'#F4F5F7',fg:'#5A5F66',b:'#E2E4E9'};
    return '<span class="ml-mod-chip" style="background:'+i.bg+';color:'+i.fg+';border-color:'+i.b+'" title="Tipo de personal / modalidad de trabajo">'+i.t+'</span>';
  }).join('');
}

// Etiqueta con el horario real (dias y horas configuradas)
function mlHorarioHTML(res){
  if(!res) return '<span class="ml-hor-chip" style="background:#F4F5F7;color:#9AA0A6;border-color:#E2E4E9" title="Sin horario configurado">🕐 Sin horario</span>';
  return '<span class="ml-hor-chip" style="background:#FFF8E6;color:#8A6D00;border-color:#F2E3B8" title="Horario configurado">🕐 '+res+'</span>';
}

</script>
