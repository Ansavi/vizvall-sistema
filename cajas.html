<style>
#sec-caja { display:none;overflow:auto;position:absolute;top:56px;left:0;right:0;bottom:0;background:var(--bg,#F2F3F5); }
#sec-caja.activo { display:block; }
.cj-wrap { padding:18px 22px;  }
.cj-head { display:flex;justify-content:space-between;align-items:center;margin-bottom:16px; }
.cj-title { font-size:18px;font-weight:600;color:#1A1A1A; }
.cj-tabs { display:flex;gap:4px;border-bottom:1px solid #E2E4E9;margin-bottom:18px; }
.cj-tab { padding:9px 16px;cursor:pointer;font-size:13.5px;color:#6B6B6B;border-bottom:2px solid transparent;user-select:none; }
.cj-tab.activo { color:#C8241A;border-bottom-color:#C8241A;font-weight:600; }
.cj-card { background:#fff;border:1px solid #EEF0F3;border-radius:12px;padding:18px;margin-bottom:16px; }
.cj-estado { display:flex;gap:14px;flex-wrap:wrap; }
.cj-stat { flex:1;min-width:150px;background:#FAFBFC;border-radius:10px;padding:14px; }
.cj-stat .lbl { font-size:11.5px;color:#8A8A8A;margin-bottom:4px; }
.cj-stat .val { font-size:20px;font-weight:600;color:#1A1A1A; }
.cj-stat.ok .val { color:#1F9D55; }
.cj-stat.warn .val { color:#C8241A; }
.cj-fg { margin-bottom:12px; }
.cj-flabel { display:block;font-size:12.5px;color:#444;margin-bottom:4px;font-weight:500; }
.cj-finp { width:100%;padding:9px 11px;border:1px solid #E2E4E9;border-radius:8px;font-size:13.5px;box-sizing:border-box; }
.cj-finp:focus { border-color:#C8241A;outline:none; }
.cj-btn { padding:9px 16px;border:1px solid #E2E4E9;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:6px; }
.cj-btn.primary { background:#C8241A;color:#fff;border-color:#C8241A; }
.cj-btn.sm { padding:5px 10px;font-size:12px; }
.cj-btn:disabled { opacity:.5;cursor:not-allowed; }
.cj-table-wrap { overflow-x:auto; }
.cj-table { width:100%;border-collapse:collapse;font-size:13px; }
.cj-table th { text-align:left;padding:9px 10px;border-bottom:2px solid #EEF0F3;color:#6B6B6B;font-weight:600;font-size:12px; }
.cj-table td { padding:9px 10px;border-bottom:1px solid #F2F3F5; }
.cj-badge { display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500; }
.cj-badge.ingreso { background:#E6F6EC;color:#1F9D55; }
.cj-badge.egreso { background:#FAE6E4;color:#C8241A; }
.cj-badge.apertura { background:#EAF3FD;color:#1A6FC4; }
.cj-badge.cierre { background:#F0EAF9;color:#7B4FB5; }
.cj-monto { font-variant-numeric:tabular-nums;font-weight:500; }
.cj-empty { text-align:center;color:#8A8A8A;padding:40px 20px;font-size:13.5px; }
.cj-id { font-family:monospace;font-size:11.5px;color:#8A8A8A; }
.cj-grid2 { display:grid;grid-template-columns:1fr 1fr;gap:12px; }
.cj-cerrada { background:#FFF7E6;border:1px solid #F0D9A0;border-radius:8px;padding:10px 12px;font-size:12.5px;color:#8A5A00;margin-bottom:12px; }
</style>

<div id="sec-caja">
<div class="cj-wrap">
  <div class="cj-head">
    <div class="cj-title">🏦 Caja diaria</div>
    <div id="cj-fecha-hoy" class="cj-id"></div>
  </div>

  <div class="cj-tabs">
    <div class="cj-tab activo" id="cj-tab-diaria" onclick="cjVista('diaria')">Caja diaria</div>
    <div class="cj-tab" id="cj-tab-mov" onclick="cjVista('mov')">Ingresos y egresos</div>
    <div class="cj-tab" id="cj-tab-hist" onclick="cjVista('hist')">Historial / Cierres</div>
    <div class="cj-tab" id="cj-tab-conceptos" onclick="cjVista('conceptos')">Conceptos</div>
  </div>

  <div id="cj-body"><div class="cj-empty">Cargando…</div></div>
</div>
</div><!-- /sec-caja -->

<style>.cj-modal-ov.open{display:flex !important;}</style>
<!-- Modal de arqueo posterior -->
<div class="cj-modal-ov" id="cj-arqueo-bg" style="position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:12px;width:400px;max-width:94vw;box-shadow:0 8px 40px rgba(0,0,0,.18)">
    <div style="padding:14px 18px;border-bottom:1px solid #E2E4E9;display:flex;align-items:center;justify-content:space-between">
      <div style="font-size:15px;font-weight:600;color:#B8860B">📋 Arqueo de caja</div>
      <span style="cursor:pointer;color:#999;font-size:20px" onclick="cjCerrarArqueo()">&times;</span>
    </div>
    <div style="padding:16px 18px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:12px;padding:9px 11px;background:#F6F7F8;border-radius:8px">
        <span style="color:#6B6B6B">Efectivo esperado (sistema)</span>
        <b id="cj-arqueo-esperado">S/ 0.00</b>
      </div>
      <label style="font-size:11.5px;font-weight:600;color:#555;display:block;margin-bottom:5px">Efectivo físico contado <span style="color:#C8241A">*</span></label>
      <input type="number" id="cj-arqueo-contado" step="0.01" min="0" placeholder="0.00" oninput="cjArqueoCalcular()" style="width:100%;padding:9px 11px;border:1px solid #E2E4E9;border-radius:8px;font-size:14px;box-sizing:border-box;margin-bottom:10px"/>
      <div id="cj-arqueo-dif"></div>
    </div>
    <div style="padding:12px 18px;border-top:1px solid #E2E4E9;display:flex;gap:8px;justify-content:flex-end">
      <button onclick="cjCerrarArqueo()" style="padding:9px 18px;border-radius:8px;border:1px solid #E2E4E9;background:#fff;color:#555;cursor:pointer;font-size:13px;font-weight:600">Cancelar</button>
      <button onclick="cjArqueoConfirmar()" style="padding:9px 18px;border-radius:8px;border:none;background:#B8860B;color:#fff;cursor:pointer;font-size:13px;font-weight:600">✓ Registrar arqueo</button>
    </div>
  </div>
</div>

<script>
var cjVistaActual='diaria', cjEstado=null, cjMovs=[], cjConceptos=[];

function cjAbrir() {
  var fh=document.getElementById('cj-fecha-hoy');
  if(fh) fh.textContent='Hoy: '+new Date().toLocaleDateString('es-PE');
  cjVista('diaria');
}

function cjVista(v, soloEste) {
  cjVistaActual=v;
  ['diaria','mov','hist','conceptos'].forEach(function(t){
    var el=document.getElementById('cj-tab-'+t); if(el) el.classList.toggle('activo', t===v);
  });
  // Si viene de un enlace directo del menú, ocultar la barra de pestañas (muestra solo el contenido)
  var tabs=document.querySelector('#sec-caja .cj-tabs');
  if(tabs) tabs.style.display = soloEste ? 'none' : 'flex';
  cjCargar();
}

function cjCargar() {
  if(cjVistaActual==='hist') return cjCargarHistorial();
  if(cjVistaActual==='conceptos') return cjCargarConceptos();
  // diaria y mov necesitan el estado de caja
  var body=document.getElementById('cj-body');
  body.innerHTML='<div class="cj-empty">Cargando…</div>';
  google.script.run
    .withSuccessHandler(function(resp){
      if(!resp||!resp.ok){ body.innerHTML='<div class="cj-empty" style="color:#C8241A">⚠ '+(resp?resp.mensaje:'Error')+'</div>'; return; }
      cjEstado=resp.datos;
      if(cjVistaActual==='diaria') cjRenderDiaria();
      else cjRenderMov();
    })
    .withFailureHandler(function(e){ body.innerHTML='<div class="cj-empty" style="color:#C8241A">⚠ '+e.message+'</div>'; })
    .ejecutar('estadoCaja', { usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

// ════ VISTA: CAJA DIARIA (apertura / estado / cierre) ════
function cjRenderDiaria() {
  var body=document.getElementById('cj-body');
  if(!cjEstado.ABIERTA){
    // No hay caja abierta → formulario de apertura
    body.innerHTML='<div class="cj-card">'+
      '<h3 style="margin:0 0 14px;font-size:15px">Abrir caja del día</h3>'+
      '<div class="cj-cerrada">No hay caja abierta. Registre el monto inicial para comenzar.</div>'+
      '<div class="cj-grid2">'+
        '<div class="cj-fg"><label class="cj-flabel">Monto inicial (S/) <span style="color:#C8241A">*</span></label><input class="cj-finp" id="cj-monto-ini" type="number" step="0.01" min="0" placeholder="0.00"/></div>'+
        '<div class="cj-fg"><label class="cj-flabel">Turno</label><select class="cj-finp" id="cj-turno"><option value="ÚNICO">Único</option><option value="MAÑANA">Mañana</option><option value="TARDE">Tarde</option></select></div>'+
      '</div>'+
      '<div class="cj-fg"><label class="cj-flabel">Observaciones</label><input class="cj-finp" id="cj-obs-ini" type="text" placeholder="Opcional"/></div>'+
      '<button class="cj-btn primary" id="cj-btn-abrir" onclick="cjAbrirCaja()">🔓 Abrir caja</button>'+
    '</div>';
    cjRenderAutoPanel();
    return;
  }
  // Caja abierta → mostrar estado + botón cerrar
  var e=cjEstado;
  body.innerHTML='<div class="cj-card">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'+
      '<h3 style="margin:0;font-size:15px">Caja abierta · '+e.FECHA+' ('+e.TURNO+')</h3>'+
      '<span class="cj-badge ingreso">ABIERTA</span>'+
    '</div>'+
    '<div class="cj-estado">'+
      '<div class="cj-stat"><div class="lbl">Monto inicial</div><div class="val">S/ '+e.MONTO_INICIAL+'</div></div>'+
      '<div class="cj-stat ok"><div class="lbl">Ingresos</div><div class="val">S/ '+e.TOTAL_INGRESOS+'</div></div>'+
      '<div class="cj-stat warn"><div class="lbl">Egresos</div><div class="val">S/ '+e.TOTAL_EGRESOS+'</div></div>'+
      '<div class="cj-stat"><div class="lbl">Efectivo esperado</div><div class="val">S/ '+e.EFECTIVO_ESPERADO+'</div></div>'+
    '</div>'+
    '<div style="margin-top:10px;font-size:12px;color:#8A8A8A">Abierta a las '+e.HORA_APERTURA+' por '+e.USUARIO_APERTURA+' · '+e.NUM_MOVIMIENTOS+' movimiento(s)</div>'+
  '</div>'+
  '<div class="cj-card">'+
    '<h3 style="margin:0 0 14px;font-size:15px">Cerrar caja (arqueo)</h3>'+
    '<div class="cj-grid2">'+
      '<div class="cj-fg"><label class="cj-flabel">Efectivo contado (S/) <span style="color:#C8241A">*</span></label><input class="cj-finp" id="cj-contado" type="number" step="0.01" min="0" placeholder="0.00" oninput="cjCalcDif()"/></div>'+
      '<div class="cj-fg"><label class="cj-flabel">Diferencia</label><input class="cj-finp" id="cj-dif" type="text" disabled value="S/ 0.00"/></div>'+
    '</div>'+
    '<div class="cj-fg"><label class="cj-flabel">Observaciones del cierre</label><input class="cj-finp" id="cj-obs-cierre" type="text" placeholder="Opcional"/></div>'+
    '<button class="cj-btn primary" id="cj-btn-cerrar" onclick="cjCerrarCaja()">🔒 Cerrar caja</button>'+
  '</div>';
  cjRenderAutoPanel();
}

// ── Panel de automatización de caja (solo ADMINISTRADOR) ──
function cjRenderAutoPanel() {
  if((sesion.ROL||'')!=='ADMINISTRADOR') return;
  var body=document.getElementById('cj-body');
  var div=document.createElement('div');
  div.className='cj-card';
  div.id='cj-auto-card';
  div.innerHTML='<details><summary style="cursor:pointer;font-weight:600;font-size:14px;list-style:none">⚙️ Automatización de caja (apertura/cierre por horario)</summary>'+
    '<div id="cj-auto-cont" style="margin-top:14px"><div style="color:#9AA0A6;font-size:13px">⏳ Cargando…</div></div></details>';
  body.appendChild(div);
  cjAutoCargar();
}

function cjAutoCargar() {
  google.script.run.withSuccessHandler(function(resp){
    var cont=document.getElementById('cj-auto-cont');
    if(!cont) return;
    if(!resp||!resp.ok){ cont.innerHTML='<div style="color:#C8241A;font-size:13px">⚠ '+(resp?resp.mensaje:'Error')+'</div>'; return; }
    var d=resp.datos;
    var estadoTxt = d.activo ? '<span style="color:#1F9D55;font-weight:600">🟢 Activa</span>' : '<span style="color:#C8241A;font-weight:600">🔴 Desactivada</span>';
    var horasAp=''; for(var i=0;i<24;i++){ horasAp+='<option value="'+i+'"'+(i===d.horaApertura?' selected':'')+'>'+(i<10?'0'+i:i)+':00</option>'; }
    var horasCi=''; for(var j=0;j<24;j++){ horasCi+='<option value="'+j+'"'+(j===d.horaCierre?' selected':'')+'>'+(j<10?'0'+j:j)+':00</option>'; }
    cont.innerHTML=
      '<div style="margin-bottom:12px;font-size:13px">Estado: '+estadoTxt+'</div>'+
      '<div class="cj-grid2">'+
        '<div class="cj-fg"><label class="cj-flabel">Monto fijo de apertura (S/)</label><input class="cj-finp" id="cj-auto-monto" type="number" step="0.01" min="0" value="'+d.monto+'"/></div>'+
        '<div class="cj-fg"><label class="cj-flabel">Hora de apertura</label><select class="cj-finp" id="cj-auto-hap">'+horasAp+'</select></div>'+
      '</div>'+
      '<div class="cj-grid2">'+
        '<div class="cj-fg"><label class="cj-flabel">Hora de cierre (red de seguridad)</label><select class="cj-finp" id="cj-auto-hci">'+horasCi+'</select></div>'+
        '<div class="cj-fg"></div>'+
      '</div>'+
      '<div style="font-size:11.5px;color:#9AA0A6;margin-bottom:12px">A la hora de apertura se abre la caja con el monto fijo. A la hora de cierre, si nadie cerró manualmente, se cierra como PENDIENTE DE ARQUEO (no se inventa el conteo de efectivo).</div>'+
      '<div style="display:flex;gap:8px">'+
        '<button class="cj-btn primary" onclick="cjAutoGuardar()">✓ Activar / Guardar</button>'+
        (d.activo?'<button class="cj-btn" style="color:#C8241A;border-color:#FAD4D1" onclick="cjAutoDesactivar()">✕ Desactivar</button>':'')+
      '<div style="border-top:1px solid #EEF0F3;margin-top:16px;padding-top:14px">'+
        '<div style="font-weight:600;font-size:13px;margin-bottom:4px">Calendario laboral</div>'+
        '<div style="font-size:11.5px;color:#8A8A8A;margin-bottom:10px">Clic en un dia para marcar/desmarcar si se trabaja. Domingos y feriados no abren caja.</div>'+
        '<div id="cj-cal-cont"></div>'+
      '</div>'+
      '<div style="border-top:1px solid #EEF0F3;margin-top:16px;padding-top:14px">'+
        '<div style="font-weight:600;font-size:13px;margin-bottom:10px">Historial de aperturas</div>'+
        '<div id="cj-hist-cont"><div style="color:#9AA0A6;font-size:12px">Cargando...</div></div>'+
      '</div>';
    cjCalRender(); cjHistCargar();
  }).withFailureHandler(function(e){ var cont=document.getElementById('cj-auto-cont'); if(cont) cont.innerHTML='<div style="color:#C8241A;font-size:13px">⚠ '+e.message+'</div>'; })
    .ejecutar('cajaAutoEstado', { usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

var cjCalMes = null;       // 'YYYY-MM' visible en el calendario
var cjCalNoLab = {};       // { 'YYYY-MM-DD': nombre } dias no laborables

// Renderiza el calendario visual del mes
function cjCalRender(mes){
  var cont=document.getElementById('cj-cal-cont'); if(!cont) return;
  if(!mes){ var hoy=new Date(); mes=hoy.getFullYear()+'-'+('0'+(hoy.getMonth()+1)).slice(-2); }
  cjCalMes=mes;
  cont.innerHTML='<div style="color:#9AA0A6;font-size:12px">Cargando calendario...</div>';
  google.script.run.withSuccessHandler(function(resp){
    cjCalNoLab={};
    if(resp&&resp.ok&&resp.datos&&resp.datos.dias){
      resp.datos.dias.forEach(function(d){ cjCalNoLab[d.fecha]=d.nombre||'No laborable'; });
    }
    cjCalPintar(mes);
  }).withFailureHandler(function(){ cjCalPintar(mes); })
    .ejecutar('cajaDiasNoLaborables', { mes:mes, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

function cjCalPintar(mes){
  var cont=document.getElementById('cj-cal-cont'); if(!cont) return;
  var p=mes.split('-'); var y=parseInt(p[0]), m=parseInt(p[1]);
  var primero=new Date(y, m-1, 1);
  var diasMes=new Date(y, m, 0).getDate();
  var arrancaEn=primero.getDay(); // 0=dom
  var meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var hoy=new Date(); var hoyStr=hoy.getFullYear()+'-'+('0'+(hoy.getMonth()+1)).slice(-2)+'-'+('0'+hoy.getDate()).slice(-2);

  var html='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'+
    '<button class="cj-btn" style="padding:2px 10px" onclick="cjCalMover(-1)">\u2039</button>'+
    '<span style="font-weight:600;font-size:13px">'+meses[m-1]+' '+y+'</span>'+
    '<button class="cj-btn" style="padding:2px 10px" onclick="cjCalMover(1)">\u203A</button>'+
  '</div>';
  html+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;font-size:11px">';
  ['D','L','M','M','J','V','S'].forEach(function(d){ html+='<div style="text-align:center;color:#9AA0A6;font-weight:600;padding:2px">'+d+'</div>'; });
  for(var i=0;i<arrancaEn;i++){ html+='<div></div>'; }
  for(var dia=1;dia<=diasMes;dia++){
    var fecha=y+'-'+('0'+m).slice(-2)+'-'+('0'+dia).slice(-2);
    var dw=new Date(y,m-1,dia).getDay();
    var esDom=(dw===0);
    var esNoLab=!!cjCalNoLab[fecha];
    var esHoy=(fecha===hoyStr);
    var bg='#E9F7F0', col='#0A7A3F', bd='#CDEBDC';   // laborable = verde
    var titulo='Se trabaja';
    if(esDom){ bg='#F0F0F2'; col='#9AA0A6'; bd='#E0E0E4'; titulo='Domingo (no abre)'; }
    if(esNoLab){ bg='#FFF0EE'; col='#C8241A'; bd='#F7D2CE'; titulo=cjCalNoLab[fecha]; }
    var ring=esHoy?';box-shadow:0 0 0 2px #1A6FC4':'';
    var clickable=esDom?'':' onclick="cjCalToggle(\''+fecha+'\')" style="cursor:pointer;';
    html+='<div title="'+titulo+'"'+(esDom?' style="':clickable)+'background:'+bg+';color:'+col+';border:1px solid '+bd+';border-radius:6px;text-align:center;padding:6px 0;font-weight:600'+ring+'">'+dia+'</div>';
  }
  html+='</div>';
  html+='<div style="display:flex;gap:12px;margin-top:8px;font-size:10.5px;color:#8A8A8A">'+
    '<span><span style="display:inline-block;width:10px;height:10px;background:#E9F7F0;border:1px solid #CDEBDC;border-radius:2px;vertical-align:middle"></span> Se trabaja</span>'+
    '<span><span style="display:inline-block;width:10px;height:10px;background:#FFF0EE;border:1px solid #F7D2CE;border-radius:2px;vertical-align:middle"></span> No abre</span>'+
    '<span><span style="display:inline-block;width:10px;height:10px;background:#F0F0F2;border:1px solid #E0E0E4;border-radius:2px;vertical-align:middle"></span> Domingo</span>'+
  '</div>';
  cont.innerHTML=html;
}

function cjCalMover(delta){
  var p=cjCalMes.split('-'); var y=parseInt(p[0]), m=parseInt(p[1])+delta;
  if(m<1){ m=12; y--; } if(m>12){ m=1; y++; }
  cjCalRender(y+'-'+('0'+m).slice(-2));
}

function cjCalToggle(fecha){
  google.script.run.withSuccessHandler(function(resp){
    if(!resp||!resp.ok) return;
    if(resp.datos.noLaborable){ cjCalNoLab[fecha]=cjCalNoLab[fecha]||'No laborable'; }
    else { delete cjCalNoLab[fecha]; }
    cjCalPintar(cjCalMes);
  }).withFailureHandler(function(){})
    .ejecutar('cajaToggleDia', { fecha:fecha, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

// Historial de aperturas
function cjHistCargar(){
  var cont=document.getElementById('cj-hist-cont'); if(!cont) return;
  google.script.run.withSuccessHandler(function(resp){
    if(!resp||!resp.ok||!Array.isArray(resp.datos)||!resp.datos.length){ cont.innerHTML='<div style="color:#9AA0A6;font-size:12px">Sin aperturas registradas.</div>'; return; }
    var rows=resp.datos.slice(0,15).map(function(a){
      var auto=String(a.USUARIO_APERTURA||'').toUpperCase().indexOf('AUTO')>=0;
      var estChip=(a.ESTADO==='ABIERTA')?'<span style="color:#0A7A3F;font-weight:600">Abierta</span>':'<span style="color:#9AA0A6">Cerrada</span>';
      return '<tr style="border-bottom:1px solid #F0F0F2">'+
        '<td style="padding:6px 8px;font-size:12px">'+(a.FECHA||'')+'</td>'+
        '<td style="padding:6px 8px;font-size:12px">'+(a.HORA_APERTURA||'')+(a.HORA_CIERRE&&a.HORA_CIERRE!=='-'?' - '+a.HORA_CIERRE:'')+'</td>'+
        '<td style="padding:6px 8px;font-size:12px;text-align:right">S/ '+(a.MONTO_INICIAL||'0.00')+'</td>'+
        '<td style="padding:6px 8px;font-size:11px">'+(auto?'\uD83E\uDD16 Auto':(a.USUARIO_APERTURA||'-'))+'</td>'+
        '<td style="padding:6px 8px;font-size:12px">'+estChip+'</td>'+
      '</tr>';
    }).join('');
    cont.innerHTML='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">'+
      '<thead><tr style="border-bottom:2px solid #E8EAED"><th style="padding:6px 8px;text-align:left;font-size:11px;color:#8A8A8A">Fecha</th><th style="padding:6px 8px;text-align:left;font-size:11px;color:#8A8A8A">Horario</th><th style="padding:6px 8px;text-align:right;font-size:11px;color:#8A8A8A">Monto</th><th style="padding:6px 8px;text-align:left;font-size:11px;color:#8A8A8A">Por</th><th style="padding:6px 8px;text-align:left;font-size:11px;color:#8A8A8A">Estado</th></tr></thead>'+
      '<tbody>'+rows+'</tbody></table></div>';
  }).withFailureHandler(function(){ var c=document.getElementById('cj-hist-cont'); if(c) c.innerHTML='<div style="color:#C8241A;font-size:12px">Error al cargar historial.</div>'; })
    .ejecutar('listarAperturas', { usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

function cjAutoGuardar() {
  var monto=document.getElementById('cj-auto-monto').value;
  var hap=document.getElementById('cj-auto-hap').value;
  var hci=document.getElementById('cj-auto-hci').value;

  }).withFailureHandler(function(e){ alert('⚠ '+e.message); })

function cjAutoDesactivar() {
  if(!confirm('¿Desactivar la apertura/cierre automático de caja?')) return;
  google.script.run.withSuccessHandler(function(resp){
    if(!resp||!resp.ok){ alert('⚠ '+(resp?resp.mensaje:'Error')); return; }
    alert('✓ '+resp.mensaje); cjAutoCargar();
  }).withFailureHandler(function(e){ alert('⚠ '+e.message); })
    .ejecutar('cajaAutoDesactivar', { usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });

function cjCalcDif() {
  if(!cjEstado) return;
  var contado=parseFloat(document.getElementById('cj-contado').value)||0;
  var esperado=parseFloat(cjEstado.EFECTIVO_ESPERADO)||0;
  var dif=contado-esperado;
  var el=document.getElementById('cj-dif');
  el.value='S/ '+dif.toFixed(2);
  el.style.color = dif===0?'#1F9D55':(dif<0?'#C8241A':'#1A6FC4');
}

function cjAbrirCaja() {
  var monto=document.getElementById('cj-monto-ini').value;
  if(monto===''||isNaN(parseFloat(monto))){ alert('⚠ Ingrese el monto inicial'); return; }
  var btn=document.getElementById('cj-btn-abrir'); btn.disabled=true; btn.textContent='⏳…';
  google.script.run
    .withSuccessHandler(function(resp){
      btn.disabled=false; btn.textContent='🔓 Abrir caja';
      if(!resp||!resp.ok){ alert('⚠ '+(resp?resp.mensaje:'Error')); return; }
      if(typeof pnNotif==='function') pnNotif('✓ Caja abierta','ok');
      cjCargar();
    })
    .withFailureHandler(function(e){ btn.disabled=false; btn.textContent='🔓 Abrir caja'; alert('⚠ '+e.message); })
    .ejecutar('abrirCaja', {
      MONTO_INICIAL:monto,
      TURNO:document.getElementById('cj-turno').value,
      OBSERVACIONES:document.getElementById('cj-obs-ini').value,
      usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||''
    });
}

function cjCerrarCaja() {
  var contado=document.getElementById('cj-contado').value;
  if(contado===''||isNaN(parseFloat(contado))){ alert('⚠ Ingrese el efectivo contado'); return; }
  if(!confirm('¿Cerrar la caja? Esta acción no se puede deshacer.')) return;
  var btn=document.getElementById('cj-btn-cerrar'); btn.disabled=true; btn.textContent='⏳…';
  google.script.run
    .withSuccessHandler(function(resp){
      btn.disabled=false; btn.textContent='🔒 Cerrar caja';
      if(!resp||!resp.ok){ alert('⚠ '+(resp?resp.mensaje:'Error')); return; }
      var d=resp.datos;
      alert('✓ Caja cerrada\n\nEsperado: S/ '+d.EFECTIVO_ESPERADO+'\nContado: S/ '+d.EFECTIVO_CONTADO+'\nDiferencia: S/ '+d.DIFERENCIA);
      cjCargar();
    })
    .withFailureHandler(function(e){ btn.disabled=false; btn.textContent='🔒 Cerrar caja'; alert('⚠ '+e.message); })
    .ejecutar('cerrarCaja', {
      EFECTIVO_CONTADO:contado,
      OBSERVACIONES:document.getElementById('cj-obs-cierre').value,
      usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||''
    });
}

// ════ VISTA: INGRESOS Y EGRESOS ════
function cjRenderMov() {
  var body=document.getElementById('cj-body');
  if(!cjEstado.ABIERTA){
    body.innerHTML='<div class="cj-card"><div class="cj-cerrada">No hay caja abierta. Abra la caja en "Apertura / Estado de caja" para registrar movimientos.</div></div>';
    return;
  }
  body.innerHTML='<div class="cj-card">'+
    '<h3 style="margin:0 0 14px;font-size:15px">Registrar movimiento</h3>'+
    '<div class="cj-grid2">'+
      '<div class="cj-fg"><label class="cj-flabel">Tipo <span style="color:#C8241A">*</span></label><select class="cj-finp" id="cj-mov-tipo" onchange="cjFiltrarConceptos()"><option value="INGRESO">Ingreso</option><option value="EGRESO">Egreso</option></select></div>'+
      '<div class="cj-fg"><label class="cj-flabel">Concepto</label><select class="cj-finp" id="cj-mov-concepto"><option value="">— Seleccione —</option></select></div>'+
    '</div>'+
    '<div class="cj-grid2">'+
      '<div class="cj-fg"><label class="cj-flabel">Monto (S/) <span style="color:#C8241A">*</span></label><input class="cj-finp" id="cj-mov-monto" type="number" step="0.01" min="0" placeholder="0.00"/></div>'+
      '<div class="cj-fg"><label class="cj-flabel">Observaciones</label><input class="cj-finp" id="cj-mov-obs" type="text" placeholder="Opcional"/></div>'+
    '</div>'+
    '<button class="cj-btn primary" id="cj-btn-mov" onclick="cjRegistrarMov()">+ Registrar</button>'+
  '</div>'+
  '<div class="cj-card"><h3 style="margin:0 0 12px;font-size:15px">Movimientos de hoy</h3><div id="cj-mov-lista"><div class="cj-empty">Cargando…</div></div></div>';
  // cargar conceptos para el select
  cjCargarConceptosSelect();
  cjCargarMovimientos();
}

function cjCargarConceptosSelect() {
  google.script.run.withSuccessHandler(function(resp){
    cjConceptos = resp&&resp.ok&&Array.isArray(resp.datos)?resp.datos.filter(function(t){return t.ESTADO==='ACTIVO';}):[];
    cjFiltrarConceptos();
  }).withFailureHandler(function(){}).ejecutar('listarMaestras', { tabla:'TCONCEPTO_CAJA', usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}
function cjFiltrarConceptos() {
  var tipo=document.getElementById('cj-mov-tipo').value;
  var sel=document.getElementById('cj-mov-concepto');
  if(!sel) return;
  sel.innerHTML='<option value="">— Seleccione —</option>';
  cjConceptos.filter(function(c){ return String(c.TIPO||'').toUpperCase()===tipo; }).forEach(function(c){
    var o=document.createElement('option'); o.value=c.ID_TCONCEPTO_CAJA; o.textContent=c.NOMBRE; sel.appendChild(o);
  });
}
function cjRegistrarMov() {
  var monto=document.getElementById('cj-mov-monto').value;
  if(monto===''||parseFloat(monto)<=0){ alert('⚠ Ingrese un monto válido'); return; }
  var btn=document.getElementById('cj-btn-mov'); btn.disabled=true; btn.textContent='⏳…';
  google.script.run
    .withSuccessHandler(function(resp){
      btn.disabled=false; btn.textContent='+ Registrar';
      if(!resp||!resp.ok){ alert('⚠ '+(resp?resp.mensaje:'Error')); return; }
      if(typeof pnNotif==='function') pnNotif('✓ Movimiento registrado','ok');
      document.getElementById('cj-mov-monto').value='';
      document.getElementById('cj-mov-obs').value='';
      cjCargarMovimientos();
      cjActualizarEstado();
    })
    .withFailureHandler(function(e){ btn.disabled=false; btn.textContent='+ Registrar'; alert('⚠ '+e.message); })
    .ejecutar('registrarMovimiento', {
      TIPO:document.getElementById('cj-mov-tipo').value,
      ID_TCONCEPTO_CAJA:document.getElementById('cj-mov-concepto').value,
      MONTO:monto,
      OBSERVACIONES:document.getElementById('cj-mov-obs').value,
      usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||''
    });
}
function cjActualizarEstado() {
  google.script.run.withSuccessHandler(function(resp){
    if(resp&&resp.ok) cjEstado=resp.datos;
  }).withFailureHandler(function(){}).ejecutar('estadoCaja', { usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

function cjCargarMovimientos() {
  var cont=document.getElementById('cj-mov-lista');
  if(!cont) return;
  google.script.run
    .withSuccessHandler(function(resp){
      var movs = resp&&resp.ok&&Array.isArray(resp.datos)?resp.datos:[];
      if(!movs.length){ cont.innerHTML='<div class="cj-empty">Sin movimientos aún.</div>'; return; }
      var html='<div class="cj-table-wrap"><table class="cj-table"><thead><tr><th>Hora</th><th>Tipo</th><th>Concepto</th><th>Modo</th><th style="text-align:right">Monto</th><th>Obs.</th></tr></thead><tbody>';
      movs.forEach(function(m){
        var badge=m.TIPO.toLowerCase();
        html+='<tr>'+
          '<td class="cj-id">'+(m.HORA||'')+'</td>'+
          '<td><span class="cj-badge '+badge+'">'+m.TIPO+'</span></td>'+
          '<td>'+(m.CONCEPTO_NOMBRE!=='—'?m.CONCEPTO_NOMBRE:(m.ID_VENTA&&m.ID_VENTA!=='-'?'Venta '+m.ID_VENTA:'—'))+'</td>'+
          '<td>'+(m.MODO_PAGO||'—')+'</td>'+
          '<td style="text-align:right" class="cj-monto">S/ '+(m.MONTO||'0.00')+'</td>'+
          '<td style="font-size:12px;color:#666">'+(m.OBSERVACIONES!=='-'?m.OBSERVACIONES:'')+'</td>'+
        '</tr>';
      });
      html+='</tbody></table></div>';
      cont.innerHTML=html;
    })
    .withFailureHandler(function(e){ cont.innerHTML='<div class="cj-empty" style="color:#C8241A">⚠ '+e.message+'</div>'; })
    .ejecutar('listarCaja', { usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

// ════ VISTA: HISTORIAL / CIERRES ════
function cjCargarHistorial() {
  var body=document.getElementById('cj-body');
  body.innerHTML='<div class="cj-empty">Cargando…</div>';
  google.script.run
    .withSuccessHandler(function(resp){
      var aps = resp&&resp.ok&&Array.isArray(resp.datos)?resp.datos:[];
      if(!aps.length){ body.innerHTML='<div class="cj-card"><div class="cj-empty">Sin aperturas registradas.</div></div>'; return; }
      var html='<div class="cj-card"><h3 style="margin:0 0 12px;font-size:15px">Historial de cajas</h3><div class="cj-table-wrap"><table class="cj-table">'+
        '<thead><tr><th>Fecha</th><th>Turno</th><th style="text-align:right">Inicial</th><th style="text-align:right">Ingresos</th><th style="text-align:right">Egresos</th><th style="text-align:right">Esperado</th><th style="text-align:right">Contado</th><th style="text-align:right">Diferencia</th><th>Estado</th><th></th></tr></thead><tbody>';
      aps.forEach(function(a){
        var pendiente=(a.ESTADO==='CERRADA' && a.DIFERENCIA==='PENDIENTE');
        var dif=parseFloat(a.DIFERENCIA)||0;
        var difColor=dif===0?'#1F9D55':(dif<0?'#C8241A':'#1A6FC4');
        var estBadge=a.ESTADO==='ABIERTA'?'ingreso':'cierre';
        var difCell = pendiente
          ? '<span style="color:#B8860B;font-weight:600;font-size:11.5px">⏳ Pendiente</span>'
          : (a.ESTADO==='CERRADA'?a.DIFERENCIA:'—');
        var contadoCell = pendiente ? '—' : (a.ESTADO==='CERRADA'?a.EFECTIVO_CONTADO:'—');
        var accion = pendiente
          ? '<button onclick="cjAbrirArqueo(\''+a.ID_APERTURA+'\','+(parseFloat(a.EFECTIVO_ESPERADO)||0)+')" style="padding:5px 12px;border:none;border-radius:7px;background:#B8860B;color:#fff;cursor:pointer;font-size:12px;font-weight:600">📋 Arquear</button>'
          : '';
        html+='<tr>'+
          '<td>'+(a.FECHA||'')+'</td>'+
          '<td>'+(a.TURNO||'')+'</td>'+
          '<td style="text-align:right" class="cj-monto">'+(a.MONTO_INICIAL||'0.00')+'</td>'+
          '<td style="text-align:right" class="cj-monto" style="color:#1F9D55">'+(a.TOTAL_INGRESOS||'0.00')+'</td>'+
          '<td style="text-align:right" class="cj-monto">'+(a.TOTAL_EGRESOS||'0.00')+'</td>'+
          '<td style="text-align:right" class="cj-monto">'+(a.EFECTIVO_ESPERADO||'0.00')+'</td>'+
          '<td style="text-align:right" class="cj-monto">'+contadoCell+'</td>'+
          '<td style="text-align:right;color:'+difColor+'" class="cj-monto">'+difCell+'</td>'+
          '<td><span class="cj-badge '+estBadge+'">'+a.ESTADO+'</span></td>'+
          '<td style="text-align:center">'+accion+'</td>'+
        '</tr>';
      });
      html+='</tbody></table></div></div>';
      body.innerHTML=html;
    })
    .withFailureHandler(function(e){ body.innerHTML='<div class="cj-empty" style="color:#C8241A">⚠ '+e.message+'</div>'; })
    .ejecutar('listarAperturas', { usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

// ════ VISTA: CONCEPTOS ════
function cjCargarConceptos() {
  var body=document.getElementById('cj-body');
  body.innerHTML='<div class="cj-empty">Cargando…</div>';
  google.script.run
    .withSuccessHandler(function(resp){
      var cs = resp&&resp.ok&&Array.isArray(resp.datos)?resp.datos:[];
      var html='<div class="cj-card">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'+
        '<h3 style="margin:0;font-size:15px">Conceptos de caja</h3>'+
        '<span style="font-size:12px;color:#8A8A8A">Gestione los conceptos en Configuración</span></div>';
      if(!cs.length){ html+='<div class="cj-empty">Sin conceptos. Créelos en Configuración → Conceptos de caja.</div>'; }
      else {
        html+='<div class="cj-table-wrap"><table class="cj-table"><thead><tr><th>Concepto</th><th>Tipo</th><th>Estado</th></tr></thead><tbody>';
        cs.forEach(function(c){
          var badge=String(c.TIPO||'').toUpperCase()==='INGRESO'?'ingreso':'egreso';
          html+='<tr><td>'+c.NOMBRE+'</td><td><span class="cj-badge '+badge+'">'+(c.TIPO||'')+'</span></td><td>'+(c.ESTADO||'')+'</td></tr>';
        });
        html+='</tbody></table></div>';
      }
      html+='</div>';
      body.innerHTML=html;
    })
    .withFailureHandler(function(e){ body.innerHTML='<div class="cj-empty" style="color:#C8241A">⚠ '+e.message+'</div>'; })
    .ejecutar('listarMaestras', { tabla:'TCONCEPTO_CAJA', usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

// ════════════════════════════════════════════════════════════
//  ARQUEO POSTERIOR — registrar efectivo contado sobre caja
//  cerrada automáticamente (DIFERENCIA = PENDIENTE)
// ════════════════════════════════════════════════════════════
var cjArqueoId=null, cjArqueoEsperado=0;

function cjAbrirArqueo(idApertura, esperado){
  cjArqueoId=idApertura;
  cjArqueoEsperado=parseFloat(esperado)||0;
  var bg=document.getElementById('cj-arqueo-bg');
  document.getElementById('cj-arqueo-esperado').textContent='S/ '+cjArqueoEsperado.toFixed(2);
  document.getElementById('cj-arqueo-contado').value='';
  document.getElementById('cj-arqueo-dif').innerHTML='';
  bg.classList.add('open');
  setTimeout(function(){ document.getElementById('cj-arqueo-contado').focus(); },100);
}
function cjCerrarArqueo(){
  document.getElementById('cj-arqueo-bg').classList.remove('open');
  cjArqueoId=null;
}
function cjArqueoCalcular(){
  var contado=parseFloat(document.getElementById('cj-arqueo-contado').value);
  var box=document.getElementById('cj-arqueo-dif');
  if(isNaN(contado)){ box.innerHTML=''; return; }
  var dif=contado-cjArqueoEsperado;
  var color=dif===0?'#1F9D55':(dif<0?'#C8241A':'#1A6FC4');
  var txt=dif===0?'✓ Cuadra exacto':(dif<0?'⚠ Faltante':'▲ Sobrante');
  box.innerHTML='<div style="padding:9px 11px;border-radius:8px;background:#F6F7F8;font-size:13px"><b style="color:'+color+'">'+txt+': S/ '+dif.toFixed(2)+'</b></div>';
}
function cjArqueoConfirmar(){
  var contado=parseFloat(document.getElementById('cj-arqueo-contado').value);
  if(isNaN(contado)||contado<0){ alert('⚠ Ingrese el efectivo contado.'); return; }
  vzvRun('Registrando arqueo…')
    .withSuccessHandler(function(resp){
      if(!resp||!resp.ok){ alert('⚠ '+(resp?resp.mensaje:'Error')); return; }
      cjCerrarArqueo();
      if(typeof pnNotif==='function') pnNotif(resp.mensaje||'✓ Arqueo registrado','ok');
      else alert('✓ '+(resp.mensaje||'Arqueo registrado'));
      cjCargarHistorial();
    })
    .withFailureHandler(function(e){ alert('⚠ '+e.message); })
    .ejecutar('arquearCajaCerrada', { ID_APERTURA:cjArqueoId, EFECTIVO_CONTADO:contado, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}
