<!-- MODULO: LISTA DE PACIENTES
     Archivo: pac-lista.html
     Llamado desde: Index.html via include()
     Backend: Paciente.gs via ejecutar() → listarPacientes
-->
<style>
#sec-pac-lista {
  display:none;overflow:hidden;position:absolute;
  top:56px;left:0;right:0;bottom:0;
  flex-direction:column;background:var(--bg,#F2F3F5);
}
#sec-pac-lista.activo { display:flex; }

/* ── TOOLBAR ── */
.pl-toolbar {
  background:#fff;border-bottom:1px solid var(--border,#E2E4E9);
  padding:10px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;
}
.pl-search-wrap { position:relative;flex:1;min-width:200px;max-width:360px; }
.pl-search-wrap svg { position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#8A8A8A; }
.pl-search {
  width:100%;padding:7px 12px 7px 34px;
  border:1.5px solid var(--border,#E2E4E9);border-radius:8px;
  font-size:13px;font-family:DM Sans,sans-serif;
  background:#F2F3F5;outline:none;
}
.pl-search:focus { border-color:#C8241A;background:#fff; }
.pl-select {
  padding:7px 10px;border:1.5px solid var(--border,#E2E4E9);border-radius:8px;
  font-size:12.5px;font-family:DM Sans,sans-serif;background:#F2F3F5;
  outline:none;cursor:pointer;
}
.pl-select:focus { border-color:#C8241A; }
.pl-btn {
  padding:7px 14px;border-radius:8px;font-size:12.5px;font-weight:500;
  cursor:pointer;border:1.5px solid var(--border,#E2E4E9);
  background:#fff;color:#1A1A1A;font-family:DM Sans,sans-serif;
  display:inline-flex;align-items:center;gap:5px;transition:background .12s;white-space:nowrap;
}
.pl-btn:hover { background:#F2F3F5; }
.pl-btn.primary { background:#C8241A;color:#fff;border-color:#C8241A; }
.pl-btn.primary:hover { background:#E8352A; }
.pl-count { font-size:12px;color:#8A8A8A;margin-left:auto;white-space:nowrap; }

/* ── TABLA ── */
.pl-body { flex:1;overflow:auto;padding:16px 18px; }
.pl-table-wrap { background:#fff;border:1px solid var(--border,#E2E4E9);border-radius:10px;overflow:hidden; }
.pl-table { width:100%;border-collapse:collapse;font-size:13px; }
.pl-table th {
  padding:9px 13px;text-align:left;font-size:10.5px;font-weight:600;
  text-transform:uppercase;letter-spacing:.5px;color:#8A8A8A;
  background:#FAFBFC;border-bottom:1px solid var(--border,#E2E4E9);
  white-space:nowrap;cursor:pointer;user-select:none;
}
.pl-table th:hover { background:#F2F3F5; }
.pl-table th .sort-icon { margin-left:4px;opacity:.4;font-size:10px; }
.pl-table th.asc .sort-icon::after  { content:'↑';opacity:1; }
.pl-table th.desc .sort-icon::after { content:'↓';opacity:1; }
.pl-table th .sort-icon::after { content:'↕'; }
.pl-table td { padding:10px 13px;border-bottom:1px solid #EEF0F3;vertical-align:middle; }
.pl-table tr:last-child td { border-bottom:none; }
.pl-table tr:hover td { background:#FAFBFC;cursor:pointer; }
.pl-avatar {
  width:32px;height:32px;border-radius:50%;
  background:#D8EAFB;color:#0E4F8A;
  display:inline-flex;align-items:center;justify-content:center;
  font-weight:700;font-size:11px;flex-shrink:0;
}
.pl-avatar.f { background:#F8D9F0;color:#8A0E6A; }
.pl-nombre { font-weight:500;color:#1A1A1A; }
.pl-doc    { font-size:11.5px;color:#8A8A8A;font-family:monospace; }
.est-badge { font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap; }
.est-activo   { background:#D6EFE7;color:#0A6B4F; }
.est-inactivo { background:#F0F0F0;color:#666; }
.est-fallecido{ background:#FAE5DE;color:#8B2E12; }
.menor-badge  { font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:#FDF0D5;color:#8A5A00;white-space:nowrap; }
.pl-accion {
  padding:4px 10px;border-radius:6px;font-size:11.5px;font-weight:500;
  cursor:pointer;border:1px solid;background:none;font-family:DM Sans,sans-serif;
  transition:background .12s;
}
.pl-accion.edit { border-color:#E2E4E9;color:#4A4A4A; }
.pl-accion.edit:hover { background:#F2F3F5; }
.pl-accion.ver  { border-color:#D8EAFB;color:#0E4F8A;background:#EAF3FD; }
.pl-accion.ver:hover  { background:#D8EAFB; }

/* ── EMPTY / LOADING ── */
.pl-empty {
  padding:60px 20px;text-align:center;color:#8A8A8A;
}
.pl-empty-icon { font-size:40px;margin-bottom:12px;opacity:.25; }

/* ── PAGINACIÓN ── */
.pl-pag {
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 18px;background:#fff;border-top:1px solid var(--border,#E2E4E9);
  flex-shrink:0;font-size:12.5px;
}
.pl-pag-info { color:#8A8A8A; }
.pl-pag-btns { display:flex;gap:4px; }
.pl-pag-btn {
  width:30px;height:30px;border-radius:6px;border:1px solid var(--border,#E2E4E9);
  background:#fff;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;
  transition:background .12s;
}
.pl-pag-btn:hover:not(:disabled) { background:#F2F3F5; }
.pl-pag-btn.active { background:#C8241A;color:#fff;border-color:#C8241A; }
.pl-pag-btn:disabled { opacity:.35;cursor:not-allowed; }

/* ── DRAWER FICHA ── */
.pl-drawer {
  position:absolute;top:0;right:0;bottom:0;width:420px;
  background:#fff;border-left:1px solid var(--border,#E2E4E9);
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .25s;z-index:50;
  box-shadow:-4px 0 24px rgba(0,0,0,.08);
}
.pl-drawer.open { transform:translateX(0); }
.pl-drawer-head {
  padding:14px 16px;border-bottom:1px solid var(--border,#E2E4E9);
  display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.pl-drawer-av {
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:15px;flex-shrink:0;
}
.pl-drawer-body { flex:1;overflow-y:auto;padding:14px 16px; }
.pl-drawer-foot {
  padding:10px 16px;border-top:1px solid var(--border,#E2E4E9);
  display:flex;gap:8px;flex-shrink:0;
}
.pl-section { margin-bottom:14px; }
.pl-section-title {
  font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;
  color:#8A8A8A;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #EEF0F3;
}
.pl-row { display:flex;justify-content:space-between;padding:4px 0;font-size:13px; }
.pl-row-lbl { color:#8A8A8A;flex-shrink:0;margin-right:8px; }
.pl-row-val { font-weight:500;text-align:right; }
</style>

<!-- ═══ SECCIÓN: LISTA DE PACIENTES ═══ -->
<div id="sec-pac-lista">

  <!-- TOOLBAR -->
  <div class="pl-toolbar">
    <div class="pl-search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input class="pl-search" id="pl-search" type="text"
        placeholder="Buscar por nombre, documento, código…"
        oninput="plFiltrar()"/>
    </div>
    <select class="pl-select" id="pl-fil-estado" onchange="plCargar()">
      <option value="">Todos los estados</option>
      <option value="ACTIVO">Activos</option>
      <option value="INACTIVO">Inactivos</option>
      <option value="FALLECIDO">Fallecidos</option>
    </select>
    <select class="pl-select" id="pl-fil-sexo" onchange="plCargar()">
      <option value="">Todos</option>
      <option value="M">Masculino</option>
      <option value="F">Femenino</option>
    </select>
    <select class="pl-select" id="pl-limit" onchange="plCargar()">
      <option value="20">20 por página</option>
      <option value="50" selected>50 por página</option>
      <option value="100">100 por página</option>
    </select>
    <button class="pl-btn" onclick="plCargar()" title="Actualizar">↺ Actualizar</button>
    <button class="pl-btn primary" onclick="goTo('pac-nuevo','Pacientes','Nuevo paciente')">+ Nuevo paciente</button>
    <span class="pl-count" id="pl-count">—</span>
  </div>

  <!-- CUERPO CON TABLA -->
  <div class="pl-body" id="pl-body">
    <div class="pl-empty">
      <div class="pl-empty-icon">⏳</div>
      <div style="font-weight:500">Cargando pacientes…</div>
    </div>
  </div>

  <!-- PAGINACIÓN -->
  <div class="pl-pag" id="pl-pag" style="display:none">
    <span class="pl-pag-info" id="pl-pag-info">—</span>
    <div class="pl-pag-btns" id="pl-pag-btns"></div>
  </div>

  <!-- DRAWER: FICHA PACIENTE -->
  <div class="pl-drawer" id="pl-drawer">
    <div class="pl-drawer-head">
      <div class="pl-drawer-av" id="pl-dav"></div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:600" id="pl-dnombre">—</div>
        <div style="font-size:11.5px;color:#8A8A8A" id="pl-did">—</div>
      </div>
      <button class="pl-btn sm" onclick="plCerrarDrawer()" style="padding:4px 10px">✕</button>
    </div>
    <div class="pl-drawer-body" id="pl-drawer-body"></div>
    <div class="pl-drawer-foot">
      <button class="pl-btn primary" onclick="plEditarDesdeDrawer()">✏️ Editar paciente</button>
      <button class="pl-btn" onclick="plCerrarDrawer()">Cerrar</button>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  MÓDULO: LISTA PACIENTES — prefijo "pl"
// ═══════════════════════════════════════════════════════════════

var plDatos    = [];   // datos de la página actual
var plTotal    = 0;    // total de registros
var plPagina   = 1;    // página actual
var plPacSelec = null; // paciente seleccionado en drawer
var plTimer    = null; // debounce búsqueda
var plSortCol  = '';   // columna de ordenamiento
var plSortDir  = 'asc';

// ── CARGAR ───────────────────────────────────────────────────
function plCargar(pag) {
  plPagina = pag || 1;
  var body = document.getElementById('pl-body');
  body.innerHTML = '<div class="pl-empty"><div class="pl-empty-icon">⏳</div><div style="font-weight:500">Cargando…</div></div>';
  document.getElementById('pl-pag').style.display = 'none';
  document.getElementById('pl-count').textContent = '—';

  if(!sesion) { body.innerHTML = '<div class="pl-empty"><div class="pl-empty-icon">🔒</div><div>Inicie sesión</div></div>'; return; }

  var params = {
    estado:      document.getElementById('pl-fil-estado').value,
    sexo:        document.getElementById('pl-fil-sexo').value,
    query:       document.getElementById('pl-search').value.trim(),
    limite:      parseInt(document.getElementById('pl-limit').value)||50,
    pagina:      plPagina,
    usuario:     sesion.USUARIO||'',
    rol:         sesion.ROL||'',
    token:       sesion.TOKEN||'',
  };

  google.script.run
    .withSuccessHandler(function(resp) {
      if(!resp || !resp.ok) {
        body.innerHTML = '<div class="pl-empty"><div class="pl-empty-icon">⚠️</div><div style="color:#C8241A">'+(resp?resp.mensaje:'Error al cargar')+'</div></div>';
        return;
      }
      plDatos = resp.datos.datos || [];
      plTotal = resp.datos.total || 0;
      var paginas = resp.datos.paginas || 1;

      document.getElementById('pl-count').textContent = plTotal + ' paciente(s)';

      if(!plDatos.length) {
        body.innerHTML = '<div class="pl-empty"><div class="pl-empty-icon">🧑</div>'
          + '<div style="font-weight:500;margin-bottom:6px">Sin pacientes encontrados</div>'
          + '<div style="font-size:12px;margin-bottom:14px">No hay registros que coincidan con los filtros</div>'
          + '<button class="pl-btn primary" onclick="goTo(\'pac-nuevo\',\'Pacientes\',\'Nuevo paciente\')">+ Nuevo paciente</button>'
          + '</div>';
        return;
      }

      plRenderTabla(plDatos);
      plRenderPaginacion(plPagina, paginas, plTotal, params.limite);
    })
    .withFailureHandler(function(e) {
      body.innerHTML = '<div class="pl-empty"><div class="pl-empty-icon">⚠️</div><div style="color:#C8241A">Error: '+e.message+'</div></div>';
    })
    .ejecutar('listarPacientes', params);
}

function plFiltrar() {
  if(plTimer) clearTimeout(plTimer);
  plTimer = setTimeout(function(){ plCargar(1); }, 400);
}

// ── RENDER TABLA ─────────────────────────────────────────────
function plRenderTabla(lista) {
  var body = document.getElementById('pl-body');
  var html = '<div class="pl-table-wrap"><table class="pl-table">'
    + '<thead><tr>'
    + '<th onclick="plOrdenar(\'NOMBRES\')">Paciente <span class="sort-icon"></span></th>'
    + '<th onclick="plOrdenar(\'NUMERO_DOCUMENTO\')">Documento <span class="sort-icon"></span></th>'
    + '<th onclick="plOrdenar(\'FECHA_NACIMIENTO\')">Edad <span class="sort-icon"></span></th>'
    + '<th>Teléfono</th>'
    + '<th onclick="plOrdenar(\'DISTRITO\')">Distrito <span class="sort-icon"></span></th>'
    + '<th onclick="plOrdenar(\'ESTADO\')">Estado <span class="sort-icon"></span></th>'
    + '<th style="text-align:center">Acciones</th>'
    + '</tr></thead><tbody>';

  lista.forEach(function(p) {
    var ini  = (p.NOMBRES||' ')[0]+(p.APELLIDOS||' ')[0];
    var sexo = (p.SEXO||'M').toUpperCase();
    var est  = (p.ESTADO||'ACTIVO').toLowerCase();
    var edad = plCalcEdad(p.FECHA_NACIMIENTO);
    var tel  = p.TELEFONO && p.TELEFONO!=='-' ? p.TELEFONO : '—';
    var dist = p.DISTRITO||'—';
    var via  = p.TIPO_VIA && p.NOMBRE_VIA ? p.TIPO_VIA+' '+p.NOMBRE_VIA : '—';

    html += '<tr onclick="plVerFicha(\''+p.ID_PACIENTE+'\')">'
      + '<td><div style="display:flex;align-items:center;gap:9px">'
      +   '<div class="pl-avatar'+(sexo==='F'?' f':'')+'">'+ini+'</div>'
      +   '<div><div class="pl-nombre">'+p.NOMBRES+' '+p.APELLIDOS+'</div>'
      +   '<div class="pl-doc">'+p.ID_PACIENTE+'</div></div>'
      + '</div></td>'
      + '<td><div class="pl-nombre">'+p.TIPO_DOCUMENTO_NOMBRE+'</div><div class="pl-doc">'+p.NUMERO_DOCUMENTO+'</div></td>'
      + '<td>'+(edad!==null?edad+' años'+(edad<18?' <span class="menor-badge">MENOR</span>':''):'—')+'</td>'
      + '<td style="font-family:monospace;font-size:12.5px">'+tel+'</td>'
      + '<td><div>'+dist+'</div><div class="pl-doc">'+via+'</div></td>'
      + '<td><span class="est-badge est-'+est+'">'+p.ESTADO+'</span></td>'
      + '<td style="text-align:center;white-space:nowrap">'
      +   '<button class="pl-accion ver" onclick="event.stopPropagation();plVerFicha(\''+p.ID_PACIENTE+'\')" title="Ver ficha">👁</button> '
      +   '<button class="pl-accion edit" onclick="event.stopPropagation();plEditar(\''+p.ID_PACIENTE+'\')" title="Editar">✏️</button>'
      + '</td>'
      + '</tr>';
  });

  html += '</tbody></table></div>';
  body.innerHTML = html;

  // Actualizar headers de ordenamiento
  document.querySelectorAll('.pl-table th').forEach(function(th) {
    th.classList.remove('asc','desc');
  });
}

// ── PAGINACIÓN ───────────────────────────────────────────────
function plRenderPaginacion(pagActual, pagTotal, total, limite) {
  var pag = document.getElementById('pl-pag');
  var info = document.getElementById('pl-pag-info');
  var btns = document.getElementById('pl-pag-btns');

  if(pagTotal <= 1) { pag.style.display='none'; return; }
  pag.style.display = 'flex';

  var desde = (pagActual-1)*limite+1;
  var hasta = Math.min(pagActual*limite, total);
  info.textContent = 'Mostrando '+desde+'-'+hasta+' de '+total;

  var html = '';
  html += '<button class="pl-pag-btn" onclick="plCargar('+(pagActual-1)+')" '+(pagActual===1?'disabled':'')+'>‹</button>';

  // Páginas visibles
  var inicio = Math.max(1, pagActual-2);
  var fin    = Math.min(pagTotal, pagActual+2);
  if(inicio > 1) html += '<button class="pl-pag-btn" onclick="plCargar(1)">1</button>'+(inicio>2?'<span style="padding:0 4px;color:#8A8A8A">…</span>':'');
  for(var i=inicio; i<=fin; i++) {
    html += '<button class="pl-pag-btn'+(i===pagActual?' active':'')+'" onclick="plCargar('+i+')">'+i+'</button>';
  }
  if(fin < pagTotal) html += (fin<pagTotal-1?'<span style="padding:0 4px;color:#8A8A8A">…</span>':'')+'<button class="pl-pag-btn" onclick="plCargar('+pagTotal+')">'+pagTotal+'</button>';
  html += '<button class="pl-pag-btn" onclick="plCargar('+(pagActual+1)+')" '+(pagActual===pagTotal?'disabled':'')+'>›</button>';

  btns.innerHTML = html;
}

// ── ORDENAMIENTO ─────────────────────────────────────────────
function plOrdenar(col) {
  if(plSortCol === col) plSortDir = plSortDir==='asc'?'desc':'asc';
  else { plSortCol = col; plSortDir = 'asc'; }

  plDatos.sort(function(a,b) {
    var va = String(a[col]||'').toUpperCase();
    var vb = String(b[col]||'').toUpperCase();
    var r  = va < vb ? -1 : va > vb ? 1 : 0;
    return plSortDir==='asc' ? r : -r;
  });
  plRenderTabla(plDatos);
}

// ── DRAWER FICHA ─────────────────────────────────────────────
function plVerFicha(id) {
  var p = plDatos.find(function(x){ return x.ID_PACIENTE===id; });
  if(!p) return;
  plPacSelec = p;

  // Avatar
  var ini  = (p.NOMBRES||' ')[0]+(p.APELLIDOS||' ')[0];
  var sexo = (p.SEXO||'M').toUpperCase();
  var dav  = document.getElementById('pl-dav');
  dav.textContent = ini;
  dav.style.background = sexo==='F'?'#F8D9F0':'#D8EAFB';
  dav.style.color      = sexo==='F'?'#8A0E6A':'#0E4F8A';

  document.getElementById('pl-dnombre').textContent = p.NOMBRES+' '+p.APELLIDOS;
  document.getElementById('pl-did').textContent     = p.ID_PACIENTE+' · '+p.TIPO_DOCUMENTO_NOMBRE+' '+p.NUMERO_DOCUMENTO;

  var edad = plCalcEdad(p.FECHA_NACIMIENTO);

  // Dirección
  var dir = '';
  if(p.TIPO_VIA && p.NOMBRE_VIA) {
    dir = p.TIPO_VIA+' '+p.NOMBRE_VIA;
    if(p.NUMERO && p.NUMERO!=='-') dir += ' '+p.NUMERO;
    if(p.URBANIZACION && p.URBANIZACION!=='-') dir += ', URB. '+p.URBANIZACION;
    if(p.MZ && p.MZ!=='-') dir += ', MZ '+p.MZ;
    if(p.LT && p.LT!=='-') dir += ', LT '+p.LT;
  }

  var html = '';

  // Datos personales
  html += '<div class="pl-section"><div class="pl-section-title">Datos Personales</div>';
  html += plFila('Fecha nac.', plFmtFecha(p.FECHA_NACIMIENTO));
  html += plFila('Edad', edad!==null ? edad+' años'+(edad<18?' (Menor de edad)':'') : '—');
  html += plFila('Sexo', p.SEXO==='M'?'Masculino':p.SEXO==='F'?'Femenino':'Otro');
  html += plFila('Estado', '<span class="est-badge est-'+p.ESTADO.toLowerCase()+'">'+p.ESTADO+'</span>');
  html += '</div>';

  // Contacto
  html += '<div class="pl-section"><div class="pl-section-title">Contacto</div>';
  html += plFila('Teléfono',    p.TELEFONO&&p.TELEFONO!=='-'?p.TELEFONO:'—');
  html += plFila('Tel. Alt.',   p.TELEFONO_ALTERNATIVO&&p.TELEFONO_ALTERNATIVO!=='-'?p.TELEFONO_ALTERNATIVO:'—');
  html += plFila('Correo',      p.CORREO&&p.CORREO!=='-'?p.CORREO:'—');
  html += '</div>';

  // Dirección
  html += '<div class="pl-section"><div class="pl-section-title">Dirección</div>';
  if(dir) html += plFila('Dirección', dir);
  if(p.REFERENCIA && p.REFERENCIA!=='-') html += plFila('Referencia', p.REFERENCIA);
  html += plFila('Distrito', p.DISTRITO||'—');
  html += plFila('Provincia', p.PROVINCIA||'—');
  html += plFila('Departamento', p.DEPARTAMENTO||'—');
  html += '</div>';

  // Apoderado (si menor)
  if(p.ES_MENOR === 'SI') {
    html += '<div class="pl-section"><div class="pl-section-title">⚠ Apoderado</div>';
    html += plFila('Nombre', (p.APO_NOMBRES||'')+' '+(p.APO_APELLIDOS||''));
    html += plFila('Parentesco', p.APO_PARENTESCO||'—');
    html += plFila('Teléfono', p.APO_TELEFONO&&p.APO_TELEFONO!=='-'?p.APO_TELEFONO:'—');
    if(p.APO_DNI && p.APO_DNI!=='-') html += plFila('DNI', p.APO_DNI);
    html += '</div>';
  }

  // Registro
  html += '<div class="pl-section"><div class="pl-section-title">Registro</div>';
  html += plFila('Fecha registro', plFmtFecha(p.FECHA_REGISTRO));
  html += '</div>';

  document.getElementById('pl-drawer-body').innerHTML = html;
  document.getElementById('pl-drawer').classList.add('open');
}

function plCerrarDrawer() {
  document.getElementById('pl-drawer').classList.remove('open');
  plPacSelec = null;
}

function plEditarDesdeDrawer() {
  if(!plPacSelec) return;
  plCerrarDrawer();
  plEditar(plPacSelec.ID_PACIENTE);
}

function plEditar(id) {
  // Ir al módulo pac-nuevo en modo edición
  var p = plDatos.find(function(x){ return x.ID_PACIENTE===id; });
  if(!p) return;
  // Activar sección pac-nuevo y poblar con el paciente
  goTo('pac-nuevo','Pacientes','Nuevo paciente');
  setTimeout(function(){
    pnModo = 'editar';
    pnPacSelec = p;
    pnMostrarForm();
    pnPoblarForm(p);
    var ft=document.getElementById('pn-form-title');
    if(ft) ft.textContent='Editar Paciente';
    var di=document.getElementById('pn-disp-id');
    if(di) di.textContent=p.ID_PACIENTE;
  }, 300);
}

// ── HELPERS ──────────────────────────────────────────────────
function plFila(lbl, val) {
  return '<div class="pl-row"><span class="pl-row-lbl">'+lbl+'</span><span class="pl-row-val">'+val+'</span></div>';
}

function plCalcEdad(fnac) {
  if(!fnac) return null;
  var d = new Date(fnac);
  if(isNaN(d)) return null;
  return Math.floor((new Date()-d)/(365.25*86400000));
}

function plFmtFecha(f) {
  if(!f) return '—';
  var d = new Date(f);
  if(isNaN(d)) return f;
  return d.toLocaleDateString('es-PE');
}
</script>
