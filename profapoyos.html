<style>
#sec-profapoyo { display:none;overflow:hidden;position:absolute;top:56px;left:0;right:0;bottom:0;background:var(--bg,#F2F3F5);flex-direction:column; }
#sec-profapoyo.activo { display:flex; }
.pl-toolbar { display:flex;align-items:center;gap:10px;padding:12px 18px;background:#fff;border-bottom:1px solid #E2E4E9;flex-wrap:wrap;flex-shrink:0; }
.pl-search-wrap { position:relative;flex:1;min-width:200px;max-width:360px; }
.pl-search-wrap svg { position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#8A8A8A; }
.pl-search { width:100%;padding:7px 12px 7px 34px;border:1.5px solid #E2E4E9;border-radius:8px;font-size:13px;font-family:DM Sans,sans-serif;background:#F2F3F5;outline:none;box-sizing:border-box; }
.pl-search:focus { border-color:#C8241A;background:#fff; }
.pl-select { padding:7px 10px;border:1.5px solid #E2E4E9;border-radius:8px;font-size:12.5px;font-family:DM Sans,sans-serif;background:#F2F3F5;outline:none;cursor:pointer; }
.pl-btn { padding:7px 14px;border-radius:8px;font-size:12.5px;font-weight:500;cursor:pointer;border:1.5px solid #E2E4E9;background:#fff;color:#1A1A1A;font-family:DM Sans,sans-serif;display:inline-flex;align-items:center;gap:5px;transition:background .12s;white-space:nowrap; }
.pl-btn:hover { background:#F2F3F5; }
.pl-btn.primary { background:#C8241A;color:#fff;border-color:#C8241A; }
.pl-btn.primary:hover { background:#E8352A; }
.pl-count { font-size:12px;color:#8A8A8A;margin-left:auto;white-space:nowrap; }
.pl-body { flex:1;overflow:auto;padding:16px 18px; }
.pl-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px; }
.pl-card { background:#fff;border:1px solid #E2E4E9;border-radius:10px;padding:16px;transition:all .15s; }
.pl-card:hover { border-color:#C8241A;box-shadow:0 2px 12px rgba(200,36,26,.1);transform:translateY(-1px); }
.pl-card-head { display:flex;align-items:center;gap:10px;margin-bottom:10px; }
.pl-av { width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;background:#EDE4FA;color:#6B3FA0; }
.pl-nombre { font-weight:600;font-size:13.5px;margin-bottom:2px; }
.pl-id { font-size:11.5px;color:#8A8A8A;font-family:monospace; }
.pl-area { display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:#F3E8FF;color:#7C3AED;margin-bottom:8px; }
.pl-info { font-size:12px;color:#4A4A4A;display:flex;flex-direction:column;gap:3px; }
.pl-info-row { display:flex;align-items:center;gap:5px; }
.pl-badge { font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:20px; }
.pl-badge.activo { background:#E6F6EC;color:#0A7A3F; }
.pl-badge.inactivo { background:#F2F3F5;color:#8A8A8A; }
.pl-footer { display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px solid #EEF0F3; }
.pl-edit { padding:5px 12px;border-radius:7px;border:1.5px solid #E2E4E9;background:#fff;color:#1A1A1A;cursor:pointer;font-size:12px;font-family:DM Sans,sans-serif;display:inline-flex;align-items:center;gap:4px; }
.pl-edit:hover { background:#F2F3F5;border-color:#C8241A; }
.pl-empty { padding:60px 20px;text-align:center;color:#8A8A8A; }
</style>

<div id="sec-profapoyo">
  <!-- TOOLBAR -->
  <div class="pl-toolbar">
    <div class="pl-search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input class="pl-search" id="pl-search" type="text" placeholder="Buscar profesional, profesión…" oninput="paFiltrar()"/>
    </div>
    <select class="pl-select" id="pl-fil-estado" onchange="paFiltrar()">
      <option value="">Todos los estados</option>
      <option value="ACTIVO">Activos</option>
      <option value="INACTIVO">Inactivos</option>
    </select>
    <select class="pl-select" id="pl-fil-area" onchange="paFiltrar()">
      <option value="">Todas las áreas</option>
    </select>
    <button class="pl-btn" onclick="paCargar()">↺ Actualizar</button>
    <button class="pl-btn primary" onclick="goTo('prof-nuevo','Personal','Nuevo profesional')">+ Nuevo profesional</button>
    <span class="pl-count" id="pl-count">—</span>
  </div>

  <!-- GRID -->
  <div class="pl-body" id="pl-body">
    <div class="pl-empty">⏳ Cargando profesionales…</div>
  </div>
</div>

<script>
var paLista=[], paAreas=[];

function paAbrir(modo) {
  paCargarAreas();
  paCargar();
}

function paCargarAreas() {
  google.script.run.withSuccessHandler(function(resp){
    paAreas = resp&&resp.ok&&Array.isArray(resp.datos)?resp.datos.filter(function(a){return a.ESTADO==='ACTIVO';}):[];
    var sel=document.getElementById('pl-fil-area');
    while(sel.options.length>1) sel.remove(1);
    paAreas.forEach(function(a){ var o=document.createElement('option'); o.value=a.ID_AREA_APOYO; o.textContent=a.NOMBRE; sel.appendChild(o); });
  }).withFailureHandler(function(){}).ejecutar('listarMaestras',{tabla:'AREA_APOYO',usuario:sesion.USUARIO||'',rol:sesion.ROL||'',token:sesion.TOKEN||''});
}

function paCargar() {
  var body=document.getElementById('pl-body');
  body.innerHTML='<div class="pl-empty">⏳ Cargando profesionales…</div>';
  if(typeof sesion==='undefined' || !sesion){ body.innerHTML='<div class="pl-empty">🔒 Inicie sesión</div>'; return; }
  google.script.run.withSuccessHandler(function(resp){
    if(!resp){ body.innerHTML='<div class="pl-empty" style="color:#C8241A">Sin respuesta del servidor</div>'; return; }
    if(!resp.ok){ body.innerHTML='<div class="pl-empty" style="color:#C8241A">⚠ '+(resp.mensaje||'Acceso denegado')+'</div>'; return; }
    var d=resp.datos||{};
    paLista=Array.isArray(d.datos)?d.datos:(Array.isArray(d)?d:[]);
    paFiltrar();
  }).withFailureHandler(function(e){
    body.innerHTML='<div class="pl-empty" style="color:#C8241A">Error: '+(e&&e.message?e.message:'desconocido')+'</div>';
  }).ejecutar('listarProfApoyo', { limite:500, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

function paFiltrar() {
  var q=(document.getElementById('pl-search').value||'').toUpperCase();
  var est=document.getElementById('pl-fil-estado').value;
  var area=document.getElementById('pl-fil-area').value;
  var f=paLista.filter(function(p){
    var okQ=!q || (p.NOMBRES+' '+p.APELLIDOS+' '+p.PROFESION+' '+p.ID_PROFESIONAL).toUpperCase().indexOf(q)>=0;
    var okE=!est || p.ESTADO===est;
    var okA=!area || p.ID_AREA_APOYO===area;
    return okQ&&okE&&okA;
  });
  paRender(f);
}

function paRender(lista) {
  var cont=document.getElementById('pl-body');
  document.getElementById('pl-count').textContent=lista.length+' profesional(es)';
  if(!lista.length){ cont.innerHTML='<div class="pl-empty">Sin profesionales registrados.</div>'; return; }
  var html='<div class="pl-grid">';
  lista.forEach(function(p){
    var ini=((p.NOMBRES||'?').charAt(0)+(p.APELLIDOS||'?').charAt(0)).toUpperCase();
    var badge=p.ESTADO==='ACTIVO'?'activo':'inactivo';
    var tel=(p.TELEFONO&&p.TELEFONO!=='-')?p.TELEFONO:'—';
    var email=(p.EMAIL&&p.EMAIL!=='-')?p.EMAIL:'';
    html+='<div class="pl-card">'+
      '<div class="pl-card-head">'+
        '<div class="pl-av">'+ini+'</div>'+
        '<div style="flex:1;min-width:0">'+
          '<div class="pl-nombre">'+(p.NOMBRES||'')+' '+(p.APELLIDOS||'')+'</div>'+
          '<div class="pl-id">'+(p.PROFESION||'—')+' · '+p.ID_PROFESIONAL+'</div>'+
        '</div>'+
      '</div>'+
      '<div class="pl-area">🔬 '+(p.AREA_NOMBRE||'Sin área')+'</div>'+
      '<div class="pl-info">'+
        '<div class="pl-info-row">📞 '+tel+'</div>'+
        (email?'<div class="pl-info-row">✉ '+email+'</div>':'')+
      '</div>'+
      '<div class="pl-footer">'+
        '<span class="pl-badge '+badge+'">'+(p.ESTADO||'')+'</span>'+
        '<button class="pl-edit" onclick="paEditar(\''+p.ID_PROFESIONAL+'\')">✏️ Editar</button>'+
      '</div>'+
    '</div>';
  });
  html+='</div>';
  cont.innerHTML=html;
}

// Editar lleva a la pantalla prof-nuevo y abre ese profesional
function paEditar(id) {
  goTo('prof-nuevo','Personal','Editar profesional');
  setTimeout(function(){ if(typeof pfSeleccionar==='function') pfSeleccionar(id); }, 400);
}
</script>
