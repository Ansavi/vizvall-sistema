<!-- MÓDULO: GESTIÓN DE PROFORMAS · Paciente obligatorio · 2 pestañas · Buscador -->
<div id="sec-proformas">
  <style>
    #sec-proformas { display:none;overflow:auto;position:absolute;top:56px;left:0;right:0;bottom:0;background:var(--bg,#F2F3F5); }
    #sec-proformas.activo { display:block; }
    #sec-proformas .pfm-wrap { padding:18px 22px;max-width:1100px; }
    #sec-proformas .pfm-head { display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px; }
    #sec-proformas .pfm-title { font-size:18px;font-weight:600; }
    #sec-proformas .pfm-btn { padding:9px 16px;border:1px solid #E2E4E9;border-radius:9px;background:#fff;cursor:pointer;font-size:13px;font-weight:500; }
    #sec-proformas .pfm-btn.primary { background:#C8241A;color:#fff;border-color:#C8241A;font-weight:600; }
    #sec-proformas .pfm-btn.amber { background:#FFF8E6;color:#8A6A1A;border-color:#F0E0A0;font-weight:600; }
    #sec-proformas .pf-btn:hover { background:#FAFBFC; }
    #sec-proformas .pfm-btn.primary:hover { background:#A81E15; }
    #sec-proformas .pfm-table-wrap { background:#fff;border:1px solid #EEF0F3;border-radius:12px;overflow:hidden; }
    #sec-proformas table { width:100%;border-collapse:collapse; }
    #sec-proformas th { padding:10px 12px;text-align:left;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#9AA0A6;background:#FAFBFC;border-bottom:1px solid #E8EAED; }
    #sec-proformas td { padding:11px 12px;border-bottom:1px solid #F2F3F5;font-size:13px; }
    #sec-proformas tbody tr:hover { background:#FAFBFC; }
    #sec-proformas .pfm-id { font-family:monospace;font-size:12px;color:#666; }
    #sec-proformas .pfm-monto { font-weight:600;color:#0A7A3F; }
    #sec-proformas .pfm-accion { padding:5px 9px;border:1px solid #E2E4E9;border-radius:6px;background:#fff;cursor:pointer;font-size:12px;margin-right:4px; }
    #sec-proformas .pfm-empty { text-align:center;color:#8A8A8A;padding:40px 20px; }
    #sec-proformas .pfm-modal-ov { display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:flex-start;justify-content:center;padding:30px 16px;overflow:auto; }
    #sec-proformas .pfm-modal-ov.open { display:flex; }
    #sec-proformas .pfm-modal { background:#fff;border-radius:12px;width:100%;max-width:700px; }
    #sec-proformas .pfm-modal-head { display:flex;justify-content:space-between;align-items:flex-start;padding:14px 18px;border-bottom:1px solid #EEF0F3; }
    #sec-proformas .pfm-modal-title { font-size:15px;font-weight:600; }
    #sec-proformas .pfm-num { font-family:monospace;font-size:12px;color:#C8241A;font-weight:700;margin-top:2px; }
    #sec-proformas .pfm-modal-body { padding:16px 18px; }
    #sec-proformas .pfm-fg { margin-bottom:14px; }
    #sec-proformas .pfm-flabel { display:block;font-size:12px;color:#555;margin-bottom:5px;font-weight:500; }
    #sec-proformas .pfm-req { color:#C8241A; }
    #sec-proformas .pfm-finp { width:100%;padding:9px 11px;border:1px solid #E2E4E9;border-radius:8px;font-size:13.5px;box-sizing:border-box; }
    #sec-proformas .pf-finp:focus { border-color:#C8241A;outline:none;box-shadow:0 0 0 3px rgba(200,36,26,.08); }
    #sec-proformas .pfm-tabs { display:flex;gap:6px;background:#F4F5F7;padding:5px;border-radius:10px;width:fit-content;margin-bottom:12px; }
    #sec-proformas .pfm-tab { padding:8px 16px;border:none;border-radius:7px;background:transparent;cursor:pointer;font-size:13px;font-weight:600;color:#6B7280; }
    #sec-proformas .pfm-tab.sel { background:#fff;color:#C8241A;box-shadow:0 1px 3px rgba(0,0,0,.1); }
    #sec-proformas .pfm-result { border:1px solid #E2E4E9;border-radius:8px;margin-top:6px;max-height:220px;overflow:auto; }
    #sec-proformas .pfm-result-item { display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 11px;cursor:pointer;font-size:13px;border-bottom:1px solid #F2F3F5; }
    #sec-proformas .pf-result-item:hover { background:#FAFBFC; }
    #sec-proformas .pfm-tag { font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px; }
    #sec-proformas .pfm-tag-srv { background:#E6F1FB;color:#1A6FC4; }
    #sec-proformas .pfm-tag-paq { background:#F3E8FF;color:#6B3FA0; }
    #sec-proformas .pfm-cart { border:1px solid #EEF0F3;border-radius:9px;margin-top:8px; }
    #sec-proformas .pfm-cart-item { display:flex;align-items:center;gap:8px;padding:9px 11px;border-bottom:1px solid #F2F3F5; }
    #sec-proformas .pfm-cart-empty { text-align:center;color:#9AA0A6;padding:18px;font-size:12.5px; }
    #sec-proformas .pfm-modal-foot { display:flex;justify-content:flex-end;gap:8px;padding:14px 18px;border-top:1px solid #EEF0F3; }
    #sec-proformas .pfm-venc-opt { color:#6B7280; }
    #sec-proformas .pfm-venc-opt.sel { background:#fff;color:#C8241A;box-shadow:0 1px 3px rgba(0,0,0,.1); }
    #sec-proformas .pfm-pac-sel { margin-top:6px;padding:8px 10px;background:#EAF3FD;border-radius:8px;font-size:13px;display:none;align-items:center;gap:8px; }
  </style>

  <div class="pfm-wrap">
    <div class="pfm-head">
      <span class="pfm-title">📋 Gestión de Proformas</span>
      <button class="pfm-btn primary" onclick="pfmNueva()">+ Nueva proforma</button>
    </div>
    <div class="pfm-tabs" style="margin-bottom:14px">
      <button class="pfm-tab sel" id="pfm-vista-vig" onclick="pfmVista('vigentes')">Vigentes</button>
      <button class="pfm-tab" id="pfm-vista-ven" onclick="pfmVista('vencidas')">⏰ Vencidas</button>
    </div>
    <div class="pfm-table-wrap">
      <table>
        <thead><tr><th>N° Proforma</th><th>Fecha</th><th>Paciente</th><th style="text-align:right">Total</th><th>Vence</th><th style="text-align:center">Acciones</th></tr></thead>
        <tbody id="pfm-body"><tr><td colspan="5" class="pfm-empty">⏳ Cargando…</td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="pfm-modal-ov" id="pfm-modal">
    <div class="pfm-modal">
      <div class="pfm-modal-head">
        <div>
          <div class="pfm-modal-title" id="pfm-modal-title">Nueva proforma</div>
          <div class="pfm-num" id="pfm-num-label">N° se asigna al guardar · Fecha: <span id="pfm-fecha-label"></span></div>
        </div>
        <button class="pfm-btn" onclick="pfmCerrar()" style="padding:4px 10px">✕</button>
      </div>
      <div class="pfm-modal-body">
        <input type="hidden" id="pfm-edit-id" value=""/>
        <div class="pfm-fg">
          <label class="pfm-flabel">Paciente <span class="pfm-req">*</span></label>
          <input class="pfm-finp" id="pfm-pac-search" placeholder="Buscar por nombre o documento…" oninput="pfmBuscarPac()"/>
          <div id="pfm-pac-result"></div>
          <div id="pfm-pac-sel" class="pfm-pac-sel"></div>
          <input type="hidden" id="pfm-pac-id" value=""/>
        </div>
        <div class="pfm-fg">
          <label class="pfm-flabel">Cotizar servicios / paquetes <span class="pfm-req">*</span></label>
          <div class="pfm-tabs">
            <button class="pfm-tab sel" id="pfm-tab-esp" onclick="pfmTab('esp')">Especialidades</button>
            <button class="pfm-tab" id="pfm-tab-apo" onclick="pfmTab('apo')">Servicios de apoyo</button>
          </div>
          <input class="pfm-finp" id="pfm-srv-search" placeholder="Escriba el nombre del servicio o paquete…" oninput="pfmBuscarItem()"/>
          <div id="pfm-srv-result"></div>
        </div>
        <div class="pfm-fg">
          <label class="pfm-flabel">Servicios cotizados</label>
          <div class="pfm-cart" id="pfm-cart"><div class="pfm-cart-empty">Aún no hay servicios. Busque y agregue.</div></div>
          <div style="display:flex;justify-content:flex-end;margin-top:10px;font-size:16px;font-weight:700;color:#0A7A3F">Total: <span id="pfm-total" style="margin-left:8px">S/ 0.00</span></div>
        </div>
        <div class="pfm-fg">
          <label class="pfm-flabel">Observaciones <span style="color:#9AA0A6;font-weight:400">(opcional)</span></label>
          <input class="pfm-finp" id="pfm-obs" placeholder="Notas de la cotización…"/>
        </div>
        <div class="pfm-fg">
          <label class="pfm-flabel">Vencimiento de la proforma</label>
          <div style="display:flex;gap:6px;background:#F4F5F7;padding:4px;border-radius:9px;margin-bottom:8px;width:fit-content">
            <div class="pfm-venc-opt sel" id="pfm-venc-si" onclick="pfmVenc('SI')" style="padding:7px 16px;border-radius:6px;cursor:pointer;font-size:12.5px;font-weight:600">✓ Activo</div>
            <div class="pfm-venc-opt" id="pfm-venc-no" onclick="pfmVenc('NO')" style="padding:7px 16px;border-radius:6px;cursor:pointer;font-size:12.5px;font-weight:600">Inactivo</div>
          </div>
          <div id="pfm-venc-dias-box" style="display:flex;align-items:center;gap:8px">
            <input class="pfm-finp" id="pfm-venc-dias" type="number" min="1" value="15" style="width:100px" placeholder="Días"/>
            <span style="font-size:12.5px;color:#8A8A8A">días de validez de la cotización</span>
          </div>
        </div>
      </div>
      <div class="pfm-modal-foot">
        <button class="pfm-btn" onclick="pfmCerrar()">Cancelar</button>
        <button class="pfm-btn amber" id="pfm-btn-guardar" onclick="pfmGuardar()">💾 Guardar proforma</button>
      </div>
    </div>
  </div>

  <!-- Modal de conversión a venta (propio del módulo proformas) -->
  <div id="pfm-conv-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1100;align-items:center;justify-content:center"></div>
</div>

<script>
var pfmServiciosAll=[], pfmPaquetesAll=[], pfmCart=[], pfmPacTimer=null, pfmTabActual='esp', pfmVencActivo='SI', pfmVistaLista='vigentes', pfmListaActual=[];
function pfmVenc(v) {
  pfmVencActivo=v;
  document.getElementById('pfm-venc-si').classList.toggle('sel', v==='SI');
  document.getElementById('pfm-venc-no').classList.toggle('sel', v==='NO');
  document.getElementById('pfm-venc-dias-box').style.display = v==='SI'?'flex':'none';
}
function pfmAbrir() { pfmCargarLista(); }
function pfmVista(v) {
  pfmVistaLista=v;
  document.getElementById('pfm-vista-vig').classList.toggle('sel', v==='vigentes');
  document.getElementById('pfm-vista-ven').classList.toggle('sel', v==='vencidas');
  pfmCargarLista();
}
function pfmCargarLista() {
  var body=document.getElementById('pfm-body');
  var esVencidas = (pfmVistaLista==='vencidas');
  body.innerHTML='<tr><td colspan="6" class="pfm-empty">⏳ Cargando…</td></tr>';
  google.script.run.withSuccessHandler(function(resp){
    var lista=(resp&&resp.ok&&Array.isArray(resp.datos))?resp.datos:[];
    pfmListaActual=lista;
    if(!lista.length){ body.innerHTML='<tr><td colspan="6" class="pfm-empty"><div style="font-size:32px;margin-bottom:8px;opacity:.3">'+(esVencidas?'⏰':'📋')+'</div>'+(esVencidas?'Sin proformas vencidas':'Sin proformas vigentes')+'</td></tr>'; return; }
    var html='';
    lista.forEach(function(p){
      // Celda de vencimiento
      var venceTxt='—';
      if(p.PROF_VENCE && p.PROF_VENCE!=='-'){
        if(esVencidas){ venceTxt='<span style="color:#C8241A;font-weight:600">Venció '+p.PROF_VENCE+'</span>'; }
        else if(p.DIAS_RESTANTES!==null){
          var col = p.DIAS_RESTANTES<=3 ? '#C8241A' : (p.DIAS_RESTANTES<=7?'#B8860B':'#1F7A45');
          venceTxt='<span style="color:'+col+';font-weight:600">'+p.DIAS_RESTANTES+' día'+(p.DIAS_RESTANTES===1?'':'s')+'</span><br><span style="font-size:10px;color:#9AA0A6">'+p.PROF_VENCE+'</span>';
        }
      } else { venceTxt='<span style="color:#9AA0A6">Sin venc.</span>'; }

      // Acciones según vista
      var acciones='';
      if(esVencidas){
        // Vencidas: solo ver detalle, reactivar (editar) e imprimir
        acciones='<button class="pfm-accion" onclick="pfmEditar(\''+p.ID_VENTA+'\')">✏ Reactivar</button>'+
                 '<button class="pfm-accion" style="color:#1A6FC4;border-color:#A5C8E8" onclick="pfmImprimir(\''+p.ID_VENTA+'\')">🖨 Imprimir/PDF</button>'+
                 '<button class="pfm-accion" style="color:#C8241A;border-color:#FAD4D1" onclick="pfmAnular(\''+p.ID_VENTA+'\')">✕</button>';
      } else {
        acciones='<button class="pfm-accion" style="background:#E6F6EC;color:#1F7A45;border-color:#B5E5C5" onclick="pfmConvertir(\''+p.ID_VENTA+'\')">💲 Convertir a Venta</button>'+
                 '<button class="pfm-accion" onclick="pfmEditar(\''+p.ID_VENTA+'\')">✏ Editar</button>'+
                 '<button class="pfm-accion" style="color:#1A6FC4;border-color:#A5C8E8" onclick="pfmImprimir(\''+p.ID_VENTA+'\')">🖨 Imprimir/PDF</button>'+
                 '<button class="pfm-accion" style="color:#C8241A;border-color:#FAD4D1" onclick="pfmAnular(\''+p.ID_VENTA+'\')">✕</button>';
      }
      html+='<tr><td class="pfm-id">'+p.ID_VENTA+'</td><td class="pfm-id">'+(p.FECHA_VENTA||'—')+'</td><td>'+(p.PACIENTE_NOMBRE||'—')+'</td><td style="text-align:right" class="pfm-monto">S/ '+(p.TOTAL||'0.00')+'</td>'+
        '<td>'+venceTxt+'</td>'+
        '<td style="text-align:center;white-space:nowrap">'+acciones+'</td></tr>';
    });
    body.innerHTML=html;
  }).withFailureHandler(function(e){ document.getElementById('pfm-body').innerHTML='<tr><td colspan="6" class="pfm-empty" style="color:#C8241A">⚠ '+e.message+'</td></tr>'; }).ejecutar('listarProformas', { vista:pfmVistaLista, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}
function pfmNueva() {
  document.getElementById('pfm-edit-id').value='';
  document.getElementById('pfm-modal-title').textContent='Nueva proforma';
  document.getElementById('pfm-num-label').innerHTML='N° se asigna al guardar · Fecha: <span id="pfm-fecha-label"></span>';
  var hoy=new Date();
  var fstr=String(hoy.getDate()).padStart(2,'0')+'/'+String(hoy.getMonth()+1).padStart(2,'0')+'/'+hoy.getFullYear();
  var fl=document.getElementById('pfm-fecha-label'); if(fl) fl.textContent=fstr;
  document.getElementById('pfm-pac-id').value='';
  document.getElementById('pfm-pac-search').value='';
  document.getElementById('pfm-pac-result').innerHTML='';
  document.getElementById('pfm-pac-sel').style.display='none';
  document.getElementById('pfm-srv-search').value='';
  document.getElementById('pfm-srv-result').innerHTML='';
  document.getElementById('pfm-obs').value='';
  pfmCart=[]; pfmRenderCart(); pfmTab('esp'); pfmCargarCatalogos();
  document.getElementById('pfm-venc-dias').value='15'; pfmVenc('SI');
  document.getElementById('pfm-modal').classList.add('open');
}
function pfmCerrar() { document.getElementById('pfm-modal').classList.remove('open'); }
function pfmCargarCatalogos() {
  google.script.run.withSuccessHandler(function(resp){ pfmServiciosAll=(resp&&resp.ok&&Array.isArray(resp.datos))?resp.datos.filter(function(s){return s.ESTADO==='ACTIVO';}):[]; }).withFailureHandler(function(){ pfmServiciosAll=[]; }).ejecutar('listarServicios',{ usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
  google.script.run.withSuccessHandler(function(resp){ pfmPaquetesAll=(resp&&resp.ok&&Array.isArray(resp.datos))?resp.datos.filter(function(p){return p.ESTADO==='ACTIVO';}):[]; }).withFailureHandler(function(){ pfmPaquetesAll=[]; }).ejecutar('listarPaquetes',{ usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}
function pfmTab(t) {
  pfmTabActual=t;
  document.getElementById('pfm-tab-esp').classList.toggle('sel', t==='esp');
  document.getElementById('pfm-tab-apo').classList.toggle('sel', t==='apo');
  document.getElementById('pfm-srv-search').value='';
  document.getElementById('pfm-srv-result').innerHTML='';
}
function pfmBuscarItem() {
  var q=document.getElementById('pfm-srv-search').value.trim().toUpperCase();
  var cont=document.getElementById('pfm-srv-result');
  if(q.length<2){ cont.innerHTML=''; return; }
  var servs=pfmServiciosAll.filter(function(s){
    var nombre=String(s.NOMBRE_SERVICIO||'').toUpperCase();
    if(nombre.indexOf(q)<0) return false;
    if(pfmTabActual==='esp'){ return s.ID_ESPECIALIDAD && s.ID_ESPECIALIDAD!=='-'; }
    else { return s.ID_AREA_APOYO && s.ID_AREA_APOYO!=='-'; }
  });
  var paqs=pfmPaquetesAll.filter(function(p){ return String(p.NOMBRE_PAQUETE||'').toUpperCase().indexOf(q)>=0; });
  if(!servs.length && !paqs.length){ cont.innerHTML='<div class="pfm-result"><div class="pfm-result-item" style="color:#9AA0A6">Sin resultados para "'+q+'"</div></div>'; return; }
  var html='<div class="pfm-result">';
  servs.forEach(function(s){
    var precio=parseFloat(s.PRECIO_BASE)||0;
    html+='<div class="pfm-result-item" onclick="pfmAgregar(\'SERVICIO\',\''+s.ID_SERVICIO+'\',\''+String(s.NOMBRE_SERVICIO||'').replace(/'/g,"\\'")+'\','+precio+')"><span><span class="pfm-tag pfm-tag-srv">SERVICIO</span> '+(s.NOMBRE_SERVICIO||'')+'</span><span style="font-weight:600;color:#0A7A3F">S/ '+precio.toFixed(2)+'</span></div>';
  });
  paqs.forEach(function(p){
    var precio=parseFloat(p.PRECIO_TOTAL)||0;
    html+='<div class="pfm-result-item" onclick="pfmAgregar(\'PAQUETE\',\''+p.ID_PAQUETE+'\',\''+String(p.NOMBRE_PAQUETE||'').replace(/'/g,"\\'")+'\','+precio+')"><span><span class="pfm-tag pfm-tag-paq">PAQUETE</span> '+(p.NOMBRE_PAQUETE||'')+'</span><span style="font-weight:600;color:#0A7A3F">S/ '+precio.toFixed(2)+'</span></div>';
  });
  html+='</div>';
  cont.innerHTML=html;
}
function pfmAgregar(tipo, id, nombre, precio) {
  var existe=pfmCart.find(function(it){ return it.TIPO===tipo && (tipo==='SERVICIO'?it.ID_SERVICIO===id:it.ID_PAQUETE===id); });
  if(existe){ existe.CANTIDAD++; }
  else { var item={ TIPO:tipo, NOMBRE:(tipo==='PAQUETE'?'📦 ':'')+nombre, CANTIDAD:1, PRECIO_UNITARIO:precio, DESCUENTO:0 }; if(tipo==='SERVICIO') item.ID_SERVICIO=id; else item.ID_PAQUETE=id; pfmCart.push(item); }
  pfmRenderCart();
  document.getElementById('pfm-srv-search').value='';
  document.getElementById('pfm-srv-result').innerHTML='';
}
function pfmRenderCart() {
  var cont=document.getElementById('pfm-cart');
  if(!pfmCart.length){ cont.innerHTML='<div class="pfm-cart-empty">Aún no hay servicios. Busque y agregue.</div>'; document.getElementById('pfm-total').textContent='S/ 0.00'; return; }
  var html=''; var total=0;
  pfmCart.forEach(function(it,idx){
    var sub=(parseFloat(it.CANTIDAD)||0)*(parseFloat(it.PRECIO_UNITARIO)||0); total+=sub;
    html+='<div class="pfm-cart-item"><span style="flex:1">'+it.NOMBRE+'</span><input type="number" min="1" value="'+it.CANTIDAD+'" onchange="pfmCantidad('+idx+',this.value)" style="width:54px;padding:5px;border:1px solid #E2E4E9;border-radius:6px;font-size:12.5px"/><span style="width:90px;text-align:right;color:#666">S/ '+(parseFloat(it.PRECIO_UNITARIO)||0).toFixed(2)+'</span><span style="width:90px;text-align:right;font-weight:600">S/ '+sub.toFixed(2)+'</span><button class="pfm-accion" style="color:#C8241A;border-color:#FAD4D1" onclick="pfmDelItem('+idx+')">✕</button></div>';
  });
  cont.innerHTML=html;
  document.getElementById('pfm-total').textContent='S/ '+total.toFixed(2);
}
function pfmCantidad(idx,val) { var n=parseInt(val,10); if(n<1||isNaN(n))n=1; pfmCart[idx].CANTIDAD=n; pfmRenderCart(); }
function pfmDelItem(idx) { pfmCart.splice(idx,1); pfmRenderCart(); }
function pfmBuscarPac() {
  clearTimeout(pfmPacTimer);
  var q=document.getElementById('pfm-pac-search').value.trim();
  var cont=document.getElementById('pfm-pac-result');
  if(q.length<2){ cont.innerHTML=''; return; }
  pfmPacTimer=setTimeout(function(){
    google.script.run.withSuccessHandler(function(resp){
      var lista=(resp&&resp.ok&&Array.isArray(resp.datos))?resp.datos:[];
      if(!lista.length){ cont.innerHTML='<div class="pfm-result"><div class="pfm-result-item" style="color:#9AA0A6">Sin resultados</div></div>'; return; }
      var html='<div class="pfm-result">';
      lista.forEach(function(p){
        var nombre=((p.NOMBRES||'')+' '+(p.APELLIDOS||'')).trim();
        html+='<div class="pfm-result-item" onclick="pfmSelPac(\''+p.ID_PACIENTE+'\',\''+nombre.replace(/'/g,"\\'")+'\',\''+(p.NUMERO_DOCUMENTO||'')+'\')">'+nombre+' <span style="color:#9AA0A6">'+(p.NUMERO_DOCUMENTO||'')+'</span></div>';
      });
      html+='</div>'; cont.innerHTML=html;
    }).withFailureHandler(function(){ cont.innerHTML=''; }).ejecutar('buscarPaciente',{ query:q, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
  }, 300);
}
function pfmSelPac(id, nombre, dni) {
  document.getElementById('pfm-pac-id').value=id;
  document.getElementById('pfm-pac-search').value='';
  document.getElementById('pfm-pac-result').innerHTML='';
  var sel=document.getElementById('pfm-pac-sel');
  sel.style.display='flex';
  sel.innerHTML='<span style="flex:1">✓ <strong>'+nombre+'</strong> <span style="color:#9AA0A6">'+dni+'</span></span><button class="pfm-accion" onclick="pfmQuitarPac()">cambiar</button>';
}
function pfmQuitarPac() {
  document.getElementById('pfm-pac-id').value='';
  document.getElementById('pfm-pac-sel').style.display='none';
  document.getElementById('pfm-pac-sel').innerHTML='';
}
function pfmGuardar() {
  var idPac=document.getElementById('pfm-pac-id').value;
  if(!idPac){ alert('⚠ El paciente es obligatorio'); return; }
  if(!pfmCart.length){ alert('⚠ Agregue al menos un servicio o paquete a cotizar'); return; }
  var items=pfmCart.map(function(it){ var o={ TIPO:it.TIPO, CANTIDAD:it.CANTIDAD, PRECIO_UNITARIO:it.PRECIO_UNITARIO, DESCUENTO:0 }; if(it.TIPO==='SERVICIO') o.ID_SERVICIO=it.ID_SERVICIO; else o.ID_PAQUETE=it.ID_PAQUETE; return o; });
  var editId=document.getElementById('pfm-edit-id').value;
  var btn=document.getElementById('pfm-btn-guardar'); btn.disabled=true; btn.textContent='⏳ Guardando…';
  google.script.run.withSuccessHandler(function(resp){
    btn.disabled=false; btn.textContent='💾 Guardar proforma';
    if(!resp||!resp.ok){ alert('⚠ '+(resp?resp.mensaje:'Error')); return; }
    alert('✓ '+resp.mensaje); pfmCerrar(); pfmCargarLista();
  }).withFailureHandler(function(e){ btn.disabled=false; btn.textContent='💾 Guardar proforma'; alert('⚠ '+e.message); })
    .ejecutar(editId?'editarProforma':'guardarProforma', { ID_VENTA:editId, ID_PACIENTE:idPac, items:JSON.stringify(items), igvModo:'ninguno', OBSERVACIONES:document.getElementById('pfm-obs').value||'', PROF_VENCE_ACTIVO:pfmVencActivo, PROF_DIAS:(pfmVencActivo==='SI'?document.getElementById('pfm-venc-dias').value:''), usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}
function pfmEditar(idVenta) {
  pfmNueva();
  document.getElementById('pfm-edit-id').value=idVenta;
  document.getElementById('pfm-modal-title').textContent='✏ Editar proforma';
  document.getElementById('pfm-num-label').innerHTML='N° '+idVenta;
  google.script.run.withSuccessHandler(function(resp){
    var items=(resp&&resp.ok&&Array.isArray(resp.datos))?resp.datos:[];
    pfmCart=items.map(function(d){ var item={ TIPO:d.TIPO||'SERVICIO', NOMBRE:(d.TIPO==='PAQUETE'?'📦 ':'')+(d.SERVICIO_NOMBRE||'Item'), CANTIDAD:parseFloat(d.CANTIDAD)||1, PRECIO_UNITARIO:parseFloat(d.PRECIO_UNITARIO)||0, DESCUENTO:0 }; if(d.TIPO==='PAQUETE') item.ID_PAQUETE=d.ID_PAQUETE; else item.ID_SERVICIO=d.ID_SERVICIO; return item; });
    pfmRenderCart();
  }).withFailureHandler(function(){}).ejecutar('obtenerDetalleVenta',{ ID_VENTA:idVenta, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
  google.script.run.withSuccessHandler(function(resp){ if(resp&&resp.ok&&resp.datos&&resp.datos.ID_PACIENTE){ pfmSelPac(resp.datos.ID_PACIENTE, resp.datos.PACIENTE_NOMBRE||resp.datos.ID_PACIENTE, ''); } }).withFailureHandler(function(){}).ejecutar('obtenerProforma',{ ID_VENTA:idVenta, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}
function pfmAnular(idVenta) {
  if(!confirm('¿Anular la proforma '+idVenta+'?')) return;
  google.script.run.withSuccessHandler(function(resp){ if(!resp||!resp.ok){ alert('⚠ '+(resp?resp.mensaje:'Error')); return; } alert('✓ '+resp.mensaje); pfmCargarLista(); }).withFailureHandler(function(e){ alert('⚠ '+e.message); }).ejecutar('anularProforma',{ ID_VENTA:idVenta, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}
// ── CONVERTIR A VENTA: popup propio en el módulo de proformas ──
var pfmComprobantes=[], pfmModosPago=[];
function pfmConvertir(idVenta) {
  // Cargar comprobantes y modos de pago si no están
  function abrirModal(){
    var opcComp='<option value="">— Comprobante —</option>';
    pfmComprobantes.forEach(function(t){ opcComp+='<option value="'+t.ID_TCOMPROBANTE+'">'+(t.NOMBRE||'')+'</option>'; });
    var opcModo='<option value="">— Modo de pago —</option>';
    pfmModosPago.forEach(function(m){ opcModo+='<option value="'+m.ID_TMODO_PAGO+'">'+(m.NOMBRE||'')+'</option>'; });
    var ov=document.getElementById('pfm-conv-modal');
    ov.innerHTML='<div style="background:#fff;border-radius:12px;width:92%;max-width:440px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid #EEF0F3">'+
        '<span style="font-weight:600">💲 Convertir a Venta</span>'+
        '<button onclick="pfmCerrarConv()" style="border:1px solid #E2E4E9;background:#fff;border-radius:7px;padding:4px 10px;cursor:pointer">✕</button>'+
      '</div>'+
      '<div style="padding:16px 18px">'+
        '<div style="font-size:12px;color:#8A8A8A;margin-bottom:12px">Proforma <b>'+idVenta+'</b>. Al convertir se descuenta stock y se registra en caja.</div>'+
        '<input type="hidden" id="pfm-conv-id" value="'+idVenta+'"/>'+
        '<label style="font-size:12px;color:#555;display:block;margin-bottom:4px">Comprobante</label>'+
        '<select id="pfm-conv-comp" style="width:100%;padding:9px;border:1px solid #E2E4E9;border-radius:8px;margin-bottom:12px;box-sizing:border-box">'+opcComp+'</select>'+
        '<label style="font-size:12px;color:#555;display:block;margin-bottom:4px">Modo de pago</label>'+
        '<select id="pfm-conv-modo" style="width:100%;padding:9px;border:1px solid #E2E4E9;border-radius:8px;margin-bottom:16px;box-sizing:border-box">'+opcModo+'</select>'+
        '<div style="display:flex;justify-content:flex-end;gap:8px">'+
          '<button onclick="pfmCerrarConv()" style="border:1px solid #E2E4E9;background:#fff;border-radius:8px;padding:9px 16px;cursor:pointer">Cancelar</button>'+
          '<button id="pfm-conv-btn" onclick="pfmConfirmarConv()" style="background:#1F7A45;color:#fff;border:none;border-radius:8px;padding:9px 16px;cursor:pointer;font-weight:600">✓ Convertir a Venta</button>'+
        '</div>'+
      '</div></div>';
    ov.style.display='flex';
  }
  if(pfmComprobantes.length && pfmModosPago.length){ abrirModal(); return; }
  google.script.run.withSuccessHandler(function(resp){
    pfmComprobantes=(resp&&resp.ok&&Array.isArray(resp.datos))?resp.datos.filter(function(t){return t.ESTADO==='ACTIVO';}):[];
    google.script.run.withSuccessHandler(function(r2){
      pfmModosPago=(r2&&r2.ok&&Array.isArray(r2.datos))?r2.datos.filter(function(m){return m.ESTADO==='ACTIVO';}):[];
      abrirModal();
    }).withFailureHandler(function(){ pfmModosPago=[]; abrirModal(); }).ejecutar('listarMaestras',{ tabla:'TMODO_PAGO', usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
  }).withFailureHandler(function(){ pfmComprobantes=[]; abrirModal(); }).ejecutar('listarMaestras',{ tabla:'TCOMPROBANTE', usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}
function pfmCerrarConv() { var ov=document.getElementById('pfm-conv-modal'); if(ov){ ov.style.display='none'; ov.innerHTML=''; } }
function pfmConfirmarConv() {
  var idVenta=document.getElementById('pfm-conv-id').value;
  var tcomp=document.getElementById('pfm-conv-comp').value;
  var modo=document.getElementById('pfm-conv-modo').value;
  if(!tcomp){ alert('⚠ Seleccione el comprobante'); return; }
  if(!modo){ alert('⚠ Seleccione el modo de pago'); return; }
  var btn=document.getElementById('pfm-conv-btn'); btn.disabled=true; btn.textContent='⏳ Convirtiendo…';
  google.script.run.withSuccessHandler(function(resp){
    btn.disabled=false; btn.textContent='✓ Convertir a Venta';
    if(!resp||!resp.ok){ alert('⚠ '+(resp?resp.mensaje:'Error')); return; }
    alert('✓ '+resp.mensaje);
    pfmCerrarConv(); pfmCargarLista();
  }).withFailureHandler(function(e){ btn.disabled=false; btn.textContent='✓ Convertir a Venta'; alert('⚠ '+e.message); })
    .ejecutar('convertirProformaEnVenta', { ID_VENTA:idVenta, ID_TCOMPROBANTE:tcomp, ID_TMODO_PAGO:modo, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}
function pfmImprimir(idVenta) {
  // Buscar la proforma para usar SU vencimiento guardado (sin preguntar)
  var p=pfmListaActual.find(function(x){ return x.ID_VENTA===idVenta; });
  var dias=15;
  if(p && p.PROF_DIAS && p.PROF_DIAS!=='-'){ var n=parseInt(p.PROF_DIAS,10); if(!isNaN(n)&&n>0) dias=n; }
  // Llamar al render directamente con los días guardados (sin prompt)
  if(typeof veRenderProforma==='function'){
    // Garantizar la config de empresa (logo) ANTES de imprimir
    var lanzar=function(){
      google.script.run.withSuccessHandler(function(resp){
        var det=resp&&resp.ok&&Array.isArray(resp.datos)?resp.datos:[];
        veRenderProforma(idVenta, det, dias);
      }).withFailureHandler(function(e){ alert('⚠ '+e.message); })
        .ejecutar('obtenerDetalleVenta', { ID_VENTA:idVenta, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
    };
    if(typeof veConConfigEmpresa==='function'){ veConConfigEmpresa(lanzar); } else { lanzar(); }
  } else { alert('Función de impresión no disponible.'); }
}
</script>
