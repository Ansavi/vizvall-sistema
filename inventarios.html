<!-- MODULO: INVENTARIO — prefijo "in" -->
<style>
#sec-inventario { display:none;overflow:auto;position:absolute;top:56px;left:0;right:0;bottom:0;background:var(--bg,#F2F3F5); }
#sec-inventario.activo { display:block; }
.in-wrap { padding:18px 22px; }
.in-head { display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px; }
.in-title { font-size:18px;font-weight:600;color:#1A1A1A; }
.in-tabs { display:flex;gap:4px;border-bottom:1px solid #E2E4E9;margin-bottom:18px;flex-wrap:wrap; }
.in-tab { padding:9px 16px;cursor:pointer;font-size:13.5px;color:#6B6B6B;border-bottom:2px solid transparent;user-select:none; }
.in-tab.activo { color:#C8241A;border-bottom-color:#C8241A;font-weight:600; }
.in-toolbar { display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px; }
.in-search { padding:8px 12px;border:1.5px solid #E2E4E9;border-radius:8px;font-size:13px;background:#fff;outline:none;min-width:240px; }
.in-search:focus { border-color:#C8241A; }
.in-btn { padding:8px 15px;border:1px solid #E2E4E9;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:6px; }
.in-btn.primary { background:#C8241A;color:#fff;border-color:#C8241A; }
.in-btn.sm { padding:5px 10px;font-size:12px; }
.in-btn:disabled { opacity:.5;cursor:not-allowed; }
.in-card { background:#fff;border:1px solid #EEF0F3;border-radius:12px;overflow:hidden; }
.in-table { width:100%;border-collapse:collapse;font-size:13px; }
.in-table th { text-align:left;padding:11px 14px;border-bottom:2px solid #EEF0F3;color:#6B6B6B;font-weight:600;font-size:12px;background:#FAFBFC; }
.in-table td { padding:11px 14px;border-bottom:1px solid #F2F3F5; }
.in-table tr:hover td { background:#FAFBFC; }
.in-id { font-family:monospace;font-size:11.5px;color:#8A8A8A; }
.in-stock { font-weight:600;font-variant-numeric:tabular-nums; }
.in-badge { display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:500; }
.in-badge.ok { background:#E6F6EC;color:#1F9D55; }
.in-badge.bajo { background:#FBE9D0;color:#B5651A; }
.in-badge.cero { background:#FAE6E4;color:#C8241A; }
.in-badge.entrada { background:#E6F6EC;color:#1F9D55; }
.in-badge.salida { background:#FAE6E4;color:#C8241A; }
.in-badge.ajuste { background:#EAF3FD;color:#1A6FC4; }
.in-empty { text-align:center;color:#8A8A8A;padding:44px 20px;font-size:13.5px; }
.in-accion { background:none;border:none;cursor:pointer;font-size:13px;padding:3px 7px;border-radius:6px;color:#6B6B6B; }
.in-accion:hover { background:#F2F3F5; }
.in-alert { background:#FBE9D0;border:1px solid #F0C98A;border-radius:8px;padding:10px 14px;font-size:12.5px;color:#8A5A00;margin-bottom:14px; }
/* Modal */
.in-modal-bg { display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center;padding:20px; }
.in-modal-bg.activo { display:flex; }
.in-modal { background:#fff;border-radius:14px;max-width:540px;width:100%;max-height:90vh;overflow:auto;padding:22px; }
.in-modal-head { display:flex;justify-content:space-between;align-items:center;margin-bottom:18px; }
.in-modal-title { font-size:17px;font-weight:600; }
.in-close { background:none;border:1px solid #E2E4E9;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:16px; }
.in-grid2 { display:grid;grid-template-columns:1fr 1fr;gap:12px; }
.in-fg { margin-bottom:12px; }
.in-flabel { display:block;font-size:12.5px;color:#444;margin-bottom:4px;font-weight:500; }
.in-finp { width:100%;padding:9px 11px;border:1px solid #E2E4E9;border-radius:8px;font-size:13.5px;box-sizing:border-box; }
.in-finp:focus { border-color:#C8241A;outline:none; }
.in-modal-foot { display:flex;justify-content:flex-end;gap:10px;margin-top:18px; }
@media(max-width:600px){ .in-grid2{grid-template-columns:1fr} }
</style>

<div id="sec-inventario">
<div class="in-wrap">
  <div class="in-head">
    <div class="in-title">📦 Inventario</div>
    <button class="in-btn primary" onclick="inNuevoProducto()">+ Nuevo producto</button>
  </div>

  <div class="in-tabs" id="in-tabs" style="display:none">
    <div class="in-tab activo" id="in-tab-stock" data-perm="Stock actual" onclick="inVista('stock')">Stock actual</div>
    <div class="in-tab" id="in-tab-bajo" data-perm="Productos bajo stock mínimo" onclick="inVista('bajo')">Bajo stock mínimo</div>
    <div class="in-tab" id="in-tab-kardex" data-perm="Kardex de movimientos" onclick="inVista('kardex')">Kardex de movimientos</div>
    <div class="in-tab" id="in-tab-venc" data-perm="Vencimientos" onclick="inVista('venc')">Vencimientos</div>
  </div>

  <div id="in-body"><div class="in-empty">Cargando…</div></div>
</div>

<!-- Modal producto -->
<div class="in-modal-bg" id="in-modal-bg">
  <div class="in-modal">
    <div class="in-modal-head">
      <div class="in-modal-title" id="in-modal-title">Nuevo producto</div>
      <button class="in-close" onclick="inCerrarModal()">✕</button>
    </div>
    <input type="hidden" id="in-id"/>
    <div class="in-grid2">
      <div class="in-fg"><label class="in-flabel">Código <span style="color:#8A8A8A;font-weight:400;font-size:11px">(autogenerado)</span></label><input class="in-finp" id="in-codigo" type="text" placeholder="Se generará automáticamente" oninput="this.value=this.value.toUpperCase()" style="background:#FAFBFC"/></div>
      <div class="in-fg"><label class="in-flabel">Unidad de medida <span style="color:#C8241A">*</span></label><select class="in-finp" id="in-unidad"><option value="">— Seleccione —</option></select></div>
    </div>
    <div class="in-fg"><label class="in-flabel">Nombre <span style="color:#C8241A">*</span></label><input class="in-finp" id="in-nombre" type="text" placeholder="NOMBRE DEL INSUMO" oninput="this.value=this.value.toUpperCase()"/></div>
    <div class="in-fg"><label class="in-flabel">Descripción</label><input class="in-finp" id="in-desc" type="text" placeholder="Opcional" oninput="this.value=this.value.toUpperCase()"/></div>
    <div class="in-grid2">
      <div class="in-fg" id="in-stock-fg"><label class="in-flabel">Stock inicial</label><input class="in-finp" id="in-stock" type="number" min="0" step="1" value="0"/></div>
      <div class="in-fg"><label class="in-flabel">Stock mínimo</label><input class="in-finp" id="in-stockmin" type="number" min="0" step="1" value="0"/></div>
    </div>
    <div class="in-fg"><label class="in-flabel">Precio referencial (S/)</label><input class="in-finp" id="in-precio" type="number" min="0" step="0.01" value="0"/></div>
    <div class="in-fg" id="in-estado-fg" style="display:none">
      <label class="in-flabel">Estado</label>
      <select class="in-finp" id="in-estado"><option value="ACTIVO">Activo</option><option value="INACTIVO">Inactivo</option></select>
    </div>
    <div class="in-modal-foot">
      <button class="in-btn" onclick="inCerrarModal()">Cancelar</button>
      <button class="in-btn primary" id="in-btn-guardar" onclick="inGuardarProducto()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal movimiento -->
<div class="in-modal-bg" id="in-mov-bg">
  <div class="in-modal">
    <div class="in-modal-head">
      <div class="in-modal-title">Registrar movimiento</div>
      <button class="in-close" onclick="inCerrarMov()">✕</button>
    </div>
    <input type="hidden" id="in-mov-prod-id"/>
    <div class="in-fg"><label class="in-flabel">Producto</label><input class="in-finp" id="in-mov-prod-nom" type="text" disabled/></div>
    <div class="in-grid2">
      <div class="in-fg"><label class="in-flabel">Tipo <span style="color:#C8241A">*</span></label>
        <select class="in-finp" id="in-mov-tipo"><option value="ENTRADA">Entrada</option><option value="SALIDA">Salida</option></select>
      </div>
      <div class="in-fg"><label class="in-flabel">Cantidad <span style="color:#C8241A">*</span></label><input class="in-finp" id="in-mov-cant" type="number" min="1" step="1" placeholder="0"/></div>
    </div>
    <div class="in-fg"><label class="in-flabel">Observación</label><input class="in-finp" id="in-mov-obs" type="text" placeholder="Motivo del movimiento" oninput="this.value=this.value.toUpperCase()"/></div>
    <div class="in-modal-foot">
      <button class="in-btn" onclick="inCerrarMov()">Cancelar</button>
      <button class="in-btn primary" id="in-btn-mov" onclick="inGuardarMov()">Registrar</button>
    </div>
  </div>
</div>
</div><!-- /sec-inventario -->

<script>
var inVistaActual='stock', inProductos=[];
var inDiasVenc=15;
// Cargar el umbral configurado de días de vencimiento
function inCargarDiasVenc(){
  vzvRun().withSuccessHandler(function(resp){
    if(resp&&resp.ok&&resp.datos&&resp.datos.dias){ inDiasVenc=resp.datos.dias;
      var inp=document.getElementById('in-dias-venc'); if(inp) inp.value=inDiasVenc;
    }
  }).withFailureHandler(function(){}).ejecutar('obtenerDiasVencimiento',{ usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}
function inGuardarDiasVenc(){
  var v=parseInt(document.getElementById('in-dias-venc').value);
  if(isNaN(v)||v<1||v>365){ alert('⚠ Ingrese un número de días entre 1 y 365.'); return; }
  var msg=document.getElementById('in-dias-venc-msg');
  vzvRun('Guardando…').withSuccessHandler(function(resp){
    if(!resp||!resp.ok){ if(msg){msg.style.color='#C8241A'; msg.textContent='⚠ '+(resp?resp.mensaje:'Error');} return; }
    inDiasVenc=v;
    if(msg){ msg.style.color='#1F9D55'; msg.textContent='✓ Guardado'; setTimeout(function(){ msg.textContent=''; },2500); }
  }).withFailureHandler(function(e){ if(msg){msg.style.color='#C8241A'; msg.textContent='⚠ '+e.message;} })
    .ejecutar('guardarDiasVencimiento',{ DIAS:v, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

var inUnidades=[];
function inAbrir(vista) {
  // Cada enlace del menú abre SU vista aislada (sin barra de pestañas).
  inCargarUnidades();
  inCargarDiasVenc();
  inVista(vista || 'stock');
}

function inCargarUnidades(valorSel) {
  vzvRun().withSuccessHandler(function(resp){
    inUnidades = resp&&resp.ok&&Array.isArray(resp.datos)?resp.datos.filter(function(u){return u.ESTADO==='ACTIVO';}):[];
    inLlenarUnidades(valorSel||'');
  }).withFailureHandler(function(){}).ejecutar('listarMaestras',{tabla:'UNIDAD_MEDIDA',usuario:sesion.USUARIO||'',rol:sesion.ROL||'',token:sesion.TOKEN||''});
}
function inLlenarUnidades(valorSel) {
  var sel=document.getElementById('in-unidad');
  if(!sel) return;
  sel.innerHTML='<option value="">— Seleccione —</option>';
  inUnidades.forEach(function(u){
    var val=u.NOMBRE; // guardamos el nombre como unidad
    var txt=u.NOMBRE+(u.ABREVIATURA?' ('+u.ABREVIATURA+')':'');
    var o=document.createElement('option'); o.value=val; o.textContent=txt;
    if(val===valorSel) o.selected=true;
    sel.appendChild(o);
  });
}

function inVista(v) {
  inVistaActual=v;
  ['stock','bajo','kardex','venc'].forEach(function(t){
    var el=document.getElementById('in-tab-'+t); if(el) el.classList.toggle('activo', t===v);
  });
  if(v==='kardex') inCargarKardex();
  else if(v==='venc') inCargarVencimientos();
  else inCargarProductos();
}

// ════ STOCK / BAJO STOCK ════
function inCargarProductos() {
  var body=document.getElementById('in-body');
  body.innerHTML='<div class="in-empty">Cargando…</div>';
  vzvRun()
    .withSuccessHandler(function(resp){
      inProductos = resp&&resp.ok&&Array.isArray(resp.datos)?resp.datos:[];
      inRenderStock();
    })
    .withFailureHandler(function(e){ body.innerHTML='<div class="in-empty" style="color:#C8241A">⚠ '+e.message+'</div>'; })
    .ejecutar('listarProductos', { soloActivos:false, usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

function inRenderStock() {
  var body=document.getElementById('in-body');
  var lista = inProductos.slice();
  if(inVistaActual==='bajo'){
    lista = lista.filter(function(p){ return (parseFloat(p.STOCK)||0) <= (parseFloat(p.STOCK_MINIMO)||0); });
  }
  var html='';
  // Barra de búsqueda
  html+='<div class="in-toolbar"><input class="in-search" id="in-search" type="text" placeholder="Buscar producto…" oninput="inFiltrar()"/></div>';

  // Alerta de bajo stock (solo en vista stock)
  if(inVistaActual==='stock'){
    var bajos=inProductos.filter(function(p){ return (parseFloat(p.STOCK)||0) <= (parseFloat(p.STOCK_MINIMO)||0); });
    if(bajos.length){ html+='<div class="in-alert">⚠ '+bajos.length+' producto(s) requieren reposición (stock ≤ mínimo).</div>'; }
  }

  if(!lista.length){
    html+='<div class="in-card"><div class="in-empty">'+(inVistaActual==='bajo'?'Ningún producto bajo el mínimo. 👍':'Sin productos. Registre el primero con "+ Nuevo producto".')+'</div></div>';
    body.innerHTML=html; return;
  }
  html+='<div class="in-card"><table class="in-table"><thead><tr><th>Código</th><th>Producto</th><th>Unidad</th><th style="text-align:right">Stock</th><th style="text-align:right">Mínimo</th><th>Estado</th><th style="text-align:right">Acciones</th></tr></thead><tbody>';
  lista.forEach(function(p){
    var stock=parseFloat(p.STOCK)||0, min=parseFloat(p.STOCK_MINIMO)||0;
    var badge = stock===0?'cero':(stock<=min?'bajo':'ok');
    var badgeTxt = stock===0?'AGOTADO':(stock<=min?'BAJO':'OK');
    html+='<tr>'+
      '<td class="in-id">'+(p.CODIGO&&p.CODIGO!=='-'?p.CODIGO:'—')+'</td>'+
      '<td><b>'+(p.NOMBRE||'—')+'</b></td>'+
      '<td>'+(p.UNIDAD_MEDIDA||'—')+'</td>'+
      '<td style="text-align:right" class="in-stock">'+stock+'</td>'+
      '<td style="text-align:right">'+min+'</td>'+
      '<td><span class="in-badge '+badge+'">'+badgeTxt+'</span></td>'+
      '<td style="text-align:right">'+
        '<button class="in-accion" onclick=\'inMover("'+p.ID_PRODUCTO+'")\' title="Movimiento">🔄</button>'+
        '<button class="in-accion" onclick=\'inEditarProducto("'+p.ID_PRODUCTO+'")\' title="Editar">✏️</button>'+
      '</td>'+
    '</tr>';
  });
  html+='</tbody></table></div>';
  body.innerHTML=html;
}

function inFiltrar() {
  var q=document.getElementById('in-search').value.toLowerCase().trim();
  var base = inVistaActual==='bajo'
    ? inProductos.filter(function(p){ return (parseFloat(p.STOCK)||0) <= (parseFloat(p.STOCK_MINIMO)||0); })
    : inProductos.slice();
  var lista = !q ? base : base.filter(function(p){
    return String(p.NOMBRE||'').toLowerCase().indexOf(q)>=0 || String(p.CODIGO||'').toLowerCase().indexOf(q)>=0;
  });
  // re-render only table portion
  var temp=inProductos; inProductos=lista; var saved=inVistaActual;
  // Render rows manually to keep search box
  var tbodyWrap=document.querySelector('#in-body .in-card');
  inProductos=temp;
  // simplest: rebuild keeping query
  inRenderStockFiltrado(lista);
}
function inRenderStockFiltrado(lista) {
  var card=document.querySelector('#in-body .in-card');
  if(!card) return;
  if(!lista.length){ card.innerHTML='<div class="in-empty">Sin resultados.</div>'; return; }
  var html='<table class="in-table"><thead><tr><th>Código</th><th>Producto</th><th>Unidad</th><th style="text-align:right">Stock</th><th style="text-align:right">Mínimo</th><th>Estado</th><th style="text-align:right">Acciones</th></tr></thead><tbody>';
  lista.forEach(function(p){
    var stock=parseFloat(p.STOCK)||0, min=parseFloat(p.STOCK_MINIMO)||0;
    var badge = stock===0?'cero':(stock<=min?'bajo':'ok');
    var badgeTxt = stock===0?'AGOTADO':(stock<=min?'BAJO':'OK');
    html+='<tr>'+
      '<td class="in-id">'+(p.CODIGO&&p.CODIGO!=='-'?p.CODIGO:'—')+'</td>'+
      '<td><b>'+(p.NOMBRE||'—')+'</b></td>'+
      '<td>'+(p.UNIDAD_MEDIDA||'—')+'</td>'+
      '<td style="text-align:right" class="in-stock">'+stock+'</td>'+
      '<td style="text-align:right">'+min+'</td>'+
      '<td><span class="in-badge '+badge+'">'+badgeTxt+'</span></td>'+
      '<td style="text-align:right">'+
        '<button class="in-accion" onclick=\'inMover("'+p.ID_PRODUCTO+'")\' title="Movimiento">🔄</button>'+
        '<button class="in-accion" onclick=\'inEditarProducto("'+p.ID_PRODUCTO+'")\' title="Editar">✏️</button>'+
      '</td>'+
    '</tr>';
  });
  html+='</tbody></table>';
  card.innerHTML=html;
}

// ════ KARDEX ════
function inCargarKardex() {
  var body=document.getElementById('in-body');
  body.innerHTML='<div class="in-empty">Cargando…</div>';
  vzvRun()
    .withSuccessHandler(function(resp){
      var movs = resp&&resp.ok&&Array.isArray(resp.datos)?resp.datos:[];
      if(!movs.length){ body.innerHTML='<div class="in-card"><div class="in-empty">Sin movimientos de inventario.</div></div>'; return; }
      var html='<div class="in-card"><table class="in-table"><thead><tr><th>Fecha</th><th>Producto</th><th>Tipo</th><th style="text-align:right">Cant.</th><th style="text-align:right">Stock ant.</th><th style="text-align:right">Stock actual</th><th>Observación</th></tr></thead><tbody>';
      movs.forEach(function(m){
        var t=String(m.TIPO_NOMBRE||'').toUpperCase();
        var badge=t.indexOf('ENTRADA')>=0?'entrada':(t.indexOf('SALIDA')>=0?'salida':'ajuste');
        html+='<tr>'+
          '<td class="in-id">'+(m.FECHA_MOVIMIENTO||'').substring(0,16)+'</td>'+
          '<td>'+(m.PRODUCTO_NOMBRE||'—')+'</td>'+
          '<td><span class="in-badge '+badge+'">'+(m.TIPO_NOMBRE||'—')+'</span></td>'+
          '<td style="text-align:right" class="in-stock">'+(m.CANTIDAD||'0')+'</td>'+
          '<td style="text-align:right">'+(m.STOCK_ANTERIOR||'0')+'</td>'+
          '<td style="text-align:right" class="in-stock">'+(m.STOCK_ACTUAL||'0')+'</td>'+
          '<td style="font-size:12px;color:#666">'+(m.OBSERVACION!=='-'?m.OBSERVACION:'')+'</td>'+
        '</tr>';
      });
      html+='</tbody></table></div>';
      body.innerHTML=html;
    })
    .withFailureHandler(function(e){ body.innerHTML='<div class="in-empty" style="color:#C8241A">⚠ '+e.message+'</div>'; })
    .ejecutar('listarKardex', { usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}

// ════ MODAL PRODUCTO ════
function inNuevoProducto() {
  document.getElementById('in-modal-title').textContent='Nuevo producto';
  document.getElementById('in-id').value='';
  document.getElementById('in-codigo').value=''; document.getElementById('in-codigo').placeholder='Se generará automáticamente (PRD-XXXX)';
  document.getElementById('in-nombre').value='';
  document.getElementById('in-desc').value='';
  if(inUnidades.length){ inLlenarUnidades('UNIDAD'); } else { inCargarUnidades('UNIDAD'); }
  document.getElementById('in-stock').value='0';
  document.getElementById('in-stockmin').value='0';
  document.getElementById('in-precio').value='0';
  document.getElementById('in-stock-fg').style.display='block';
  document.getElementById('in-estado-fg').style.display='none';
  document.getElementById('in-modal-bg').classList.add('activo');
}
function inEditarProducto(id) {
  var p=inProductos.find(function(x){ return x.ID_PRODUCTO===id; });
  if(!p) return;
  document.getElementById('in-modal-title').textContent='Editar producto';
  document.getElementById('in-id').value=p.ID_PRODUCTO;
  document.getElementById('in-codigo').value=(p.CODIGO&&p.CODIGO!=='-')?p.CODIGO:'';
  document.getElementById('in-nombre').value=p.NOMBRE||'';
  document.getElementById('in-desc').value=(p.DESCRIPCION&&p.DESCRIPCION!=='-')?p.DESCRIPCION:'';
  if(inUnidades.length){ inLlenarUnidades(p.UNIDAD_MEDIDA||'UNIDAD'); } else { inCargarUnidades(p.UNIDAD_MEDIDA||'UNIDAD'); }
  document.getElementById('in-stockmin').value=p.STOCK_MINIMO||'0';
  document.getElementById('in-precio').value=p.PRECIO_REFERENCIAL||'0';
  document.getElementById('in-estado').value=p.ESTADO||'ACTIVO';
  document.getElementById('in-stock-fg').style.display='none'; // stock no editable directo
  document.getElementById('in-estado-fg').style.display='block';
  document.getElementById('in-modal-bg').classList.add('activo');
}
function inCerrarModal() { document.getElementById('in-modal-bg').classList.remove('activo'); }

function inGuardarProducto() {
  if(!document.getElementById('in-unidad').value){ alert('⚠ Seleccione la unidad de medida'); return; }
  var nombre=document.getElementById('in-nombre').value.trim();
  if(!nombre){ alert('⚠ El nombre es requerido'); return; }
  var btn=document.getElementById('in-btn-guardar'); btn.disabled=true; btn.textContent='⏳…';
  vzvRun()
    .withSuccessHandler(function(resp){
      btn.disabled=false; btn.textContent='Guardar';
      if(!resp||!resp.ok){ alert('⚠ '+(resp?resp.mensaje:'Error')); return; }
      if(typeof pnNotif==='function') pnNotif('✓ Producto guardado','ok');
      inCerrarModal(); inCargarProductos();
    })
    .withFailureHandler(function(e){ btn.disabled=false; btn.textContent='Guardar'; alert('⚠ '+e.message); })
    .ejecutar('guardarProducto', {
      ID_PRODUCTO:document.getElementById('in-id').value||'',
      CODIGO:document.getElementById('in-codigo').value.trim(),
      NOMBRE:nombre,
      DESCRIPCION:document.getElementById('in-desc').value.trim(),
      UNIDAD_MEDIDA:document.getElementById('in-unidad').value,
      STOCK:document.getElementById('in-stock').value,
      STOCK_MINIMO:document.getElementById('in-stockmin').value,
      PRECIO_REFERENCIAL:document.getElementById('in-precio').value,
      ESTADO:document.getElementById('in-estado').value,
      usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||''
    });
}

// ════ MODAL MOVIMIENTO ════
function inMover(id) {
  var p=inProductos.find(function(x){ return x.ID_PRODUCTO===id; });
  if(!p) return;
  document.getElementById('in-mov-prod-id').value=p.ID_PRODUCTO;
  document.getElementById('in-mov-prod-nom').value=p.NOMBRE+' (stock: '+(p.STOCK||0)+')';
  document.getElementById('in-mov-tipo').value='ENTRADA';
  document.getElementById('in-mov-cant').value='';
  document.getElementById('in-mov-obs').value='';
  document.getElementById('in-mov-bg').classList.add('activo');
}
function inCerrarMov() { document.getElementById('in-mov-bg').classList.remove('activo'); }
function inGuardarMov() {
  var cant=document.getElementById('in-mov-cant').value;
  if(cant===''||parseFloat(cant)<=0){ alert('⚠ Ingrese una cantidad válida'); return; }
  var btn=document.getElementById('in-btn-mov'); btn.disabled=true; btn.textContent='⏳…';
  vzvRun()
    .withSuccessHandler(function(resp){
      btn.disabled=false; btn.textContent='Registrar';
      if(!resp||!resp.ok){ alert('⚠ '+(resp?resp.mensaje:'Error')); return; }
      if(typeof pnNotif==='function') pnNotif('✓ '+resp.mensaje,'ok');
      inCerrarMov(); inCargarProductos();
    })
    .withFailureHandler(function(e){ btn.disabled=false; btn.textContent='Registrar'; alert('⚠ '+e.message); })
    .ejecutar('registrarMovInv', {
      ID_PRODUCTO:document.getElementById('in-mov-prod-id').value,
      TIPO:document.getElementById('in-mov-tipo').value,
      CANTIDAD:cant,
      OBSERVACION:document.getElementById('in-mov-obs').value.trim(),
      usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||''
    });
}

// ════ VENCIMIENTOS ════
function inCargarVencimientos() {
  var body=document.getElementById('in-body');
  body.innerHTML='<div class="in-empty">Cargando…</div>';
  vzvRun()
    .withSuccessHandler(function(resp){
      var lotes = resp&&resp.ok&&Array.isArray(resp.datos)?resp.datos:[];
      if(!lotes.length){ body.innerHTML='<div class="in-card"><div class="in-empty">No hay lotes con vencimiento registrado.</div></div>'; return; }
      var proximos=lotes.filter(function(l){ return l.DIAS_VENCE!=null && l.DIAS_VENCE<=30; }).length;
      var vencidos=lotes.filter(function(l){ return l.VENCIDO; }).length;
      var html='';
      // Control de umbral de días de alerta (configurable)
      html+='<div class="in-card" style="padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">'+
        '<span style="font-size:12.5px;color:#555;font-weight:600">⏰ Alertar productos que vencen dentro de:</span>'+
        '<input type="number" id="in-dias-venc" min="1" max="365" value="'+(inDiasVenc||15)+'" style="width:70px;padding:6px 9px;border:1px solid #E2E4E9;border-radius:7px;font-size:13px;text-align:center"/>'+
        '<span style="font-size:12.5px;color:#555">días</span>'+
        '<button onclick="inGuardarDiasVenc()" style="padding:6px 14px;border:none;border-radius:7px;background:#C8241A;color:#fff;cursor:pointer;font-size:12px;font-weight:600">Guardar</button>'+
        '<span id="in-dias-venc-msg" style="font-size:11.5px;color:#1F9D55"></span>'+
      '</div>';
      if(vencidos>0) html+='<div class="in-alert" style="background:#FAE6E4;border-color:#F0B0AA;color:#C8241A">⚠ '+vencidos+' lote(s) VENCIDOS. Retírelos del stock.</div>';
      if(proximos>vencidos) html+='<div class="in-alert">⏰ '+(proximos-vencidos)+' lote(s) vencen en los próximos 30 días.</div>';
      html+='<div class="in-card"><table class="in-table"><thead><tr><th>Producto</th><th>N° Lote</th><th>Vence</th><th style="text-align:right">Días</th><th style="text-align:right">Disponible</th></tr></thead><tbody>';
      lotes.forEach(function(l){
        var badge,txt;
        if(l.DIAS_VENCE==null){ badge='ok'; txt='—'; }
        else if(l.VENCIDO){ badge='cero'; txt='VENCIDO'; }
        else if(l.DIAS_VENCE<=30){ badge='bajo'; txt=l.DIAS_VENCE+' días'; }
        else { badge='ok'; txt=l.DIAS_VENCE+' días'; }
        html+='<tr>'+
          '<td><b>'+(l.PRODUCTO_NOMBRE||'—')+'</b> <span class="in-id">('+(l.UNIDAD_MEDIDA||'')+')</span></td>'+
          '<td class="in-id">'+(l.NUMERO_LOTE||'—')+'</td>'+
          '<td class="in-id">'+(l.FECHA_VENCIMIENTO&&l.FECHA_VENCIMIENTO!=='-'?l.FECHA_VENCIMIENTO:'—')+'</td>'+
          '<td style="text-align:right"><span class="in-badge '+badge+'">'+txt+'</span></td>'+
          '<td style="text-align:right" class="in-stock">'+(l.CANTIDAD_DISPONIBLE||'0')+'</td>'+
        '</tr>';
      });
      html+='</tbody></table></div>';
      body.innerHTML=html;
    })
    .withFailureHandler(function(e){ body.innerHTML='<div class="in-empty" style="color:#C8241A">⚠ '+e.message+'</div>'; })
    .ejecutar('listarLotes', { usuario:sesion.USUARIO||'', rol:sesion.ROL||'', token:sesion.TOKEN||'' });
}
</script>
